        return operationsCapacityRecord(targetState).capMs;
      }

      function offlineAccumulatedMs(targetState = state) {
        const operations = operationsCapacityRecord(targetState);
        return clamp(cleanNumber(operations.accumulatedOfflineMs, 0), 0, operations.capMs);
      }

      function upgradeOperationsCapacity() {
        const operations = operationsCapacityRecord(state);
        if (operations.level >= operations.maxLevel) {
          toast("Operations Capacity is already at its current max.");
          return;
        }
        const cost = operationsCapacityUpgradeCost(operations.level);
        const funding = academyFundingRecord(state);
        if (funding.value < cost) {
          toast(`Need ${fmt(cost)} Academy Funding for the next Operations Capacity upgrade.`);
          return;
        }
        funding.value -= cost;
        state.academy.globalProgression.funding = funding.value;
        operations.level += 1;
        const updated = normalizeOperationsCapacityRecord({
          ...operations,
          level: operations.level,
          accumulatedOfflineMs: Math.min(operations.accumulatedOfflineMs, operationsCapacityCapMs(operations.level)),
          upgradedAt: now()
        });
        state.academy.headquarters.support.operationsCapacity = updated;
        saveState();
        toast(`Operations Capacity upgraded to Level ${updated.level}. Offline cap is now ${formatDuration(updated.capMs)}.`);
        renderSoon();
      }

      function grantAcademyFunding(amount, source = "reward", targetState = state) {
        const safe = Math.max(0, cleanNumber(amount, 0));
        if (safe <= 0) return 0;
        const funding = academyFundingRecord(targetState);
        funding.value += safe;
        funding.lifetimeEarned += safe;
        funding.lastContributionAt = now();
        targetState.academy.globalProgression.funding = funding.value;
        const campus = campusForState(targetState);
        if (campus && campus.economy && campus.economy.contribution) {
          campus.economy.contribution.lastFundingGenerated = safe;
          campus.economy.contribution.lastSource = source;
          campus.economy.contribution.lastContributionAt = now();
        }
        return safe;
      }

      function campusStrategy(campus = campusForState(state)) {
        const strategyId = campus && campus.economy ? campus.economy.strategyId : DEFAULT_CAMPUS_STRATEGY_ID;
        return getCampusStrategy(strategyId) || getCampusStrategy(DEFAULT_CAMPUS_STRATEGY_ID);
      }

      function campusContributionRate(campus = campusForState(state)) {
        return Math.max(0, cleanNumber(campusStrategy(campus).contributionRate, 0));
      }

      function recordCampusContribution(tpEarned, source = "training", targetState = state) {
        const safe = Math.max(0, cleanNumber(tpEarned, 0));
        if (safe <= 0) return 0;
        const campus = campusForState(targetState);
        if (!campus) return 0;
        campus.economy = normalizeCampusEconomy(campus.economy, campus.countryId || campus.id || USA_CAMPUS_ID);
        const fundingEarned = safe * campusContributionRate(campus);
        if (fundingEarned <= 0) return 0;
        const contribution = campus.economy.contribution;
        contribution.lifetimeFundingGenerated += fundingEarned;
        contribution.pendingFunding = 0;
        contribution.lastFundingGenerated = fundingEarned;
        contribution.lastSource = source;
        contribution.lastContributionAt = now();
        const funding = academyFundingRecord(targetState);
        funding.value += fundingEarned;
        funding.lifetimeEarned += fundingEarned;
        funding.lastContributionAt = now();
        targetState.academy.globalProgression.funding = funding.value;
        return fundingEarned;
      }

      function setCampusStrategy(strategyId) {
        const strategy = getCampusStrategy(strategyId);
        const campus = campusForState(state);
        if (!strategy || !campus) return;
        campus.economy = normalizeCampusEconomy({
          ...campus.economy,
          strategyId: strategy.id,
          strategyChangedAt: now()
        }, campus.countryId || campus.id || USA_CAMPUS_ID);
        saveState();
        toast(`${campus.name} strategy set to ${strategy.name}.`);
        renderSoon();
      }

      function switchActiveCampus(countryId) {
        const destinationId = normalizeCampusId(countryId, state.currentCountryId);
        const previousCampusId = activeCampusIdForState(state);
        if (destinationId === previousCampusId) return;
        syncCampusAdapters(state, { source: "legacy" });
        state.currentCountryId = destinationId;
        syncCampusAdapters(state, { source: "campus" });
        syncGlobalCoachAssignments(state, {
          forceActiveCampus: true,
          coachAssignmentSource: "active-campus-local-economy-switch"
        });
        syncLocalEconomyState(state);
      }

      function canTravelToCampus(countryId) {
        const country = getCountry(countryId);
        return Boolean(country && country.playable !== false && state.unlockedCountryIds.includes(country.id));
      }

      function travelToCampus(countryId) {
        const country = getCountry(countryId);
        if (!country) return;
        if (!canTravelToCampus(country.id)) {
          toast(`${country.name} is still locked.`);
          return;
        }
        const previous = currentCountry();
        switchActiveCampus(country.id);
        state.ui.activeTab = "world";
        saveState();
        toast(previous.id === country.id ? `${country.name} is already active.` : `Traveled to ${country.name} Campus.`);
        renderSoon();
      }

      function setTrainingPoints(value, targetState = state) {
        const safe = Math.max(0, cleanNumber(value, 0));
        targetState.tp = safe;
        const campus = campusForState(targetState);
        if (campus && campus.localTrainingPoints) {
          campus.localTrainingPoints.value = safe;
          campus.localTrainingPoints.status = "campus-owned";
          campus.localTrainingPoints.adapter = "active-campus-legacy-mirror";
        }
        return safe;
      }

      function syncActiveSessionDrillRecord(targetState = state) {
        const campus = campusForState(targetState);
        if (!campusOwnsSessionDrill(campus)) return;
        campus.sessionDrill.upgrades = normalizeClickUpgradeRecords(targetState.clickUpgrades || {});
        campus.sessionDrill.level = sessionDrillLevelFromUpgrades(campus.sessionDrill.upgrades);
        campus.sessionDrill.adapter = "active-campus-legacy-mirror";
        targetState.clickUpgrades = campus.sessionDrill.upgrades;
      }

      function spendTrainingPoints(cost) {
        const safeCost = Math.max(0, cleanNumber(cost, 0));
        if (state.tp < safeCost) return false;
        setTrainingPoints(state.tp - safeCost);
        return true;
      }

      function syncCompetitionStateToCampus(targetState = state) {
        const campus = campusForState(targetState);
        if (!campusOwnsCompetitions(campus)) return;
        campus.competitions.active = targetState.activeCompetition || null;
        campus.competitions.lastResult = targetState.lastCompetitionResult || null;
        campus.competitions.nextCompetitionTime = cleanNumber(targetState.nextCompetitionTime, now() + 45000);
      }

      function setActiveCompetition(record) {
        state.activeCompetition = record || null;
        syncCompetitionStateToCampus(state);
      }

      function setLastCompetitionResult(record) {
        state.lastCompetitionResult = record || null;
        syncCompetitionStateToCampus(state);
      }

      function setNextCompetitionTime(value) {
        state.nextCompetitionTime = cleanNumber(value, now() + 45000);
        syncCompetitionStateToCampus(state);
      }

      function syncArchitectureContainers(targetState, options = {}) {
        if (!targetState || typeof targetState !== "object") return targetState;
        targetState.academy = normalizeAcademyContainer(targetState.academy, defaultAcademyContainer(cleanNumber(targetState.runStart, now())));
        targetState.campuses = normalizeCampusContainer(targetState.campuses, targetState);
        targetState.academy.globalProgression.reputationRef = "state.reputation";
        targetState.academy.globalProgression.medalsRef = "state.medals";
        targetState.academy.globalProgression.trophiesRef = "state.trophies";
        syncGlobalCoachAssignments(targetState, {
          forceActiveCampus: Boolean(options.forceCoachCampus),
          coachAssignmentSource: options.coachAssignmentSource || "architecture-sync"
        });
        targetState.academy.campuses.preparedCampusIds = Object.keys(targetState.campuses);
        syncCampusAdapters(targetState, { source: options.source || "legacy" });
        syncLocalEconomyState(targetState);
        targetState.migration = normalizeMigrationRecord(targetState.migration, targetState.saveVersion || SAVE_VERSION);
        targetState.migration.currentSaveVersion = SAVE_VERSION;
        return targetState;
      }

      function validateCampusRecord(campus, targetState = state) {
        const errors = [];
        const warnings = [];
        if (!campus || typeof campus !== "object") {
          return { ok: false, errors: ["Missing campus record."], warnings };
        }
        if (!campus.localTrainingPoints || typeof campus.localTrainingPoints !== "object") errors.push("Missing local Training Points record.");
        if (campus.localTrainingPoints && !Number.isFinite(cleanNumber(campus.localTrainingPoints.value, NaN))) errors.push("Invalid local Training Points value.");
        if (!campus.sessionDrill || typeof campus.sessionDrill !== "object") errors.push("Missing local Session Drill record.");
        if (campus.sessionDrill && cleanNumber(campus.sessionDrill.level, 0) < 1) errors.push("Local Session Drill must start at level 1 or higher.");
        if (campus.sessionDrill && !campus.sessionDrill.upgrades) errors.push("Missing local Session Drill upgrade records.");
        if (!campus.economy || typeof campus.economy !== "object" || campus.economy.status !== "campus-owned") errors.push("Missing campus local economy record.");
        if (campus.economy && !getCampusStrategy(campus.economy.strategyId)) errors.push("Campus strategy is invalid.");
        if (!campus.competitionCircuits || typeof campus.competitionCircuits !== "object" || !Array.isArray(campus.competitionCircuits.eligibleCircuitIds)) errors.push("Missing campus competition circuit framework.");
        if (campus.competitionCircuits && Array.isArray(campus.competitionCircuits.eligibleCircuitIds)) {
          campus.competitionCircuits.eligibleCircuitIds.forEach(id => {
            if (!getCompetitionCircuit(id)) errors.push(`Invalid campus competition circuit ${id}.`);
          });
        }
        if (isMigratedCampusId(campus.countryId)) {
          const label = campus.name || campus.countryId.toUpperCase();
          if (!campus.metadata || campus.metadata.migrationStatus !== "migrated") errors.push(`${label} migration metadata is not marked migrated.`);
          if (!campusOwnsFacilities(campus)) errors.push(`${label} facilities are not campus-owned.`);
          if (!campusOwnsAthletes(campus)) errors.push(`${label} athletes are not campus-owned.`);
          if (!campusOwnsCompetitions(campus)) errors.push(`${label} competitions are not campus-owned.`);
          if (!campusOwnsChapterProgress(campus)) errors.push(`${label} chapter progress is not campus-owned.`);
          if (!campusOwnsSessionDrill(campus)) errors.push(`${label} Session Drill progression is not campus-owned.`);
          CONTENT.facilities.forEach(facility => {
            if (!campus.facilities || !campus.facilities.records || !campus.facilities.records[facility.id]) errors.push(`${label} missing facility ${facility.id}.`);
          });
          CONTENT.clickUpgrades.forEach(upgrade => {
            if (!campus.sessionDrill || !campus.sessionDrill.upgrades || !campus.sessionDrill.upgrades[upgrade.id]) errors.push(`${label} missing Session Drill upgrade ${upgrade.id}.`);
          });
          CONTENT.athletes.forEach(athlete => {
            if (!campus.athletes || !campus.athletes.records || !campus.athletes.records[athlete.id]) errors.push(`${label} missing athlete ${athlete.id}.`);
          });
          if (campusOwnsFacilities(campus) && activeCampusIdForState(targetState) === campus.countryId && targetState.facilities !== campus.facilities.records) warnings.push(`Legacy facility adapter is not attached to active ${label} campus by object reference.`);
          if (campusOwnsAthletes(campus) && activeCampusIdForState(targetState) === campus.countryId && targetState.athletes !== campus.athletes.records) warnings.push(`Legacy athlete adapter is not attached to active ${label} campus by object reference.`);
          if (campusOwnsSessionDrill(campus) && activeCampusIdForState(targetState) === campus.countryId && targetState.clickUpgrades !== campus.sessionDrill.upgrades) warnings.push(`Legacy Session Drill adapter is not attached to active ${label} campus by object reference.`);
          if (campusOwnsChapterProgress(campus) && targetState.countryProgress && targetState.countryProgress[campus.countryId] !== campus.chapterProgress.record) warnings.push(`Legacy ${label} chapter adapter is not attached by object reference.`);
        }
        return {
          ok: errors.length === 0,
          migrationStatus: campus.metadata && campus.metadata.migrationStatus,
          errors,
          warnings
        };
      }

      function legacyAdapterStatus(targetState = state) {
        const activeCampusId = activeCampusIdForState(targetState);
        const activeCampus = campusForState(targetState, activeCampusId);
        const usaCampus = campusForState(targetState, USA_CAMPUS_ID);
        const activeFacilityCampus = campusOwnsFacilities(activeCampus) ? activeCampus : usaCampus;
        const activeAthleteCampus = campusOwnsAthletes(activeCampus) ? activeCampus : usaCampus;
        const activeCompetitionCampus = campusOwnsCompetitions(activeCampus) ? activeCampus : null;
        const activeSessionDrillCampus = campusOwnsSessionDrill(activeCampus) ? activeCampus : null;
        const chapterAdapters = {};
        MIGRATED_CAMPUS_IDS.forEach(id => {
          const campus = targetState.campuses && targetState.campuses[id];
          chapterAdapters[id] = Boolean(campusOwnsChapterProgress(campus) && targetState.countryProgress && targetState.countryProgress[id] === campus.chapterProgress.record);
        });
        return {
          activeCampusId,
          trainingPoints: {
            rootField: "state.tp",
            campusField: `state.campuses.${activeCampusId}.localTrainingPoints.value`,
            mirrored: Boolean(activeCampus && Math.abs(cleanNumber(targetState.tp, 0) - cleanNumber(activeCampus.localTrainingPoints && activeCampus.localTrainingPoints.value, 0)) < 0.0001)
          },
          sessionDrill: {
            rootField: "state.clickUpgrades",
            campusField: activeSessionDrillCampus ? `state.campuses.${activeSessionDrillCampus.countryId}.sessionDrill.upgrades` : "",
            attached: Boolean(activeSessionDrillCampus && targetState.clickUpgrades === activeSessionDrillCampus.sessionDrill.upgrades),
            level: activeSessionDrillCampus && activeSessionDrillCampus.sessionDrill ? activeSessionDrillCampus.sessionDrill.level : 0
          },
          facilities: {
            rootField: "state.facilities",
            campusField: `state.campuses.${activeFacilityCampus ? activeFacilityCampus.countryId : USA_CAMPUS_ID}.facilities.records`,
            attached: Boolean(activeFacilityCampus && activeFacilityCampus.facilities && targetState.facilities === activeFacilityCampus.facilities.records)
          },
          athletes: {
            rootField: "state.athletes",
            campusField: `state.campuses.${activeAthleteCampus ? activeAthleteCampus.countryId : USA_CAMPUS_ID}.athletes.records`,
            attached: Boolean(activeAthleteCampus && activeAthleteCampus.athletes && targetState.athletes === activeAthleteCampus.athletes.records)
          },
          competitions: {
            rootFields: ["state.activeCompetition", "state.lastCompetitionResult", "state.nextCompetitionTime"],
            campusField: activeCompetitionCampus ? `state.campuses.${activeCompetitionCampus.countryId}.competitions` : "",
            attachedWhenActiveCampusOwned: Boolean(activeCompetitionCampus)
          },
          chapterProgress: {
            rootField: "state.countryProgress",
            campusField: "state.campuses.*.chapterProgress.record",
            attached: Object.values(chapterAdapters).every(Boolean),
            migratedCampusAdapters: chapterAdapters
          }
        };
      }

      function validateCoachAssignments(coachContainer, targetState = state) {
        const errors = [];
        const warnings = [];
        const activeCampusId = activeCampusIdForState(targetState);
        const assignmentCampusIds = {};
        const validCampusIds = new Set(PHASE_ONE_CAMPUS_IDS);
        if (!coachContainer || typeof coachContainer !== "object") {
          return {
            ok: false,
            errors: ["Missing global coach assignment container."],
            warnings,
            assignmentCampusIds,
            activeCampusId,
            transferGameplay: ""
          };
        }
        if (coachContainer.assignmentVersion !== COACH_ASSIGNMENT_VERSION) {
          warnings.push(`Coach assignment version will normalize to ${COACH_ASSIGNMENT_VERSION}.`);
        }
        if (coachContainer.headquartersRef !== COACH_HEADQUARTERS_REF) {
          errors.push("Global coach pool is missing the Headquarters reference.");
        }
        if (coachContainer.transferGameplay !== "not-implemented") {
          errors.push("Coach transfer gameplay must remain disabled for this milestone.");
        }
        if (!coachContainer.assignments || typeof coachContainer.assignments !== "object") {
          errors.push("Missing coach assignment records.");
        }
        CONTENT.coaches.forEach(coach => {
          const assignment = coachContainer.assignments && coachContainer.assignments[coach.id];
          if (!assignment || typeof assignment !== "object") {
            errors.push(`Missing assignment metadata for ${coach.name}.`);
            return;
          }
          const assignmentCampusId = String(assignment.assignmentCampusId || "");
          const currentCampusId = String(assignment.currentCampusId || "");
          const currentAssignment = assignment.currentAssignment && typeof assignment.currentAssignment === "object" ? assignment.currentAssignment : null;
          assignmentCampusIds[coach.id] = assignmentCampusId;
          if (assignment.coachId !== coach.id) errors.push(`${coach.name} assignment has an invalid coach id.`);
          if (assignment.assignmentVersion !== COACH_ASSIGNMENT_VERSION) warnings.push(`${coach.name} assignment version will normalize to ${COACH_ASSIGNMENT_VERSION}.`);
          if (!validCampusIds.has(assignmentCampusId)) errors.push(`${coach.name} assignment campus is invalid.`);
          if (currentCampusId !== assignmentCampusId) errors.push(`${coach.name} current campus does not match assignment campus.`);
          if (!currentAssignment || currentAssignment.type !== "campus" || currentAssignment.campusId !== assignmentCampusId) errors.push(`${coach.name} current assignment metadata is incomplete.`);
          if (assignment.headquartersRef !== COACH_HEADQUARTERS_REF) errors.push(`${coach.name} is missing the future Headquarters reference.`);
          if (assignment.transferReady !== true) errors.push(`${coach.name} is missing transfer-ready metadata.`);
          if (!assignment.transfer || assignment.transfer.status !== "metadata-only" || assignment.transfer.gameplayEnabled !== false) errors.push(`${coach.name} transfer metadata must remain disabled.`);
          if (!assignment.specialty || assignment.specialty.status !== "future-metadata") errors.push(`${coach.name} is missing future specialty metadata.`);
          const liveLevel = Math.max(0, Math.floor(cleanNumber(targetState.coaches && targetState.coaches[coach.id] && targetState.coaches[coach.id].level, 0)));
          if (liveLevel > 0 && assignmentCampusId !== activeCampusId) {
            warnings.push(`${coach.name} is recruited but assigned to ${assignmentCampusId} while the active campus is ${activeCampusId}.`);
          }
        });
        return {
          ok: errors.length === 0,
          errors,
          warnings,
          assignmentCampusIds,
          activeCampusId,
          transferGameplay: coachContainer.transferGameplay || "",
          headquartersRef: coachContainer.headquartersRef || "",
          assignmentsPrepared: CONTENT.coaches.every(coach => Boolean(coachContainer.assignments && coachContainer.assignments[coach.id]))
        };
      }

      function validateSave(targetState) {
        const errors = [];
        const warnings = [];
        const candidate = targetState && typeof targetState === "object" ? targetState : {};
        if (Math.floor(cleanNumber(candidate.saveVersion, 0)) !== SAVE_VERSION) warnings.push(`Save version will normalize to ${SAVE_VERSION}.`);
        if (!candidate.academy || typeof candidate.academy !== "object") errors.push("Missing academy container.");
        if (!candidate.campuses || typeof candidate.campuses !== "object") errors.push("Missing campus container.");
        if (!candidate.academy || !candidate.academy.headquarters || !candidate.academy.headquarters.academyFunding) {
          errors.push("Missing Headquarters-owned Academy Funding record.");
        } else {
          const funding = candidate.academy.headquarters.academyFunding;
          if (funding.status !== "headquarters-owned") errors.push("Academy Funding is not marked Headquarters-owned.");
          if (!Number.isFinite(cleanNumber(funding.value, NaN))) errors.push("Academy Funding value is invalid.");
        }
        if (!candidate.academy || !candidate.academy.headquarters || !candidate.academy.headquarters.support || candidate.academy.headquarters.support.gameplayEnabled !== false) {
          errors.push("Headquarters support must remain metadata-only.");
        } else {
          const operations = candidate.academy.headquarters.support.operationsCapacity;
          if (!operations || typeof operations !== "object") errors.push("Missing Operations Capacity record.");
          else {
            if (operations.level < 1 || operations.level > MAX_OPERATIONS_CAPACITY_LEVEL) errors.push("Operations Capacity level is invalid.");
            if (operations.capMs !== operationsCapacityCapMs(operations.level)) warnings.push("Operations Capacity cap will normalize to the current level.");
            if (!operations.limitsOfflineProduction) errors.push("Operations Capacity must limit offline production.");
          }
        }
        if (!candidate.academy || !candidate.academy.headquarters || !candidate.academy.headquarters.competitionCircuits) {
          errors.push("Missing global competition circuit framework.");
        }
        PHASE_ONE_CAMPUS_IDS.forEach(id => {
          if (!candidate.campuses || !candidate.campuses[id]) errors.push(`Missing ${id.toUpperCase()} campus placeholder.`);
        });
        if (!candidate.academy || !candidate.academy.coaches || candidate.academy.coaches.scope !== "global-academy") {
          errors.push("Missing global coach pool metadata.");
        }
        if (!candidate.countryProgress || typeof candidate.countryProgress !== "object") errors.push("Missing country progress records.");
        if (!candidate.facilities || typeof candidate.facilities !== "object") errors.push("Missing legacy facility records.");
        if (!candidate.coaches || typeof candidate.coaches !== "object") errors.push("Missing legacy coach records.");
        if (!candidate.clickUpgrades || typeof candidate.clickUpgrades !== "object") errors.push("Missing legacy Session Drill upgrade records.");
        if (!candidate.athletes || typeof candidate.athletes !== "object") errors.push("Missing legacy athlete records.");
        if (!candidate.settings || typeof candidate.settings !== "object") errors.push("Missing settings.");
        const activeCampusId = activeCampusIdForState(candidate);
        const adapterStatus = legacyAdapterStatus(candidate);
        const coachAssignmentValidation = validateCoachAssignments(candidate.academy && candidate.academy.coaches, candidate);
        coachAssignmentValidation.errors.forEach(error => errors.push(error));
        coachAssignmentValidation.warnings.forEach(warning => warnings.push(warning));
        const campusValidation = {};
        if (candidate.campuses && typeof candidate.campuses === "object") {
          Object.keys(candidate.campuses).forEach(id => {
            campusValidation[id] = validateCampusRecord(candidate.campuses[id], candidate);
          });
        }
        if (!candidate.campuses || !candidate.campuses[activeCampusId]) errors.push("Missing active campus record.");
        MIGRATED_CAMPUS_IDS.forEach(id => {
          if (campusValidation[id] && !campusValidation[id].ok) {
            campusValidation[id].errors.forEach(error => errors.push(error));
          }
        });
        Object.values(campusValidation).forEach(result => {
          (result.warnings || []).forEach(warning => warnings.push(warning));
        });
        return {
          ok: errors.length === 0,
          checkedAt: now(),
          saveVersion: SAVE_VERSION,
          architectureVersion: ARCHITECTURE_VERSION,
          errors,
          warnings,
          summary: {
            campusIds: candidate.campuses && typeof candidate.campuses === "object" ? Object.keys(candidate.campuses) : [],
            activeCampusId,
            usaMigrationStatus: candidate.campuses && candidate.campuses.usa && candidate.campuses.usa.metadata && candidate.campuses.usa.metadata.migrationStatus,
            japanMigrationStatus: candidate.campuses && candidate.campuses.japan && candidate.campuses.japan.metadata && candidate.campuses.japan.metadata.migrationStatus,
            brazilMigrationStatus: candidate.campuses && candidate.campuses.brazil && candidate.campuses.brazil.metadata && candidate.campuses.brazil.metadata.migrationStatus,
            canadaMigrationStatus: candidate.campuses && candidate.campuses.canada && candidate.campuses.canada.metadata && candidate.campuses.canada.metadata.migrationStatus,
            legacyAdapters: adapterStatus,
            campusValidation,
            globalCoachPool: Boolean(candidate.academy && candidate.academy.coaches && candidate.academy.coaches.scope === "global-academy"),
            globalCoachAssignments: coachAssignmentValidation,
            headquartersPrepared: Boolean(candidate.academy && candidate.academy.headquarters && candidate.academy.headquarters.playable === false),
            academyFunding: candidate.academy && candidate.academy.headquarters && candidate.academy.headquarters.academyFunding,
            operationsCapacity: candidate.academy && candidate.academy.headquarters && candidate.academy.headquarters.support && candidate.academy.headquarters.support.operationsCapacity,
            competitionCircuits: candidate.academy && candidate.academy.headquarters && candidate.academy.headquarters.competitionCircuits
          }
        };
      }

      function campusMigrationSummary(targetState, campusId) {
        const campus = targetState.campuses && targetState.campuses[campusId];
        return {
          status: campus && campus.metadata && campus.metadata.migrationStatus,
          phase: campus && campus.metadata && campus.metadata.migrationPhase,
          ownsTrainingPoints: Boolean(campus && campus.localTrainingPoints && campus.localTrainingPoints.status === "campus-owned"),
          ownsSessionDrill: campusOwnsSessionDrill(campus),
          sessionDrillLevel: campus && campus.sessionDrill && campus.sessionDrill.level,
          sessionDrillUpgradeLevels: campus && campus.sessionDrill && campus.sessionDrill.upgrades
            ? Object.fromEntries(CONTENT.clickUpgrades.map(upgrade => [upgrade.id, cleanNumber(campus.sessionDrill.upgrades[upgrade.id] && campus.sessionDrill.upgrades[upgrade.id].level, 0)]))
            : {},
          ownsFacilities: campusOwnsFacilities(campus),
          ownsAthletes: campusOwnsAthletes(campus),
          ownsCompetitions: campusOwnsCompetitions(campus),
          ownsChapterProgress: campusOwnsChapterProgress(campus),
          economyStatus: campus && campus.economy && campus.economy.status,
          strategyId: campus && campus.economy && campus.economy.strategyId,
          contributionGenerated: campus && campus.economy && campus.economy.contribution && campus.economy.contribution.lifetimeFundingGenerated,
          competitionCircuits: campus && campus.competitionCircuits && campus.competitionCircuits.eligibleCircuitIds,
          legacyBridgeApplied: Boolean(campus && campus.metadata && campus.metadata.legacyBridgeApplied),

      function normalizeIdList(value, collection, fallback) {
        const valid = new Set(collection.map(item => item.id));
        const list = Array.isArray(value) ? value : fallback;
        const normalized = list.filter(id => valid.has(id));
        return normalized.length ? [...new Set(normalized)] : [...fallback];

      function createCountryProgressRecord() {
        return {
          completedGoalIds: [],
          chapterTPEarned: 0,
          competitionsWon: 0,
          completedAt: 0,
          rewardClaimed: false,
          rewardClaimedAt: 0
        };

      function normalizeCountryProgress(rawProgress, rawSave = {}) {
        const progress = {};
        const completedCountries = Array.isArray(rawSave.completedCountryIds) ? rawSave.completedCountryIds : [];
        CONTENT.countries.forEach(country => {
          const saved = rawProgress && typeof rawProgress === "object" && rawProgress[country.id] && typeof rawProgress[country.id] === "object"
            ? rawProgress[country.id]
            : {};
          const goals = countryChapterGoals(country);
          const validGoalIds = new Set(goals.map(goal => goal.id));
          const rewardClaimed = Boolean(saved.rewardClaimed || completedCountries.includes(country.id));
          const completedGoalIds = Array.isArray(saved.completedGoalIds)
            ? saved.completedGoalIds.filter(id => validGoalIds.has(id))
            : [];
          progress[country.id] = {
            ...createCountryProgressRecord(),
            completedGoalIds: rewardClaimed ? goals.map(goal => goal.id) : [...new Set(completedGoalIds)],
            chapterTPEarned: Math.max(0, cleanNumber(saved.chapterTPEarned, country.id === "usa" ? cleanNumber(rawSave.seasonTPEarned, 0) : 0)),
            competitionsWon: Math.max(0, Math.floor(cleanNumber(saved.competitionsWon, country.id === USA_CAMPUS_ID ? rawSave.stats && rawSave.stats.competitionsWon : 0))),
            completedAt: cleanNumber(saved.completedAt, rewardClaimed ? now() : 0),
            rewardClaimed,
            rewardClaimedAt: cleanNumber(saved.rewardClaimedAt, rewardClaimed ? now() : 0)
          };
        });
        return progress;
      }

      function refreshUnlockedCountriesForState(targetState) {
        if (!targetState.unlockedCountryIds.includes("usa")) targetState.unlockedCountryIds.push("usa");
        CONTENT.countries.forEach(country => {
          if (countryUnlockRequirementsMetForState(country, targetState) && !targetState.unlockedCountryIds.includes(country.id)) {
            initializeFreshCampusForUnlock(country.id, targetState);
            targetState.unlockedCountryIds.push(country.id);
          }
        });
        targetState.unlockedCountryIds = normalizeIdList(targetState.unlockedCountryIds, CONTENT.countries, ["usa"]);
      }

      function countryUnlockRequirementsMetForState(country, targetState) {
        const requirements = country.unlockRequirements || [];
        if (!requirements.length) return country.id === "usa";
        return requirements.every(requirement => {
          if (requirement.type === "countryCompleted") return targetState.completedCountryIds.includes(requirement.countryId);
          if (requirement.type === "countryUnlocked") return targetState.unlockedCountryIds.includes(requirement.countryId);
          return false;
        });
      }

        const n = Number(value);

        return {
          name: trimText(saved.name, fallbackIdentity.name, 32),

        if (!saved && legacySeen) {

            dismissed: true,
            introSeen: true,
            identityConfirmed: true,
            chapterReviewed: true,
            worldTourViewed: true,
            firstCompetitionBriefed: true

        const normalized = { ...base };
        if (!saved && rawSave && typeof rawSave.academy === "object") normalized.identityConfirmed = true;
        if (saved) {
          Object.keys(base).forEach(key => {

      function loadState() {

          const raw = localStorage.getItem(STORAGE_KEY);

            state.migration.validation = validateSave(state);
            return;
          }
          state = normalizeState(JSON.parse(raw));
        } catch (err) {
          state = createDefaultState();
          syncArchitectureContainers(state);
          state.migration.validation = validateSave(state);
          queueMicrotask(() => toast("Save data was unreadable, so a fresh academy was started."));
        }
      }

      function saveState() {
        state.saveVersion = SAVE_VERSION;
        syncArchitectureContainers(state);

      function exposeDeveloperMigrationTools() {

          exportMigrationInfo: () => JSON.stringify(createDeveloperMigrationInfo(state), null, 2),

      function applyOfflineProgress() {
        const current = now();
        const elapsed = Math.max(0, current - cleanNumber(state.lastSave, current));
        const operations = operationsCapacityRecord(state);
        const capped = Math.min(elapsed, operations.capMs);
        operations.lastElapsedMs = elapsed;
        operations.lastCreditedMs = capped;
        operations.lastTruncatedMs = Math.max(0, elapsed - capped);
        operations.accumulatedOfflineMs = capped;
        const result = simulateTrainingTime(capped, {
          startTime: current - capped,
          includeEvent: false,
          includeMorale: false,
          progressAthletes: false,
          countPlayTime: false,
          source: "offline"
        });
        if (result.earned > 0) {
          state.stats.totalOfflineIncome += result.earned;
          offlineReport = {
            elapsed,
            capped,
            earned: result.earned,
            passive: result.seconds > 0 ? result.earned / result.seconds : 0,
            multiplier: permanentMultiplier(),
            cap: operations.capMs,
            truncated: operations.lastTruncatedMs
          };
        }
        state.lastTick = current;
        state.lastSave = current;
        if (state.eventBonusEnd < current) state.eventBonusEnd = 0;
        if (state.moraleBoostEnd < current) state.moraleBoostEnd = 0;
      }

      function simulateTrainingTime(elapsedMs, options = {}) {
        const totalMs = Math.max(0, cleanNumber(elapsedMs, 0));
        if (totalMs <= 0) return { earned: 0, seconds: 0 };
        const endTime = cleanNumber(options.endTime, now());
        const startTime = cleanNumber(options.startTime, endTime - totalMs);
        let cursor = startTime;
        let earned = 0;
        let seconds = 0;
        let guard = 0;

        while (cursor < endTime && guard < 20) {
          const next = nextSimulationBoundary(cursor, endTime, options);
          const segmentMs = Math.max(0, next - cursor);
          const segmentSeconds = segmentMs / 1000;
          if (segmentSeconds > 0) {
            const income = calculateIncome({
              includeEvent: options.includeEvent !== false,
              includeMorale: options.includeMorale !== false
            }, cursor) * segmentSeconds;
            if (income > 0) {
              grantTP(income, options.source || "passive");
              earned += income;
            }
            if (options.progressAthletes !== false) progressAthletes(segmentSeconds);
            if (options.countPlayTime) state.stats.totalPlaySeconds += segmentSeconds;
            seconds += segmentSeconds;
          }
          cursor = next;
          guard += 1;
          if (segmentMs <= 0) break;
        }

        return { earned, seconds };
      }

      function nextSimulationBoundary(cursor, endTime, options) {
        let next = endTime;
        if (options.includeEvent !== false && state.eventBonusEnd > cursor && state.eventBonusEnd < next) {
          next = state.eventBonusEnd;
        }
        if (options.includeMorale !== false && state.moraleBoostEnd > cursor && state.moraleBoostEnd < next) {
          next = state.moraleBoostEnd;
        }
        return next;
      }

      function grantTP(amount, source) {
        const safe = Math.max(0, cleanNumber(amount, 0));
        if (safe <= 0) return;
        setTrainingPoints(state.tp + safe);
        state.totalTPEarned += safe;
        state.seasonTPEarned += safe;
        ensureCountryProgress(state.currentCountryId).chapterTPEarned += safe;
        if (source === "click") state.stats.totalClickIncome += safe;
        if (source === "passive") state.stats.totalPassiveIncome += safe;
        if (source === "competition") state.stats.totalCompetitionIncome += safe;
        recordCampusContribution(safe, source || "training");
      }

      function permanentMultiplier() {
        const trophy = Math.pow(1.1, state.trophies);
        const achievements = 1 + CONTENT.achievements.reduce((sum, item) => {
          return sum + (state.achievements[item.id] ? item.rewardMult : 0);
        }, 0);
        return trophy * achievements;
      }

      function temporaryMultiplier(options = {}, atTime = now()) {
        let mult = 1;
        if (options.includeEvent !== false && state.eventBonusEnd > atTime) mult *= 5;
        if (options.includeMorale !== false && state.moraleBoostEnd > atTime) mult *= 1.5;
        return mult;
      }

      function calculateIncome(options = {}, atTime = now()) {
        const total = activeSports().reduce((sum, sport) => sum + calculateSportIncome(sport.id, options), 0);
        return total * temporaryMultiplier(options, atTime);
      }

      function calculateSportIncome(sportId, options = {}) {
        return facilitiesForSport(sportId).reduce((sum, facility) => {
          return sum + calculateFacilityIncome(facility.id, options);
        }, 0);
      }

      function calculateFacilityIncome(id, options = {}) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        if (!facility || level <= 0) return 0;
        let mult = permanentMultiplier();
        mult *= 1 + Math.floor(level / 10) * 0.05;
        mult *= facilityMilestoneMultiplier("academyOutputMultiplier");
        mult *= coachSportBonus(facility.sportId);
        mult *= athleteSportBonus(facility.sportId);
        return level * facility.baseIncome * mult;
      }

      function coachSportBonus(sportId) {
        let mult = 1;
        CONTENT.coaches.forEach(coach => {
          const level = state.coaches[coach.id].level;
          if (level <= 0) return;
          coach.effects
            .filter(effect => effect.type === "sportOutputMultiplier" && effect.sportId === sportId)
            .forEach(effect => {
              mult *= 1 + level * effect.perLevel;
            });
        });
        return mult;
      }

      function athleteSportBonus(sportId) {
        let mult = 1;
        CONTENT.athletes.forEach(athlete => {
          const record = state.athletes[athlete.id];
          if (!record.recruited) return;
          athlete.effects
            .filter(effect => effect.type === "sportOutputMultiplier" && effect.sportId === sportId)
            .forEach(effect => {
              if (effect.requiresAssignedSport && assignedSportId(record.assigned) !== sportId) return;
              mult *= 1 + record.skill * effect.perSkill;
            });
        });
        return mult;
      }

      function clickReward() {
        let drillMult = permanentMultiplier();
        drillMult *= coachClickBonus();
        drillMult *= facilityMilestoneMultiplier("clickMultiplier");
        drillMult *= athleteEffectMultiplier("clickMultiplier");
        const directReward = baseClickPower() * drillMult;
        const passiveSync = calculateIncome({ includeEvent: false, includeMorale: false }) * clickPassiveSeconds();
        return (directReward + passiveSync) * temporaryMultiplier({ includeMorale: false });
      }

      function handleDrill(event, button) {
        const reward = clickReward();
        grantTP(reward, "click");
        state.stats.totalClicks += 1;
        if (state.settings.floatingNumbers) {
          const rect = button.getBoundingClientRect();
          showFloating(`+${fmt(reward)} TP`, rect.left + rect.width / 2, rect.top + 18);
        }
        checkAchievements();
        checkCountryProgress();
        showSessionDrillTutorial();
        renderSoon();
      }

      function baseClickPower() {
        return 1 + CONTENT.clickUpgrades.reduce((sum, upgrade) => {
          return sum + state.clickUpgrades[upgrade.id].level * upgrade.powerPerLevel;
        }, 0);
      }

      function clickPassiveSeconds() {
        return CONTENT.clickUpgrades.reduce((sum, upgrade) => {
          return sum + state.clickUpgrades[upgrade.id].level * upgrade.passiveSecondsPerLevel;
        }, 0);
      }

      function coachClickBonus() {
        let mult = 1;
        CONTENT.coaches.forEach(coach => {
          const level = state.coaches[coach.id].level;
          if (level <= 0) return;
          coach.effects
            .filter(effect => effect.type === "clickMultiplier")
            .forEach(effect => {
              mult *= 1 + level * effect.perLevel;
            });
        });
        return mult;
      }

      function activeClickProgram() {
        for (let i = CONTENT.clickUpgrades.length - 1; i >= 0; i -= 1) {
          const upgrade = CONTENT.clickUpgrades[i];
          if (state.clickUpgrades[upgrade.id].level > 0) return upgrade;
        }
        return CONTENT.clickUpgrades[0];
      }

      function nextClickUpgrade() {
        let lockedCandidate = null;
        for (const upgrade of CONTENT.clickUpgrades) {
          const level = state.clickUpgrades[upgrade.id].level;
          if (level >= upgrade.maxLevel) continue;
          if (clickUpgradeUnlocked(upgrade)) return upgrade;
          if (!lockedCandidate) lockedCandidate = upgrade;
        }
        return lockedCandidate;
      }

      function unlockedClickUpgradeChoices() {
        return CONTENT.clickUpgrades.filter(upgrade => {
          const level = state.clickUpgrades[upgrade.id].level;
          return level < upgrade.maxLevel && clickUpgradeUnlocked(upgrade);
        });
      }

      function recommendedClickUpgradeChoice() {
        const choices = unlockedClickUpgradeChoices();
        const affordable = choices.filter(upgrade => state.tp >= clickUpgradeCost(upgrade.id));
        if (affordable.length) {
          return affordable.sort((a, b) => clickUpgradeCost(a.id) - clickUpgradeCost(b.id))[0];
        }
        return choices[0] || nextClickUpgrade();
      }

      function nextLockedClickUpgrade() {
        return CONTENT.clickUpgrades.find(upgrade => {
          const level = state.clickUpgrades[upgrade.id].level;
          return level < upgrade.maxLevel && !clickUpgradeUnlocked(upgrade);
        }) || null;
      }

      function clickUpgradeCost(id) {
        const upgrade = getClickUpgrade(id);
        const level = state.clickUpgrades[id].level;
        return Math.ceil(upgrade.baseCost * Math.pow(upgrade.growth, level));
      }

      function buyClickUpgrade(id) {
        const upgrade = getClickUpgrade(id);
        if (!upgrade || !clickUpgradeUnlocked(upgrade)) return;
        const record = state.clickUpgrades[id];
        if (record.level >= upgrade.maxLevel) return;
        const cost = clickUpgradeCost(id);
        if (!spendTrainingPoints(cost)) return;
        record.level += 1;
        syncActiveSessionDrillRecord();
        state.stats.clickUpgradesBought += 1;
        toast(`${upgrade.name} upgraded to level ${record.level}.`);
        checkAchievements();
        checkCountryProgress();
        renderSoon();
      }

      function clickUpgradeUnlocked(upgrade) {
        if (!upgrade.requires) return true;
        return state.clickUpgrades[upgrade.requires.id].level >= upgrade.requires.level;
      }

      function clickUpgradeRequirementLabel(upgrade) {
        if (!upgrade.requires) return "Unlocked";
        const required = getClickUpgrade(upgrade.requires.id);
        return `${required.name} level ${upgrade.requires.level}`;
      }

      function recommendedNextAction() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        if (progress.readyToClaim) {
          const next = nextCountry(country);
          const playableNext = nextPlayableCountry(country);
          return {
            title: `Claim ${country.name} Chapter Reward`,
            note: `${country.name} is complete. Open World Tour and claim the reward when you are ready.`,
            reason: "Reward",
            cta: playableNext ? `Review ${playableNext.name} Unlock` : next ? `Review ${next.name} Unlock` : "Open World Tour",
            action: "navigate-guide",
            dataset: { tab: "world", "guide-type": "country", "guide-id": country.id },
            accent: country.accent
          };
        }
        if (!progress.total) {
          return {
            title: `Review ${country.name} Tour Plan`,
            note: `${country.name} is unlocked, but its chapter goals are planned for a later milestone. Use World Tour to review destinations and rewards.`,
            reason: "Tour",
            cta: "Open World Tour",
            action: "navigate-guide",
            dataset: { tab: "world", "guide-type": "route", "guide-id": country.id },
            accent: country.accent
          };
        }

        const goalPriority = [
          ["facilityLevel"],
          ["countryCompetitionsWon", "competitionsWon"],
          ["highestAthleteSkill"],
          ["chapterTPEarned", "seasonTPEarned", "totalTPEarned"]
        ];
        for (const types of goalPriority) {
          const goal = progress.goals.find(item => !item.complete && types.includes(item.type));
          if (!goal) continue;
          const goalRecommendation = recommendationForGoal(goal);
          if (goalRecommendation) return goalRecommendation;
        }

        if (state.activeCompetition) return competitionRecommendation();

        const athlete = nextAthleteAction();
        if (athlete) return athlete;

        const coach = nextAffordableCoach();
        if (coach) return coach;

        const clickUpgrade = nextAffordableClickUpgrade();
        if (clickUpgrade) return clickUpgrade;

        return {
          title: "Review the World Tour",
          note: "Check the current chapter, future destinations, and long-term academy rewards.",
          reason: "Guide",
          cta: "Open World Tour",
          action: "navigate-guide",
          dataset: { tab: "world", "guide-type": "route", "guide-id": state.currentCountryId },
          accent: "var(--teal)"
        };
      }

      function recommendationForGoal(goal) {
        if (goal.type === "facilityLevel") {
          const facility = getFacility(goal.facilityId);
          if (!facility) return null;
          const cost = facilityCost(facility.id, 1);
          const level = state.facilities[facility.id].level;
          if (state.tp >= cost) {
            return {
              title: `Upgrade ${facility.name}`,
              note: `${facility.short} is level ${level}/${goal.target}. Open Sports Center and buy the next level there.`,
              reason: "Goal",
              cta: "Open Sports Center",
              action: "navigate-guide",
              dataset: { tab: "sports", "guide-type": "facility", "guide-id": facility.id },
              accent: facility.accent
            };
          }
          return {
            title: `Upgrade ${facility.name}`,
            note: `${facility.short} needs level ${goal.target}. Next level costs ${fmt(cost)} TP.`,
            reason: "Goal",
            cta: "Open Sports Center",
            action: "navigate-guide",
            dataset: { tab: "sports", "guide-type": "facility", "guide-id": facility.id },
            accent: facility.accent
          };
        }

        if (goal.type === "competitionsWon" || goal.type === "countryCompetitionsWon") {
          if (state.activeCompetition) return competitionRecommendation();
          return {
            title: "Prepare for Competitions",
            note: `${goal.currentLabel}/${goal.targetLabel} wins complete. Watch for the next competition offer and improve team power.`,
            reason: "Goal",
            cta: "Open Competitions",
            action: "navigate-guide",
            dataset: { tab: "events", "guide-type": "competition", "guide-id": state.activeCompetition ? state.activeCompetition.id : "" },
            accent: "var(--gold)"
          };
        }

        if (goal.type === "highestAthleteSkill") {
          const athlete = nextAthleteAction();
          if (athlete) return athlete;
          return {
            title: "Develop an Athlete",
            note: `${goal.currentLabel}/${goal.targetLabel} skill reached. Recruit or train an athlete to complete this chapter goal.`,
            reason: "Technique",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": "" },
            accent: "#4ade80"
          };
        }

        if (goal.type === "chapterTPEarned" || goal.type === "seasonTPEarned" || goal.type === "totalTPEarned") {
          const clickUpgrade = nextAffordableClickUpgrade();
          if (clickUpgrade) return clickUpgrade;
          return {
            title: "Run Session Drill",
            note: `${goal.currentLabel}/${goal.targetLabel} TP earned for this goal. Tapping and passive income both move the chapter forward.`,
            reason: "Goal",
            cta: "Focus Session Drill",
            action: "navigate-guide",
            dataset: { tab: "home", "guide-type": "drill", "guide-id": "session" },
            accent: "var(--teal)"
          };
        }

        return null;
      }

      function competitionRecommendation() {
        const comp = state.activeCompetition ? getCompetition(state.activeCompetition.id) : null;
        return {
          title: comp ? `Enter ${comp.name}` : "Enter Competition",
          note: comp ? `${comp.description} Current win chance: ${Math.round(clamp(0.35 + (competitionPower() - comp.targetPower) / comp.targetPower * 0.28, 0.18, 0.95) * 100)}%.` : "A competition offer is ready.",
          reason: "Event",
          cta: "Open Competition Hall",
          action: "navigate-guide",
          dataset: { tab: "events", "guide-type": "competition", "guide-id": comp ? comp.id : "" },
          accent: "var(--gold)"
        };
      }

      function nextAffordableClickUpgrade() {
        const upgrade = recommendedClickUpgradeChoice();
        if (!upgrade || !clickUpgradeUnlocked(upgrade)) return null;
        const cost = clickUpgradeCost(upgrade.id);
        if (state.tp < cost) return null;
        return {
          title: `Upgrade ${upgrade.name}`,
          note: `${upgrade.name} increases Session Drill power and passive sync. Open Click Training to choose this or another unlocked drill.`,
          reason: "Power",
          cta: "Open Click Training",
          action: "navigate-guide",
          dataset: { tab: "home", "guide-type": "click", "guide-id": "training" },
          accent: upgrade.accent
        };
      }

      function nextAffordableCoach() {
        for (const coach of CONTENT.coaches) {
          const level = state.coaches[coach.id].level;
          const isNew = level === 0;
          if (level >= coach.maxLevel) continue;
          if (isNew && coachSlotsUsed() >= coachSlotsCap()) continue;
          const cost = coachCost(coach.id);
          if (state.tp < cost) continue;
          return {
            title: `${isNew ? "Recruit" : "Upgrade"} ${coach.name}`,
            note: `${coach.specialty}. Open Academy Offices and ${isNew ? "recruit" : "upgrade"} this coach there.`,
            reason: "Staff",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "coach", "guide-id": coach.id },
            accent: "#4ade80"
          };
        }
        return null;
      }

      function nextAthleteAction() {
        for (const athlete of activeAthletes()) {
          const record = state.athletes[athlete.id];
          if (!record.recruited || record.skill >= athlete.potential) continue;
          const cost = athleteTrainCost(athlete.id);
          if (state.tp < cost) continue;
          return {
            title: `Train ${athlete.name}`,
            note: `${athlete.name} can improve to skill ${record.skill + 1}. Open Academy Offices and train them there.`,
            reason: "Roster",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": athlete.id },
            accent: sportAccent(athlete.sportId)
          };
        }
        for (const athlete of activeAthletes()) {
          const record = state.athletes[athlete.id];
          if (record.recruited || athletesUsed() >= athleteCap() || state.tp < athlete.baseCost) continue;
          return {
            title: `Recruit ${athlete.name}`,
            note: `${athlete.rarity} ${sportLabel(athlete.sportId, "short")} athlete. Open Academy Offices and recruit them there.`,
            reason: "Roster",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": athlete.id },
            accent: sportAccent(athlete.sportId)
          };
        }
        return null;
      }

      function buyFacility(id, qtyMode) {
        const facility = getFacility(id);
        if (!facility) return;
        const qty = qtyMode === "max" ? maxAffordableFacility(id) : Number(qtyMode);
        if (!Number.isFinite(qty) || qty <= 0) return;
        const cost = facilityCost(id, qty);
        if (!spendTrainingPoints(cost)) return;
        state.facilities[id].level += qty;
        state.stats.facilitiesBought += qty;
        state.stats.highestFacilityLevel = Math.max(state.stats.highestFacilityLevel, state.facilities[id].level);
        toast(`${facility.name} upgraded to level ${state.facilities[id].level}.`);
        checkAchievements();
        checkCountryProgress();
        renderSoon();
      }

      function facilityCost(id, qty = 1) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        let cost = 0;
        for (let i = 0; i < qty; i += 1) {
          cost += facility.baseCost * Math.pow(FACILITY_COST_MULTIPLIER, level + i);
        }
        return Math.ceil(cost);
      }

      function maxAffordableFacility(id) {
        let qty = 0;
        let total = 0;
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        while (qty < 5000) {
          const next = Math.ceil(facility.baseCost * Math.pow(FACILITY_COST_MULTIPLIER, level + qty));
          if (total + next > state.tp) break;
          total += next;
          qty += 1;
        }
        return qty;
      }

      function recruitCoach(id) {
        const coach = getCoach(id);
        if (!coach) return;
        const currentLevel = state.coaches[id].level;
        if (currentLevel >= coach.maxLevel) return;
        const isNew = currentLevel === 0;
        if (isNew && coachSlotsUsed() >= coachSlotsCap()) {
          toast("Upgrade facilities to open more coach slots.");
          return;
        }
        const cost = coachCost(id);
        if (!spendTrainingPoints(cost)) return;
        state.coaches[id].level += 1;
        if (isNew) state.stats.coachesRecruited += 1;
        toast(`${coach.name} is now level ${state.coaches[id].level}.`);
        checkAchievements();
        renderSoon();
      }

      function coachCost(id) {
        const coach = getCoach(id);
        return Math.ceil(coach.baseCost * Math.pow(coach.growth, state.coaches[id].level));
      }

      function coachTier(level) {
        return COACH_TIERS.reduce((current, tier) => level >= tier.min ? tier : current, COACH_TIERS[0]);
      }

      function nextCoachTier(level) {
        return COACH_TIERS.find(tier => tier.min > level) || null;
      }

      function coachTierProgress(level) {
        const current = coachTier(level);
        const next = nextCoachTier(level);
        if (!next) return 100;
        const span = Math.max(1, next.min - current.min);
        return clamp((level - current.min) / span * 100, 0, 100);
      }

      function recruitAthlete(id) {
        const athlete = getAthlete(id);
        const record = state.athletes[id];
        if (!athlete || record.recruited) return;
        if (!activeAthletes().some(item => item.id === athlete.id)) return;
        if (athletesUsed() >= athleteCap()) {
          toast("Upgrade facilities to create more athlete capacity.");
          return;
        }
        if (!spendTrainingPoints(athlete.baseCost)) return;
        record.recruited = true;
        record.recruitedAt = now();
        record.assigned = state.facilities[athlete.preferredFacilityId].level > 0 ? athlete.preferredFacilityId : "";
        state.stats.athletesRecruited += 1;
        toast(`${athlete.name} joined the academy.`);
        checkAchievements();
        renderSoon();
      }

      function trainAthlete(id) {
        const athlete = getAthlete(id);
        const record = state.athletes[id];
        if (!athlete || !record.recruited || record.skill >= athlete.potential) return;
        const cost = athleteTrainCost(id);
        if (!spendTrainingPoints(cost)) return;
        record.skill += 1;
        record.xp = 0;
        toast(`${athlete.name} improved to skill ${record.skill}.`);
        renderSoon();
      }

      function athleteTrainCost(id) {
        const athlete = getAthlete(id);
        const skill = state.athletes[id].skill;
        return Math.ceil(athlete.trainCost * Math.pow(1.42, skill - 1));
      }

      function assignAthlete(id, facilityId) {
        const athlete = getAthlete(id);
        const record = state.athletes[id];
        if (!record || !record.recruited) return;
        if (!athlete || !activeAthletes().some(item => item.id === athlete.id)) return;
        if (!getFacility(facilityId)) return;
        if (!activeFacilities().some(facility => facility.id === facilityId)) return;
        if (state.facilities[facilityId].level <= 0) {
          toast("Buy that facility before assigning athletes there.");
          return;
        }
        record.assigned = facilityId;
        toast(`${athlete.name} assigned to ${sportLabel(assignedSportId(facilityId), "short")}.`);
        renderSoon();
      }

      function progressAthletes(delta) {
        const xpMult = athleteXPMultiplier();
        CONTENT.athletes.forEach(athlete => {
          const record = state.athletes[athlete.id];
          if (!record.recruited || !record.assigned || record.skill >= athlete.potential) return;
          const facilityLevel = state.facilities[record.assigned].level;
          if (facilityLevel <= 0) return;
          record.xp += delta * xpMult * (1 + facilityLevel * 0.04);
          let leveled = false;
          while (record.skill < athlete.potential && record.xp >= xpNeeded(record.skill)) {
            record.xp -= xpNeeded(record.skill);
            record.skill += 1;
            leveled = true;
          }
          if (leveled) toast(`${athlete.name} gained skill through daily training.`);
        });
      }

      function xpNeeded(skill) {
        return 75 * Math.pow(skill, 1.35);
      }

      function athleteXPMultiplier() {
        return facilityMilestoneMultiplier("athleteXpMultiplier")
          * athleteEffectMultiplier("athleteXpMultiplier")
          * countryEffectMultiplier("athleteXpMultiplier");
      }

      function spawnEvent() {
        if (state.activeEvent || state.eventBonusEnd > now()) return;
        const name = SPONSOR_EVENTS[Math.floor(Math.random() * SPONSOR_EVENTS.length)];
        state.activeEvent = { name, expiresAt: now() + EVENT_EXPIRY_MS };
        state.stats.sponsorshipEventsTriggered += 1;
        renderSoon();
      }

      function claimEvent() {
        if (!state.activeEvent) return;
        const name = state.activeEvent.name;
        state.activeEvent = null;
        state.eventBonusEnd = now() + EVENT_BONUS_MS;
        state.nextEventTime = now() + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS);
        state.stats.sponsorshipEventsClaimed += 1;
        toast(`${name} activated: 5x TP for 5 seconds.`);
        renderSoon();
      }

      function clearExpiredEvent() {
        if (state.activeEvent && state.activeEvent.expiresAt <= now()) {
          state.activeEvent = null;
          state.nextEventTime = now() + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS);
          renderSoon();
        }
      }

      function maybeSpawnCompetition() {
        if (state.activeCompetition || now() < state.nextCompetitionTime) return;
        const unlocked = activeCompetitions().filter(c => calculateIncome({ includeEvent: false }) >= c.unlockIncome);
        if (!unlocked.length) {
          setNextCompetitionTime(now() + 45000);
          return;
        }
        const comp = unlocked[Math.floor(Math.random() * unlocked.length)];
        setActiveCompetition({ id: comp.id, expiresAt: now() + 90000 });
        renderSoon();
      }

      function enterCompetition() {
        if (!state.activeCompetition) return;
        const comp = getCompetition(state.activeCompetition.id);
        if (!comp) return;
        if (!competitionAvailableForCountry(comp)) {
          setActiveCompetition(null);
          setNextCompetitionTime(now() + 45000);
          renderSoon();
          return;
        }
        const power = competitionPower();
        const chance = clamp(0.35 + (power - comp.targetPower) / comp.targetPower * 0.28, 0.18, 0.95);
        const won = Math.random() < chance;
        const rewardMult = competitionRewardMultiplier();
        const reward = comp.baseReward * rewardMult * (won ? 1 + chance : 0.28);
        grantTP(reward, "competition");
        state.stats.competitionsEntered += 1;
        if (won) {
          state.stats.competitionsWon += 1;
          const progress = ensureCountryProgress(state.currentCountryId);
          progress.competitionsWon += 1;
          state.moraleBoostEnd = now() + 15000;
        }
        setLastCompetitionResult({
          competitionId: comp.id,
          name: comp.name,
          type: competitionTypeLabel(comp),
          won,
          outcome: won ? "Win" : "Participation Reward",
          reward,
          chance,
          power,
          targetPower: comp.targetPower,
          timestamp: now()
        });
        setActiveCompetition(null);
        setNextCompetitionTime(now() + randomBetween(85000, 135000));
        toast(`${won ? "Won" : "Entered"} ${comp.name}: +${fmt(reward)} TP${won ? " and 1.5x momentum." : "."}`);
        checkAchievements();
        checkCountryProgress();
        saveState();
        renderSoon();
      }

      function expireCompetition() {
        if (state.activeCompetition && state.activeCompetition.expiresAt <= now()) {
          setActiveCompetition(null);
          setNextCompetitionTime(now() + randomBetween(70000, 120000));
          renderSoon();
        }
      }

      function competitionPower() {
        const comp = state.activeCompetition ? getCompetition(state.activeCompetition.id) : null;
        const sportIds = comp ? comp.sportIds : activeSports().map(sport => sport.id);
        const facilityPower = sportIds.reduce((sum, sportId) => sum + facilitiesForSport(sportId).reduce((sportSum, f) => sportSum + state.facilities[f.id].level * 1.5, 0), 0);
        const athletePower = sportIds.reduce((sum, sportId) => sum + athletePowerForSport(sportId), 0);
        const coachPower = CONTENT.coaches.reduce((sum, c) => sum + state.coaches[c.id].level * 7, 0);
        return facilityPower + athletePower + coachPower + calculateIncome({ includeEvent: false }) * 3;
      }

      function competitionRewardMultiplier() {
        return facilityMilestoneMultiplier("competitionRewardMultiplier")
          * athleteEffectMultiplier("competitionRewardMultiplier")
          * countryEffectMultiplier("competitionRewardMultiplier");
      }

      function openPrestigeConfirm() {
        if (state.seasonTPEarned < PRESTIGE_UNLOCK) return;
        showModal(
          "Championship Trial",
          `<p>This will reset TP, facilities, coaches, and athletes for a new season. Your Championship Trophies stay permanent.</p>
           <div class="result-box">You will gain <b>1 Championship Trophy</b>. New permanent trophy multiplier: <b>${fmtMult(Math.pow(1.1, state.trophies + 1))}</b>.</div>`,
          [
            { label: "Run Championship Trial", action: "confirm-prestige", kind: "primary" },
            { label: "Keep Training", action: "close-modal" }
          ]
        );
      }

      function prestigeReset() {
        if (state.seasonTPEarned < PRESTIGE_UNLOCK) return;
        const summary = {
          runTP: state.seasonTPEarned,
          totalTP: state.totalTPEarned,
          trophiesBefore: state.trophies,
          highest: state.stats.highestFacilityLevel,
          duration: now() - state.runStart
        };
        const keep = {
          totalTPEarned: state.totalTPEarned,
          trophies: state.trophies + 1,
          medals: state.medals,
          reputation: state.reputation,
          academy: { ...state.academy },
          migration: JSON.parse(JSON.stringify(state.migration)),
          onboarding: { ...state.onboarding },
          tutorialSeen: state.tutorialSeen,
          achievements: { ...state.achievements },
          settings: { ...state.settings },
          stats: { ...state.stats },
          currentCountryId: state.currentCountryId,
          unlockedCountryIds: [...state.unlockedCountryIds],
          completedCountryIds: [...state.completedCountryIds],
          countryProgress: JSON.parse(JSON.stringify(state.countryProgress)),
          seasonNumber: state.seasonNumber + 1
        };
        keep.stats.prestiges += 1;
        state = createDefaultState();
        state.totalTPEarned = keep.totalTPEarned;
        state.trophies = keep.trophies;
        state.medals = keep.medals;
        state.reputation = keep.reputation;
        state.academy = keep.academy;
        state.migration = keep.migration;
        state.onboarding = keep.onboarding;
        state.tutorialSeen = keep.tutorialSeen;
        state.achievements = keep.achievements;
        state.settings = keep.settings;
        state.stats = keep.stats;
        state.currentCountryId = keep.currentCountryId;
        state.unlockedCountryIds = keep.unlockedCountryIds;
        state.completedCountryIds = keep.completedCountryIds;
        state.countryProgress = keep.countryProgress;
        state.seasonNumber = keep.seasonNumber;
        state.runStart = now();
        state.campuses = createCampusContainer({}, state);
        syncArchitectureContainers(state, { source: "legacy" });
        saveState();
        showModal(
          "Season Complete",
          `<div class="metric-row">
             <div class="metric"><b>${fmt(summary.runTP)} TP</b><span>Earned this run</span></div>
             <div class="metric"><b>${fmt(summary.totalTP)} TP</b><span>Total all-time</span></div>
             <div class="metric"><b>+1</b><span>Trophies gained</span></div>
             <div class="metric"><b>${fmtMult(Math.pow(1.1, state.trophies))}</b><span>New multiplier</span></div>
             <div class="metric"><b>${summary.highest}</b><span>Highest facility</span></div>
             <div class="metric"><b>${formatDuration(summary.duration)}</b><span>Run duration</span></div>
           </div>`,
          [
            { label: "Start New Season", action: "close-modal", kind: "primary" }
          ]
        );
        renderSoon();
      }

      function checkAchievements() {
        const checks = {
          firstDrill: state.stats.totalClicks >= 1,
          firstClickUpgrade: state.stats.clickUpgradesBought >= 1,
          firstFacility: state.stats.facilitiesBought >= 1,
          firstCoach: state.stats.coachesRecruited >= 1,
          firstAthlete: state.stats.athletesRecruited >= 1,
          firstCompetition: state.stats.competitionsEntered >= 1,
          tenKSeason: state.seasonTPEarned >= 10000
        };
        CONTENT.achievements.forEach(item => {
          if (!state.achievements[item.id] && checks[item.id]) {
            state.achievements[item.id] = true;
            if (item.rewardTP) grantTP(item.rewardTP, "achievement");
            toast(`Achievement: ${item.name}. Reward +${fmt(item.rewardTP)} TP.`);
          }
        });
      }

      function render() {
        applyAcademyTheme();
        document.body.classList.toggle("no-animations", !state.settings.animations);
        renderAcademyHeader();
        renderResourceBar();
        renderTopStats();
        renderTabs();
        renderEventPopup();
        const tab = state.ui.activeTab;
        const app = document.getElementById("app");
        app.innerHTML = [
          tab === "home" ? renderHomeTab() : "",
          tab === "academy" ? renderAcademyTab() : "",
          tab === "sports" ? renderSportsTab() : "",
          tab === "events" ? renderEventsTab() : "",
          tab === "world" ? renderWorldTab() : "",
          renderPinnedDrill()
        ].join("");
        exposeDeveloperMigrationTools();
        lastRender = now();
      }

      function renderAcademyHeader() {
        const header = document.getElementById("academyHeader");
        const country = currentCountry();
        header.innerHTML = `
          ${renderAcademyCrest()}
          <div class="academy-header-copy">
            <div class="academy-kicker">My Academy</div>
            <div class="academy-name-line">
              <div class="academy-title">${escapeHTML(state.academy.name)}</div>
              <span class="pill academy-rank-pill">${academyRankByReputation()}</span>
            </div>
            <div class="academy-motto">${escapeHTML(state.academy.motto)}</div>
            <div class="academy-header-meta">
              <span class="pill">${countryFlag(country)} ${escapeHTML(country.name)}</span>
              <span class="pill">Rep ${fmt(state.reputation)}</span>
            </div>
          </div>
        `;
      }

      function renderResourceBar() {
        const bar = document.getElementById("resourceBar");
        const country = currentCountry();
        const accent = country.accent || sportAccent(country.sportIds[0]);
        bar.style.setProperty("--accent", accent);
        bar.innerHTML = `
          <div class="resource-country">
            <span class="resource-flag" aria-hidden="true">${countryFlag(country)}</span>
            <span class="resource-country-name">${country.name}</span>
          </div>
          <div class="resource-stat"><span>TP</span><strong>${fmt(state.tp)}</strong></div>
          <div class="resource-stat"><span>TP/sec</span><strong>${fmt(calculateIncome())}</strong></div>
        `;
      }

      function renderTopStats() {
        const top = document.getElementById("topStats");
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const completeClass = progress.isComplete ? "good" : "";
        const next = nextCountry();
        const nextLabel = next ? `Next: ${countryFlag(next)} ${next.name}` : "Final chapter path pending";
        top.innerHTML = `
          <section class="world-hero" style="--accent:${country.accent || sportAccent(country.sportIds[0])}">
            <button class="world-summary" data-action="toggle-world-summary" aria-expanded="${worldHeaderExpanded}" aria-label="${worldHeaderExpanded ? "Collapse" : "Expand"} World Tour chapter details">
              <div class="world-summary-copy">
                <div class="world-kicker">World Tour Chapter</div>
                <div class="world-title">${country.name} Academy - ${progress.percent}%</div>
                <div class="world-subtitle">${nextLabel}</div>
              </div>
              <div class="world-actions">
                <span class="pill ${completeClass}">${progress.completed}/${progress.total}</span>
                <span class="pill">${worldHeaderExpanded ? "Less" : "More"}</span>
                <div class="country-token">${countryFlag(country)}</div>
              </div>
            </button>
            <div class="chapter-progress" aria-hidden="true"><div class="chapter-fill" style="width:${progress.percent}%"></div></div>
            ${worldHeaderExpanded ? `
              <div class="world-details">
                <div class="chapter-line">

      function renderAcademyMissionCard() {

      function renderOrientationCard() {
