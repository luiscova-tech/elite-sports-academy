      function migrateSaveState(raw) {
        const migrated = { ...raw };
        const version = Math.max(1, Math.floor(cleanNumber(migrated.saveVersion, 1)));
        if (version < 2) {
          migrated.clickUpgrades = migrated.clickUpgrades || {};
          CONTENT.clickUpgrades.forEach(upgrade => {
            if (!migrated.clickUpgrades[upgrade.id]) migrated.clickUpgrades[upgrade.id] = { level: 0 };
          });
        }
        if (version < 3) {
          migrated.currentCountryId = migrated.currentCountryId || "usa";
          migrated.unlockedCountryIds = Array.isArray(migrated.unlockedCountryIds) ? migrated.unlockedCountryIds : ["usa"];
          migrated.completedCountryIds = Array.isArray(migrated.completedCountryIds) ? migrated.completedCountryIds : [];
        }
        if (version < 4) {
          migrated.settings = migrated.settings && typeof migrated.settings === "object" ? migrated.settings : {};
          if (typeof migrated.settings.pinSessionDrill !== "boolean") migrated.settings.pinSessionDrill = false;
          if (typeof migrated.settings.confirmPrestige !== "boolean") migrated.settings.confirmPrestige = true;
          if (migrated.ui && typeof migrated.ui === "object") {
            if (migrated.ui.activeTab === "academy") migrated.ui.activeTab = "home";
            if (migrated.ui.activeTab === "staff") migrated.ui.activeTab = "academy";
            if (migrated.ui.activeTab === "progress") migrated.ui.activeTab = "world";
          }
        }
        if (version < 5) {
          const legacyCompletedCount = Array.isArray(migrated.completedCountryIds) ? migrated.completedCountryIds.length : 0;
          migrated.medals = Math.max(0, Math.floor(cleanNumber(migrated.medals, legacyCompletedCount)));
          migrated.reputation = Math.max(0, Math.floor(cleanNumber(migrated.reputation, legacyCompletedCount * 100)));
          migrated.countryProgress = migrated.countryProgress && typeof migrated.countryProgress === "object" ? migrated.countryProgress : {};
          CONTENT.countries.forEach(country => {
            const saved = migrated.countryProgress[country.id] && typeof migrated.countryProgress[country.id] === "object" ? migrated.countryProgress[country.id] : {};
            const wasCompleted = Array.isArray(migrated.completedCountryIds) && migrated.completedCountryIds.includes(country.id);
            migrated.countryProgress[country.id] = {
              ...createCountryProgressRecord(),
              ...saved,
              chapterTPEarned: Math.max(0, cleanNumber(saved.chapterTPEarned, country.id === "usa" ? cleanNumber(migrated.seasonTPEarned, 0) : 0)),
              completedGoalIds: Array.isArray(saved.completedGoalIds) ? saved.completedGoalIds : [],
              rewardClaimed: Boolean(saved.rewardClaimed || wasCompleted),
              completedAt: cleanNumber(saved.completedAt, wasCompleted ? now() : 0),
              rewardClaimedAt: cleanNumber(saved.rewardClaimedAt, wasCompleted ? now() : 0)
            };
          });
        }
        if (version < 6) {
          migrated.countryProgress = migrated.countryProgress && typeof migrated.countryProgress === "object" ? migrated.countryProgress : {};
          CONTENT.countries.forEach(country => {
            const saved = migrated.countryProgress[country.id] && typeof migrated.countryProgress[country.id] === "object" ? migrated.countryProgress[country.id] : {};
            migrated.countryProgress[country.id] = {
              ...createCountryProgressRecord(),
              ...saved,
              competitionsWon: Math.max(0, Math.floor(cleanNumber(saved.competitionsWon, 0)))
            };
          });
        }
        if (version < 7) {
          migrated.academy = normalizeAcademyIdentity(migrated.academy, defaultAcademyIdentity(cleanNumber(migrated.runStart, now())));
        }
        if (version < 8) {
          migrated.onboarding = normalizeOnboarding(migrated.onboarding, migrated);
        }
        migrated.saveVersion = SAVE_VERSION;
        return migrated;
      }

      function normalizeIdList(value, collection, fallback) {
        const valid = new Set(collection.map(item => item.id));
        const list = Array.isArray(value) ? value : fallback;
        const normalized = list.filter(id => valid.has(id));
        return normalized.length ? [...new Set(normalized)] : [...fallback];
      }

      function createCountryProgressRecord() {
        return {
          completedGoalIds: [],
          chapterTPEarned: 0,
          competitionsWon: 0,
          completedAt: 0,
          rewardClaimed: false,
          rewardClaimedAt: 0
        };
      }

      function normalizeCountryProgress(rawProgress, rawSave = {}) {
        const progress = {};
        const completedCountries = Array.isArray(rawSave.completedCountryIds) ? rawSave.completedCountryIds : [];
        CONTENT.countries.forEach(country => {
          const saved = rawProgress && typeof rawProgress === "object" && rawProgress[country.id] && typeof rawProgress[country.id] === "object"
            ? rawProgress[country.id]
            : {};
          const goals = countryChapterGoals(country);
          const validGoalIds = new Set(goals.map(goal => goal.id));
          const rewardClaimed = Boolean(saved.rewardClaimed || completedCountries.includes(country.id));
          const completedGoalIds = Array.isArray(saved.completedGoalIds)
            ? saved.completedGoalIds.filter(id => validGoalIds.has(id))
            : [];
          progress[country.id] = {
            ...createCountryProgressRecord(),
            completedGoalIds: rewardClaimed ? goals.map(goal => goal.id) : [...new Set(completedGoalIds)],
            chapterTPEarned: Math.max(0, cleanNumber(saved.chapterTPEarned, country.id === "usa" ? cleanNumber(rawSave.seasonTPEarned, 0) : 0)),
            competitionsWon: Math.max(0, Math.floor(cleanNumber(saved.competitionsWon, 0))),
            completedAt: cleanNumber(saved.completedAt, rewardClaimed ? now() : 0),
            rewardClaimed,
            rewardClaimedAt: cleanNumber(saved.rewardClaimedAt, rewardClaimed ? now() : 0)
          };
        });
        return progress;
      }

      function refreshUnlockedCountriesForState(targetState) {
        if (!targetState.unlockedCountryIds.includes("usa")) targetState.unlockedCountryIds.push("usa");
        CONTENT.countries.forEach(country => {
          if (countryUnlockRequirementsMetForState(country, targetState) && !targetState.unlockedCountryIds.includes(country.id)) {
            targetState.unlockedCountryIds.push(country.id);
          }
        });
        targetState.unlockedCountryIds = normalizeIdList(targetState.unlockedCountryIds, CONTENT.countries, ["usa"]);
      }

      function countryUnlockRequirementsMetForState(country, targetState) {
        const requirements = country.unlockRequirements || [];
        if (!requirements.length) return country.id === "usa";
        return requirements.every(requirement => {
          if (requirement.type === "countryCompleted") return targetState.completedCountryIds.includes(requirement.countryId);
          if (requirement.type === "countryUnlocked") return targetState.unlockedCountryIds.includes(requirement.countryId);
          return false;
        });
      }

      function cleanNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function trimText(value, fallback, maxLength) {
        const text = String(value || "").replace(/\s+/g, " ").trim();
        return (text || fallback).slice(0, maxLength);
      }

      function normalizeAcademyIdentity(raw, fallback = defaultAcademyIdentity()) {
        const saved = raw && typeof raw === "object" ? raw : {};
        const fallbackIdentity = fallback && typeof fallback === "object" ? fallback : defaultAcademyIdentity();
        const crest = ACADEMY_CRESTS.some(item => item.id === saved.crestId) ? saved.crestId : fallbackIdentity.crestId;
        const theme = ACADEMY_THEMES.some(item => item.id === saved.themeId) ? saved.themeId : fallbackIdentity.themeId;
        return {
          name: trimText(saved.name, fallbackIdentity.name, 32),
          motto: trimText(saved.motto, fallbackIdentity.motto, 72),
          crestId: crest,
          themeId: theme,
          foundedAt: cleanNumber(saved.foundedAt, fallbackIdentity.foundedAt || now())
        };
      }

      function normalizeOnboarding(raw, rawSave = {}) {
        const legacySeen = Boolean(rawSave && rawSave.tutorialSeen);
        const saved = raw && typeof raw === "object" ? raw : null;
        const base = defaultOnboardingState();
        if (!saved && legacySeen) {
          return {
            ...base,
            completed: true,
            dismissed: true,
            introSeen: true,
            identityConfirmed: true,
            chapterReviewed: true,
            worldTourViewed: true,
            firstCompetitionBriefed: true
          };
        }
        const normalized = { ...base };
        if (!saved && rawSave && typeof rawSave.academy === "object") normalized.identityConfirmed = true;
        if (saved) {
          Object.keys(base).forEach(key => {
            normalized[key] = typeof saved[key] === "boolean" ? saved[key] : base[key];
          });
        }
        return normalized;
      }

      function normalizeCompetitionResult(raw) {
        if (!raw || typeof raw !== "object") return null;
        const comp = getCompetition(raw.competitionId);
        if (!comp) return null;
        return {
          competitionId: comp.id,
          name: String(raw.name || comp.name),
          type: String(raw.type || competitionTypeLabel(comp)),
          won: Boolean(raw.won),
          outcome: String(raw.outcome || (raw.won ? "Win" : "Participation Reward")),
          reward: Math.max(0, cleanNumber(raw.reward, 0)),
          chance: clamp(cleanNumber(raw.chance, 0), 0, 1),
          power: Math.max(0, cleanNumber(raw.power, 0)),
          targetPower: Math.max(0, cleanNumber(raw.targetPower, comp.targetPower)),
          timestamp: cleanNumber(raw.timestamp, now())
        };
      }

      function academyTheme() {
        return ACADEMY_THEMES.find(theme => theme.id === state.academy.themeId) || ACADEMY_THEMES[0];
      }

      function academyCrest() {
        return ACADEMY_CRESTS.find(crest => crest.id === state.academy.crestId) || ACADEMY_CRESTS[0];
      }

      function academyRankByReputation(score = state.reputation) {
        return ACADEMY_RANKS.reduce((rank, item) => score >= item.min ? item : rank, ACADEMY_RANKS[0]).label;
      }

      function applyAcademyTheme() {
        const theme = academyTheme();
        document.documentElement.style.setProperty("--academy-accent", theme.accent);
        document.documentElement.style.setProperty("--academy-accent-2", theme.accent2);
      }

      function renderAcademyCrest(size = "") {
        const crest = academyCrest();
        return `<span class="academy-crest ${crest.className} ${size}" aria-hidden="true"><span>${escapeHTML(crest.mark)}</span></span>`;
      }

      function escapeHTML(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function academyIcon(type) {
        const icons = {
          home: `<path d="M4 11.5 12 5l8 6.5"/><path d="M6.5 10.5V20h11v-9.5"/><path d="M10 20v-5h4v5"/>`,
          sports: `<path d="M4 18c3-5 7-8 16-8"/><path d="M4 14c4-3 8-5 16-5"/><path d="M7 20h10"/><path d="M8 7h8"/>`,
          academy: `<path d="M5 9l7-4 7 4-7 4-7-4Z"/><path d="M7 11v4c2.4 2 7.6 2 10 0v-4"/><path d="M19 10v5"/>`,
          events: `<path d="M7 20h10"/><path d="M9 20v-4"/><path d="M15 20v-4"/><path d="M7 5h10v4a5 5 0 0 1-10 0V5Z"/><path d="M7 7H4v2a3 3 0 0 0 3 3"/><path d="M17 7h3v2a3 3 0 0 1-3 3"/>`,
          world: `<circle cx="12" cy="12" r="8"/><path d="M12 4c2 2.1 3 4.7 3 8s-1 5.9-3 8"/><path d="M12 4c-2 2.1-3 4.7-3 8s1 5.9 3 8"/><path d="M4.5 12h15"/>`,
          track: `<path d="M4 18c4-7 9-10 16-10"/><path d="M4 14c5-4 10-6 16-6"/><path d="M5 20h14"/>`,
          aquatics: `<path d="M4 10c2 0 2-1.4 4-1.4s2 1.4 4 1.4 2-1.4 4-1.4 2 1.4 4 1.4"/><path d="M4 15c2 0 2-1.4 4-1.4s2 1.4 4 1.4 2-1.4 4-1.4 2 1.4 4 1.4"/><path d="M6 19h12"/>`,
          cycling: `<circle cx="7" cy="16" r="3"/><circle cx="17" cy="16" r="3"/><path d="M7 16l4-7 3 7H7Z"/><path d="M11 9h3"/><path d="M13 7h3"/>`,
          soccer: `<rect x="4" y="6" width="16" height="12" rx="2"/><path d="M12 6v12"/><circle cx="12" cy="12" r="2.5"/><path d="M4 10h3v4H4"/><path d="M20 10h-3v4h3"/>`,
          coach: `<path d="M7 8h10"/><path d="M7 12h7"/><path d="M7 16h5"/><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M9 4.5V3h6v1.5"/>`,
          athlete: `<circle cx="12" cy="6.5" r="2.5"/><path d="M8 21v-5l4-3 4 3v5"/><path d="M7 12l5-3 5 3"/>`,
          ticket: `<path d="M5 7h14v10H5z"/><path d="M8 7v10"/><path d="M11 10h5"/><path d="M11 14h4"/>`,
          whistle: `<path d="M6 14a5 5 0 1 0 5-5H8l-2 5Z"/><path d="M11 9l6-4"/><path d="M16 5l2 2"/>`
        };
        const body = icons[type] || icons.home;
        return `<svg class="academy-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">${body}</svg>`;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            state = createDefaultState();
            return;
          }
          state = normalizeState(JSON.parse(raw));
        } catch (err) {
          state = createDefaultState();
          queueMicrotask(() => toast("Save data was unreadable, so a fresh academy was started."));
        }
      }

      function saveState() {
        state.saveVersion = SAVE_VERSION;
        state.lastSave = now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function applyOfflineProgress() {
        const current = now();
        const elapsed = Math.max(0, current - cleanNumber(state.lastSave, current));
        const capped = Math.min(elapsed, OFFLINE_CAP_MS);
        const result = simulateTrainingTime(capped, {
          startTime: current - capped,
          includeEvent: false,
          includeMorale: false,
          progressAthletes: false,
          countPlayTime: false,
          source: "offline"
        });
        if (result.earned > 0) {
          state.stats.totalOfflineIncome += result.earned;
          offlineReport = {
            elapsed,
            capped,
            earned: result.earned,
            passive: result.seconds > 0 ? result.earned / result.seconds : 0,
            multiplier: permanentMultiplier()
          };
        }
        state.lastTick = current;
        state.lastSave = current;
        if (state.eventBonusEnd < current) state.eventBonusEnd = 0;
        if (state.moraleBoostEnd < current) state.moraleBoostEnd = 0;
      }

      function simulateTrainingTime(elapsedMs, options = {}) {
        const totalMs = Math.max(0, cleanNumber(elapsedMs, 0));
        if (totalMs <= 0) return { earned: 0, seconds: 0 };
        const endTime = cleanNumber(options.endTime, now());
        const startTime = cleanNumber(options.startTime, endTime - totalMs);
        let cursor = startTime;
        let earned = 0;
        let seconds = 0;
        let guard = 0;

        while (cursor < endTime && guard < 20) {
          const next = nextSimulationBoundary(cursor, endTime, options);
          const segmentMs = Math.max(0, next - cursor);
          const segmentSeconds = segmentMs / 1000;
          if (segmentSeconds > 0) {
            const income = calculateIncome({
              includeEvent: options.includeEvent !== false,
              includeMorale: options.includeMorale !== false
            }, cursor) * segmentSeconds;
            if (income > 0) {
              grantTP(income, options.source || "passive");
              earned += income;
            }
            if (options.progressAthletes !== false) progressAthletes(segmentSeconds);
            if (options.countPlayTime) state.stats.totalPlaySeconds += segmentSeconds;
            seconds += segmentSeconds;
          }
          cursor = next;
          guard += 1;
          if (segmentMs <= 0) break;
        }

        return { earned, seconds };
      }

      function nextSimulationBoundary(cursor, endTime, options) {
        let next = endTime;
        if (options.includeEvent !== false && state.eventBonusEnd > cursor && state.eventBonusEnd < next) {
          next = state.eventBonusEnd;
        }
        if (options.includeMorale !== false && state.moraleBoostEnd > cursor && state.moraleBoostEnd < next) {
          next = state.moraleBoostEnd;
        }
        return next;
      }

      function grantTP(amount, source) {
        const safe = Math.max(0, cleanNumber(amount, 0));
        if (safe <= 0) return;
        state.tp += safe;
        state.totalTPEarned += safe;
        state.seasonTPEarned += safe;
        ensureCountryProgress(state.currentCountryId).chapterTPEarned += safe;
        if (source === "click") state.stats.totalClickIncome += safe;
        if (source === "passive") state.stats.totalPassiveIncome += safe;
        if (source === "competition") state.stats.totalCompetitionIncome += safe;
      }

      function permanentMultiplier() {
        const trophy = Math.pow(1.1, state.trophies);
        const achievements = 1 + CONTENT.achievements.reduce((sum, item) => {
          return sum + (state.achievements[item.id] ? item.rewardMult : 0);
        }, 0);
        return trophy * achievements;
      }

      function temporaryMultiplier(options = {}, atTime = now()) {
        let mult = 1;
        if (options.includeEvent !== false && state.eventBonusEnd > atTime) mult *= 5;
        if (options.includeMorale !== false && state.moraleBoostEnd > atTime) mult *= 1.5;
        return mult;
      }

      function calculateIncome(options = {}, atTime = now()) {
        const total = activeSports().reduce((sum, sport) => sum + calculateSportIncome(sport.id, options), 0);
        return total * temporaryMultiplier(options, atTime);
      }

      function calculateSportIncome(sportId, options = {}) {
        return facilitiesForSport(sportId).reduce((sum, facility) => {
          return sum + calculateFacilityIncome(facility.id, options);
        }, 0);
      }

      function calculateFacilityIncome(id, options = {}) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        if (!facility || level <= 0) return 0;
        let mult = permanentMultiplier();
        mult *= 1 + Math.floor(level / 10) * 0.05;
        mult *= facilityMilestoneMultiplier("academyOutputMultiplier");
        mult *= coachSportBonus(facility.sportId);
        mult *= athleteSportBonus(facility.sportId);
        return level * facility.baseIncome * mult;
      }

      function coachSportBonus(sportId) {
        let mult = 1;
        CONTENT.coaches.forEach(coach => {
          const level = state.coaches[coach.id].level;
          if (level <= 0) return;
          coach.effects
            .filter(effect => effect.type === "sportOutputMultiplier" && effect.sportId === sportId)
            .forEach(effect => {
              mult *= 1 + level * effect.perLevel;
            });
        });
        return mult;
      }

      function athleteSportBonus(sportId) {
        let mult = 1;
        CONTENT.athletes.forEach(athlete => {
          const record = state.athletes[athlete.id];
          if (!record.recruited) return;
          athlete.effects
            .filter(effect => effect.type === "sportOutputMultiplier" && effect.sportId === sportId)
            .forEach(effect => {
              if (effect.requiresAssignedSport && assignedSportId(record.assigned) !== sportId) return;
              mult *= 1 + record.skill * effect.perSkill;
            });
        });
        return mult;
      }

      function clickReward() {
        let drillMult = permanentMultiplier();
        drillMult *= coachClickBonus();
        drillMult *= facilityMilestoneMultiplier("clickMultiplier");
        drillMult *= athleteEffectMultiplier("clickMultiplier");
        const directReward = baseClickPower() * drillMult;
        const passiveSync = calculateIncome({ includeEvent: false, includeMorale: false }) * clickPassiveSeconds();
        return (directReward + passiveSync) * temporaryMultiplier({ includeMorale: false });
      }

      function handleDrill(event, button) {
        const reward = clickReward();
        grantTP(reward, "click");
        state.stats.totalClicks += 1;
        if (state.settings.floatingNumbers) {
          const rect = button.getBoundingClientRect();
          showFloating(`+${fmt(reward)} TP`, rect.left + rect.width / 2, rect.top + 18);
        }
        checkAchievements();
        checkCountryProgress();
        renderSoon();
      }

      function baseClickPower() {
        return 1 + CONTENT.clickUpgrades.reduce((sum, upgrade) => {
          return sum + state.clickUpgrades[upgrade.id].level * upgrade.powerPerLevel;
        }, 0);
      }

      function clickPassiveSeconds() {
        return CONTENT.clickUpgrades.reduce((sum, upgrade) => {
          return sum + state.clickUpgrades[upgrade.id].level * upgrade.passiveSecondsPerLevel;
        }, 0);
      }

      function coachClickBonus() {
        let mult = 1;
        CONTENT.coaches.forEach(coach => {
          const level = state.coaches[coach.id].level;
          if (level <= 0) return;
          coach.effects
            .filter(effect => effect.type === "clickMultiplier")
            .forEach(effect => {
              mult *= 1 + level * effect.perLevel;
            });
        });
        return mult;
      }

      function activeClickProgram() {
        for (let i = CONTENT.clickUpgrades.length - 1; i >= 0; i -= 1) {
          const upgrade = CONTENT.clickUpgrades[i];
          if (state.clickUpgrades[upgrade.id].level > 0) return upgrade;
        }
        return CONTENT.clickUpgrades[0];
      }

      function nextClickUpgrade() {
        let lockedCandidate = null;
        for (const upgrade of CONTENT.clickUpgrades) {
          const level = state.clickUpgrades[upgrade.id].level;
          if (level >= upgrade.maxLevel) continue;
          if (clickUpgradeUnlocked(upgrade)) return upgrade;
          if (!lockedCandidate) lockedCandidate = upgrade;
        }
        return lockedCandidate;
      }

      function unlockedClickUpgradeChoices() {
        return CONTENT.clickUpgrades.filter(upgrade => {
          const level = state.clickUpgrades[upgrade.id].level;
          return level < upgrade.maxLevel && clickUpgradeUnlocked(upgrade);
        });
      }

      function recommendedClickUpgradeChoice() {
        const choices = unlockedClickUpgradeChoices();
        const affordable = choices.filter(upgrade => state.tp >= clickUpgradeCost(upgrade.id));
        if (affordable.length) {
          return affordable.sort((a, b) => clickUpgradeCost(a.id) - clickUpgradeCost(b.id))[0];
        }
        return choices[0] || nextClickUpgrade();
      }

      function nextLockedClickUpgrade() {
        return CONTENT.clickUpgrades.find(upgrade => {
          const level = state.clickUpgrades[upgrade.id].level;
          return level < upgrade.maxLevel && !clickUpgradeUnlocked(upgrade);
        }) || null;
      }

      function clickUpgradeCost(id) {
        const upgrade = getClickUpgrade(id);
        const level = state.clickUpgrades[id].level;
        return Math.ceil(upgrade.baseCost * Math.pow(upgrade.growth, level));
      }

      function buyClickUpgrade(id) {
        const upgrade = getClickUpgrade(id);
        if (!upgrade || !clickUpgradeUnlocked(upgrade)) return;
        const record = state.clickUpgrades[id];
        if (record.level >= upgrade.maxLevel) return;
        const cost = clickUpgradeCost(id);
        if (state.tp < cost) return;
        state.tp -= cost;
        record.level += 1;
        state.stats.clickUpgradesBought += 1;
        toast(`${upgrade.name} upgraded to level ${record.level}.`);
        checkAchievements();
        checkCountryProgress();
        renderSoon();
      }

      function clickUpgradeUnlocked(upgrade) {
        if (!upgrade.requires) return true;
        return state.clickUpgrades[upgrade.requires.id].level >= upgrade.requires.level;
      }

      function clickUpgradeRequirementLabel(upgrade) {
        if (!upgrade.requires) return "Unlocked";
        const required = getClickUpgrade(upgrade.requires.id);
        return `${required.name} level ${upgrade.requires.level}`;
      }

      function recommendedNextAction() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        if (progress.readyToClaim) {
          const next = nextCountry(country);
          const playableNext = nextPlayableCountry(country);
          return {
            title: `Claim ${country.name} Chapter Reward`,
            note: `${country.name} is complete. Open World Tour and claim the reward when you are ready.`,
            reason: "Reward",
            cta: playableNext ? `Review ${playableNext.name} Unlock` : next ? `Review ${next.name} Unlock` : "Open World Tour",
            action: "navigate-guide",
            dataset: { tab: "world", "guide-type": "country", "guide-id": country.id },
            accent: country.accent
          };
        }
        if (!progress.total) {
          return {
            title: `Review ${country.name} Tour Plan`,
            note: `${country.name} is unlocked, but its chapter goals are planned for a later milestone. Use World Tour to review destinations and rewards.`,
            reason: "Tour",
            cta: "Open World Tour",
            action: "navigate-guide",
            dataset: { tab: "world", "guide-type": "route", "guide-id": country.id },
            accent: country.accent
          };
        }

        const goalPriority = [
          ["facilityLevel"],
          ["countryCompetitionsWon", "competitionsWon"],
          ["highestAthleteSkill"],
          ["chapterTPEarned", "seasonTPEarned", "totalTPEarned"]
        ];
        for (const types of goalPriority) {
          const goal = progress.goals.find(item => !item.complete && types.includes(item.type));
          if (!goal) continue;
          const goalRecommendation = recommendationForGoal(goal);
          if (goalRecommendation) return goalRecommendation;
        }

        if (state.activeCompetition) return competitionRecommendation();

        const athlete = nextAthleteAction();
        if (athlete) return athlete;

        const coach = nextAffordableCoach();
        if (coach) return coach;

        const clickUpgrade = nextAffordableClickUpgrade();
        if (clickUpgrade) return clickUpgrade;

        return {
          title: "Review the World Tour",
          note: "Check the current chapter, future destinations, and long-term academy rewards.",
          reason: "Guide",
          cta: "Open World Tour",
          action: "navigate-guide",
          dataset: { tab: "world", "guide-type": "route", "guide-id": state.currentCountryId },
          accent: "var(--teal)"
        };
      }

      function recommendationForGoal(goal) {
        if (goal.type === "facilityLevel") {
          const facility = getFacility(goal.facilityId);
          if (!facility) return null;
          const cost = facilityCost(facility.id, 1);
          const level = state.facilities[facility.id].level;
          if (state.tp >= cost) {
            return {
              title: `Upgrade ${facility.name}`,
              note: `${facility.short} is level ${level}/${goal.target}. Open Sports Center and buy the next level there.`,
              reason: "Goal",
              cta: "Open Sports Center",
              action: "navigate-guide",
              dataset: { tab: "sports", "guide-type": "facility", "guide-id": facility.id },
              accent: facility.accent
            };
          }
          return {
            title: `Upgrade ${facility.name}`,
            note: `${facility.short} needs level ${goal.target}. Next level costs ${fmt(cost)} TP.`,
            reason: "Goal",
            cta: "Open Sports Center",
            action: "navigate-guide",
            dataset: { tab: "sports", "guide-type": "facility", "guide-id": facility.id },
            accent: facility.accent
          };
        }

        if (goal.type === "competitionsWon" || goal.type === "countryCompetitionsWon") {
          if (state.activeCompetition) return competitionRecommendation();
          return {
            title: "Prepare for Competitions",
            note: `${goal.currentLabel}/${goal.targetLabel} wins complete. Watch for the next competition offer and improve team power.`,
            reason: "Goal",
            cta: "Open Competitions",
            action: "navigate-guide",
            dataset: { tab: "events", "guide-type": "competition", "guide-id": state.activeCompetition ? state.activeCompetition.id : "" },
            accent: "var(--gold)"
          };
        }

        if (goal.type === "highestAthleteSkill") {
          const athlete = nextAthleteAction();
          if (athlete) return athlete;
          return {
            title: "Develop an Athlete",
            note: `${goal.currentLabel}/${goal.targetLabel} skill reached. Recruit or train an athlete to complete this chapter goal.`,
            reason: "Technique",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": "" },
            accent: "#4ade80"
          };
        }

        if (goal.type === "chapterTPEarned" || goal.type === "seasonTPEarned" || goal.type === "totalTPEarned") {
          const clickUpgrade = nextAffordableClickUpgrade();
          if (clickUpgrade) return clickUpgrade;
          return {
            title: "Run Session Drill",
            note: `${goal.currentLabel}/${goal.targetLabel} TP earned for this goal. Tapping and passive income both move the chapter forward.`,
            reason: "Goal",
            cta: "Focus Session Drill",
            action: "navigate-guide",
            dataset: { tab: "home", "guide-type": "drill", "guide-id": "session" },
            accent: "var(--teal)"
          };
        }

        return null;
      }

      function competitionRecommendation() {
        const comp = state.activeCompetition ? getCompetition(state.activeCompetition.id) : null;
        return {
          title: comp ? `Enter ${comp.name}` : "Enter Competition",
          note: comp ? `${comp.description} Current win chance: ${Math.round(clamp(0.35 + (competitionPower() - comp.targetPower) / comp.targetPower * 0.28, 0.18, 0.95) * 100)}%.` : "A competition offer is ready.",
          reason: "Event",
          cta: "Open Competition Hall",
          action: "navigate-guide",
          dataset: { tab: "events", "guide-type": "competition", "guide-id": comp ? comp.id : "" },
          accent: "var(--gold)"
        };
      }

      function nextAffordableClickUpgrade() {
        const upgrade = recommendedClickUpgradeChoice();
        if (!upgrade || !clickUpgradeUnlocked(upgrade)) return null;
        const cost = clickUpgradeCost(upgrade.id);
        if (state.tp < cost) return null;
        return {
          title: `Upgrade ${upgrade.name}`,
          note: `${upgrade.name} increases Session Drill power and passive sync. Open Click Training to choose this or another unlocked drill.`,
          reason: "Power",
          cta: "Open Click Training",
          action: "navigate-guide",
          dataset: { tab: "home", "guide-type": "click", "guide-id": "training" },
          accent: upgrade.accent
        };
      }

      function nextAffordableCoach() {
        for (const coach of CONTENT.coaches) {
          const level = state.coaches[coach.id].level;
          const isNew = level === 0;
          if (level >= coach.maxLevel) continue;
          if (isNew && coachSlotsUsed() >= coachSlotsCap()) continue;
          const cost = coachCost(coach.id);
          if (state.tp < cost) continue;
          return {
            title: `${isNew ? "Recruit" : "Upgrade"} ${coach.name}`,
            note: `${coach.specialty}. Open Academy Offices and ${isNew ? "recruit" : "upgrade"} this coach there.`,
            reason: "Staff",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "coach", "guide-id": coach.id },
            accent: "#4ade80"
          };
        }
        return null;
      }

      function nextAthleteAction() {
        for (const athlete of CONTENT.athletes) {
          const record = state.athletes[athlete.id];
          if (!record.recruited || record.skill >= athlete.potential) continue;
          const cost = athleteTrainCost(athlete.id);
          if (state.tp < cost) continue;
          return {
            title: `Train ${athlete.name}`,
            note: `${athlete.name} can improve to skill ${record.skill + 1}. Open Academy Offices and train them there.`,
            reason: "Roster",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": athlete.id },
            accent: sportAccent(athlete.sportId)
          };
        }
        for (const athlete of CONTENT.athletes) {
          const record = state.athletes[athlete.id];
          if (record.recruited || athletesUsed() >= athleteCap() || state.tp < athlete.baseCost) continue;
          return {
            title: `Recruit ${athlete.name}`,
            note: `${athlete.rarity} ${sportLabel(athlete.sportId, "short")} athlete. Open Academy Offices and recruit them there.`,
            reason: "Roster",
            cta: "Open Academy Offices",
            action: "navigate-guide",
            dataset: { tab: "academy", "guide-type": "athlete", "guide-id": athlete.id },
            accent: sportAccent(athlete.sportId)
          };
        }
        return null;
      }

      function buyFacility(id, qtyMode) {
        const facility = getFacility(id);
        if (!facility) return;
        const qty = qtyMode === "max" ? maxAffordableFacility(id) : Number(qtyMode);
        if (!Number.isFinite(qty) || qty <= 0) return;
        const cost = facilityCost(id, qty);
        if (state.tp < cost) return;
        state.tp -= cost;
        state.facilities[id].level += qty;
        state.stats.facilitiesBought += qty;
        state.stats.highestFacilityLevel = Math.max(state.stats.highestFacilityLevel, state.facilities[id].level);
        toast(`${facility.name} upgraded to level ${state.facilities[id].level}.`);
        checkAchievements();
        checkCountryProgress();
        renderSoon();
      }

      function facilityCost(id, qty = 1) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        let cost = 0;
        for (let i = 0; i < qty; i += 1) {
          cost += facility.baseCost * Math.pow(FACILITY_COST_MULTIPLIER, level + i);
        }
        return Math.ceil(cost);
      }

      function maxAffordableFacility(id) {
        let qty = 0;
        let total = 0;
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        while (qty < 5000) {
          const next = Math.ceil(facility.baseCost * Math.pow(FACILITY_COST_MULTIPLIER, level + qty));
          if (total + next > state.tp) break;
          total += next;
          qty += 1;
        }
        return qty;
      }

      function recruitCoach(id) {
        const coach = getCoach(id);
        if (!coach) return;
        const currentLevel = state.coaches[id].level;
        if (currentLevel >= coach.maxLevel) return;
        const isNew = currentLevel === 0;
        if (isNew && coachSlotsUsed() >= coachSlotsCap()) {
          toast("Upgrade facilities to open more coach slots.");
          return;
        }
        const cost = coachCost(id);
        if (state.tp < cost) return;
        state.tp -= cost;
        state.coaches[id].level += 1;
        if (isNew) state.stats.coachesRecruited += 1;
        toast(`${coach.name} is now level ${state.coaches[id].level}.`);
        checkAchievements();
        renderSoon();
      }

      function coachCost(id) {
        const coach = getCoach(id);
        return Math.ceil(coach.baseCost * Math.pow(coach.growth, state.coaches[id].level));
      }

      function coachTier(level) {
        return COACH_TIERS.reduce((current, tier) => level >= tier.min ? tier : current, COACH_TIERS[0]);
      }

      function nextCoachTier(level) {
        return COACH_TIERS.find(tier => tier.min > level) || null;
      }

      function coachTierProgress(level) {
        const current = coachTier(level);
        const next = nextCoachTier(level);
        if (!next) return 100;
        const span = Math.max(1, next.min - current.min);
        return clamp((level - current.min) / span * 100, 0, 100);
      }

      function recruitAthlete(id) {
        const athlete = getAthlete(id);
        const record = state.athletes[id];
        if (!athlete || record.recruited) return;
        if (athletesUsed() >= athleteCap()) {
          toast("Upgrade facilities to create more athlete capacity.");
          return;
        }
        if (state.tp < athlete.baseCost) return;
        state.tp -= athlete.baseCost;
        record.recruited = true;
        record.recruitedAt = now();
        record.assigned = state.facilities[athlete.preferredFacilityId].level > 0 ? athlete.preferredFacilityId : "";
        state.stats.athletesRecruited += 1;
        toast(`${athlete.name} joined the academy.`);
        checkAchievements();
        renderSoon();
      }

      function trainAthlete(id) {
        const athlete = getAthlete(id);
        const record = state.athletes[id];
        if (!athlete || !record.recruited || record.skill >= athlete.potential) return;
        const cost = athleteTrainCost(id);
        if (state.tp < cost) return;
        state.tp -= cost;
        record.skill += 1;
        record.xp = 0;
        toast(`${athlete.name} improved to skill ${record.skill}.`);
        renderSoon();
      }

      function athleteTrainCost(id) {
        const athlete = getAthlete(id);
        const skill = state.athletes[id].skill;
        return Math.ceil(athlete.trainCost * Math.pow(1.42, skill - 1));
      }

      function assignAthlete(id, facilityId) {
        const record = state.athletes[id];
        if (!record || !record.recruited) return;
        if (!getFacility(facilityId)) return;
        if (state.facilities[facilityId].level <= 0) {
          toast("Buy that facility before assigning athletes there.");
          return;
        }
        record.assigned = facilityId;
        toast(`${getAthlete(id).name} assigned to ${sportLabel(assignedSportId(facilityId), "short")}.`);
        renderSoon();
      }

      function progressAthletes(delta) {
        const xpMult = athleteXPMultiplier();
        CONTENT.athletes.forEach(athlete => {
          const record = state.athletes[athlete.id];
          if (!record.recruited || !record.assigned || record.skill >= athlete.potential) return;
          const facilityLevel = state.facilities[record.assigned].level;
          if (facilityLevel <= 0) return;
          record.xp += delta * xpMult * (1 + facilityLevel * 0.04);
          let leveled = false;
          while (record.skill < athlete.potential && record.xp >= xpNeeded(record.skill)) {
            record.xp -= xpNeeded(record.skill);
            record.skill += 1;
            leveled = true;
          }
          if (leveled) toast(`${athlete.name} gained skill through daily training.`);
        });
      }

      function xpNeeded(skill) {
        return 75 * Math.pow(skill, 1.35);
      }

      function athleteXPMultiplier() {
        return facilityMilestoneMultiplier("athleteXpMultiplier")
          * athleteEffectMultiplier("athleteXpMultiplier")
          * countryEffectMultiplier("athleteXpMultiplier");
      }

      function spawnEvent() {
        if (state.activeEvent || state.eventBonusEnd > now()) return;
        const name = SPONSOR_EVENTS[Math.floor(Math.random() * SPONSOR_EVENTS.length)];
        state.activeEvent = { name, expiresAt: now() + EVENT_EXPIRY_MS };
        state.stats.sponsorshipEventsTriggered += 1;
        renderSoon();
      }

      function claimEvent() {
        if (!state.activeEvent) return;
        const name = state.activeEvent.name;
        state.activeEvent = null;
        state.eventBonusEnd = now() + EVENT_BONUS_MS;
        state.nextEventTime = now() + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS);
        state.stats.sponsorshipEventsClaimed += 1;
        toast(`${name} activated: 5x TP for 5 seconds.`);
        renderSoon();
      }

      function clearExpiredEvent() {
        if (state.activeEvent && state.activeEvent.expiresAt <= now()) {
          state.activeEvent = null;
          state.nextEventTime = now() + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS);
          renderSoon();
        }
      }

      function maybeSpawnCompetition() {
        if (state.activeCompetition || now() < state.nextCompetitionTime) return;
        const unlocked = CONTENT.competitions.filter(c => calculateIncome({ includeEvent: false }) >= c.unlockIncome);
        if (!unlocked.length) {
          state.nextCompetitionTime = now() + 45000;
          return;
        }
        const comp = unlocked[Math.floor(Math.random() * unlocked.length)];
        state.activeCompetition = { id: comp.id, expiresAt: now() + 90000 };
        renderSoon();
      }

      function enterCompetition() {
        if (!state.activeCompetition) return;
        const comp = getCompetition(state.activeCompetition.id);
        if (!comp) return;
        const power = competitionPower();
        const chance = clamp(0.35 + (power - comp.targetPower) / comp.targetPower * 0.28, 0.18, 0.95);
        const won = Math.random() < chance;
        const rewardMult = competitionRewardMultiplier();
        const reward = comp.baseReward * rewardMult * (won ? 1 + chance : 0.28);
        grantTP(reward, "competition");
        state.stats.competitionsEntered += 1;
        if (won) {
          state.stats.competitionsWon += 1;
          const progress = ensureCountryProgress(state.currentCountryId);
          progress.competitionsWon += 1;
          state.moraleBoostEnd = now() + 15000;
        }
        state.lastCompetitionResult = {
          competitionId: comp.id,
          name: comp.name,
          type: competitionTypeLabel(comp),
          won,
          outcome: won ? "Win" : "Participation Reward",
          reward,
          chance,
          power,
          targetPower: comp.targetPower,
          timestamp: now()
        };
        state.activeCompetition = null;
        state.nextCompetitionTime = now() + randomBetween(85000, 135000);
        toast(`${won ? "Won" : "Entered"} ${comp.name}: +${fmt(reward)} TP${won ? " and 1.5x momentum." : "."}`);
        checkAchievements();
        checkCountryProgress();
        saveState();
        renderSoon();
      }

      function expireCompetition() {
        if (state.activeCompetition && state.activeCompetition.expiresAt <= now()) {
          state.activeCompetition = null;
          state.nextCompetitionTime = now() + randomBetween(70000, 120000);
          renderSoon();
        }
      }

      function competitionPower() {
        const comp = state.activeCompetition ? getCompetition(state.activeCompetition.id) : null;
        const sportIds = comp ? comp.sportIds : activeSports().map(sport => sport.id);
        const facilityPower = sportIds.reduce((sum, sportId) => sum + facilitiesForSport(sportId).reduce((sportSum, f) => sportSum + state.facilities[f.id].level * 1.5, 0), 0);
        const athletePower = sportIds.reduce((sum, sportId) => sum + athletePowerForSport(sportId), 0);
        const coachPower = CONTENT.coaches.reduce((sum, c) => sum + state.coaches[c.id].level * 7, 0);
        return facilityPower + athletePower + coachPower + calculateIncome({ includeEvent: false }) * 3;
      }

      function competitionRewardMultiplier() {
        return facilityMilestoneMultiplier("competitionRewardMultiplier")
          * athleteEffectMultiplier("competitionRewardMultiplier")
          * countryEffectMultiplier("competitionRewardMultiplier");
      }

      function openPrestigeConfirm() {
        if (state.seasonTPEarned < PRESTIGE_UNLOCK) return;
        showModal(
          "Championship Trial",
          `<p>This will reset TP, facilities, coaches, and athletes for a new season. Your Championship Trophies stay permanent.</p>
           <div class="result-box">You will gain <b>1 Championship Trophy</b>. New permanent trophy multiplier: <b>${fmtMult(Math.pow(1.1, state.trophies + 1))}</b>.</div>`,
          [
            { label: "Run Championship Trial", action: "confirm-prestige", kind: "primary" },
            { label: "Keep Training", action: "close-modal" }
          ]
        );
      }

      function prestigeReset() {
        if (state.seasonTPEarned < PRESTIGE_UNLOCK) return;
        const summary = {
          runTP: state.seasonTPEarned,
          totalTP: state.totalTPEarned,
          trophiesBefore: state.trophies,
          highest: state.stats.highestFacilityLevel,
          duration: now() - state.runStart
        };
        const keep = {
          totalTPEarned: state.totalTPEarned,
          trophies: state.trophies + 1,
          medals: state.medals,
          reputation: state.reputation,
          academy: { ...state.academy },
          onboarding: { ...state.onboarding },
          tutorialSeen: state.tutorialSeen,
          achievements: { ...state.achievements },
          settings: { ...state.settings },
          stats: { ...state.stats },
          currentCountryId: state.currentCountryId,
          unlockedCountryIds: [...state.unlockedCountryIds],
          completedCountryIds: [...state.completedCountryIds],
          countryProgress: JSON.parse(JSON.stringify(state.countryProgress)),
          seasonNumber: state.seasonNumber + 1
        };
        keep.stats.prestiges += 1;
        state = createDefaultState();
        state.totalTPEarned = keep.totalTPEarned;
        state.trophies = keep.trophies;
        state.medals = keep.medals;
        state.reputation = keep.reputation;
        state.academy = keep.academy;
        state.onboarding = keep.onboarding;
        state.tutorialSeen = keep.tutorialSeen;
        state.achievements = keep.achievements;
        state.settings = keep.settings;
        state.stats = keep.stats;
        state.currentCountryId = keep.currentCountryId;
        state.unlockedCountryIds = keep.unlockedCountryIds;
        state.completedCountryIds = keep.completedCountryIds;
        state.countryProgress = keep.countryProgress;
        state.seasonNumber = keep.seasonNumber;
        state.runStart = now();
        saveState();
        showModal(
          "Season Complete",
          `<div class="metric-row">
             <div class="metric"><b>${fmt(summary.runTP)} TP</b><span>Earned this run</span></div>
             <div class="metric"><b>${fmt(summary.totalTP)} TP</b><span>Total all-time</span></div>
             <div class="metric"><b>+1</b><span>Trophies gained</span></div>
             <div class="metric"><b>${fmtMult(Math.pow(1.1, state.trophies))}</b><span>New multiplier</span></div>
             <div class="metric"><b>${summary.highest}</b><span>Highest facility</span></div>
             <div class="metric"><b>${formatDuration(summary.duration)}</b><span>Run duration</span></div>
           </div>`,
          [
            { label: "Start New Season", action: "close-modal", kind: "primary" }
          ]
        );
        renderSoon();
      }

      function checkAchievements() {
        const checks = {
          firstDrill: state.stats.totalClicks >= 1,
          firstClickUpgrade: state.stats.clickUpgradesBought >= 1,
          firstFacility: state.stats.facilitiesBought >= 1,
          firstCoach: state.stats.coachesRecruited >= 1,
          firstAthlete: state.stats.athletesRecruited >= 1,
          firstCompetition: state.stats.competitionsEntered >= 1,
          tenKSeason: state.seasonTPEarned >= 10000
        };
        CONTENT.achievements.forEach(item => {
          if (!state.achievements[item.id] && checks[item.id]) {
            state.achievements[item.id] = true;
            if (item.rewardTP) grantTP(item.rewardTP, "achievement");
            toast(`Achievement: ${item.name}. Reward +${fmt(item.rewardTP)} TP.`);
          }
        });
      }

      function render() {
        applyAcademyTheme();
        document.body.classList.toggle("no-animations", !state.settings.animations);
        renderAcademyHeader();
        renderResourceBar();
        renderTopStats();
        renderTabs();
        renderEventPopup();
        const tab = state.ui.activeTab;
        const app = document.getElementById("app");
        app.innerHTML = [
          tab === "home" ? renderHomeTab() : "",
          tab === "academy" ? renderAcademyTab() : "",
          tab === "sports" ? renderSportsTab() : "",
          tab === "events" ? renderEventsTab() : "",
          tab === "world" ? renderWorldTab() : "",
          renderPinnedDrill()
        ].join("");
        lastRender = now();
      }

      function renderAcademyHeader() {
        const header = document.getElementById("academyHeader");
        const country = currentCountry();
        header.innerHTML = `
          ${renderAcademyCrest()}
          <div class="academy-header-copy">
            <div class="academy-kicker">My Academy</div>
            <div class="academy-name-line">
              <div class="academy-title">${escapeHTML(state.academy.name)}</div>
              <span class="pill academy-rank-pill">${academyRankByReputation()}</span>
            </div>
            <div class="academy-motto">${escapeHTML(state.academy.motto)}</div>
            <div class="academy-header-meta">
              <span class="pill">${countryFlag(country)} ${escapeHTML(country.name)}</span>
              <span class="pill">Rep ${fmt(state.reputation)}</span>
            </div>
          </div>
        `;
      }

      function renderResourceBar() {
        const bar = document.getElementById("resourceBar");
        const country = currentCountry();
        const accent = country.accent || sportAccent(country.sportIds[0]);
        bar.style.setProperty("--accent", accent);
        bar.innerHTML = `
          <div class="resource-country">
            <span class="resource-flag" aria-hidden="true">${countryFlag(country)}</span>
            <span class="resource-country-name">${country.name}</span>
          </div>
          <div class="resource-stat"><span>TP</span><strong>${fmt(state.tp)}</strong></div>
          <div class="resource-stat"><span>TP/sec</span><strong>${fmt(calculateIncome())}</strong></div>
        `;
      }

      function renderTopStats() {
        const top = document.getElementById("topStats");
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const completeClass = progress.isComplete ? "good" : "";
        const next = nextCountry();
        const nextLabel = next ? `Next: ${countryFlag(next)} ${next.name}` : "Final chapter path pending";
        top.innerHTML = `
          <section class="world-hero" style="--accent:${country.accent || sportAccent(country.sportIds[0])}">
            <button class="world-summary" data-action="toggle-world-summary" aria-expanded="${worldHeaderExpanded}" aria-label="${worldHeaderExpanded ? "Collapse" : "Expand"} World Tour chapter details">
              <div class="world-summary-copy">
                <div class="world-kicker">World Tour Chapter</div>
                <div class="world-title">${country.name} Academy - ${progress.percent}%</div>
                <div class="world-subtitle">${nextLabel}</div>
              </div>
              <div class="world-actions">
                <span class="pill ${completeClass}">${progress.completed}/${progress.total}</span>
                <span class="pill">${worldHeaderExpanded ? "Less" : "More"}</span>
                <div class="country-token">${countryFlag(country)}</div>
              </div>
            </button>
            <div class="chapter-progress" aria-hidden="true"><div class="chapter-fill" style="width:${progress.percent}%"></div></div>
            ${worldHeaderExpanded ? `
              <div class="world-details">
                <div class="chapter-line">
                  <div class="chapter-copy">${progress.isComplete ? "Chapter complete. Ready for the next unlock path." : `${progress.percent}% complete toward chapter unlock.`}</div>
                  <span class="pill">Tap to collapse</span>
                </div>
                <div class="world-subtitle">${progress.completed} of ${progress.total} goals complete. ${nextLabel}.</div>
              </div>
            ` : ""}
          </section>
        `;
      }

      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = TABS.map(tab => {
          return `<button class="tab-btn ${state.ui.activeTab === tab.id ? "active" : ""}" data-action="tab" data-tab="${tab.id}" aria-label="${tab.label}"><span class="tab-icon">${academyIcon(tab.icon)}</span><span>${tab.label}</span></button>`;
        }).join("");
      }

      function renderHomeTab() {
        return `
          ${renderWelcomeMissionCard()}
          ${renderDrillCard()}
          ${renderAcademyHubCards()}
          ${renderActivePlayPanel()}
          ${renderRecommendedActionCard()}
          ${renderRewardPreviewCard()}
          ${renderClickTrainingPanel()}
        `;
      }

      function renderWelcomeMissionCard() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const next = nextCountry(country);
        const playableNext = nextPlayableCountry(country);
        const reward = country.chapterReward || {};
        const currentGoal = currentMissionGoal(progress);
        const rewardLabel = reward.label || countryRewardLabel(country);

        const steps = showOrientation ? onboardingStepDefinitions() : [];
        const activeStep = showOrientation ? steps.find(step => !step.complete) : null;
        const readyToFinish = showOrientation && !activeStep;
        const ceremonyTitle = "Welcome, Coach.";
        const ceremonyCopy = showOrientation
          ? readyToFinish
            ? "Your academy is ready for open training. The headquarters is yours now."
            : "This is your academy headquarters. Set the identity, run training, and follow the chapter mission."
          : `${country.name} is the active World Tour chapter. Run training, improve departments, and move the academy toward its next destination.`;
        const goals = progress.goals.length
          ? progress.goals.map(renderMissionGoal).join("")
          : `<div class="lock-card">Chapter goals for ${country.name} are not active yet. Review the World Tour while the next chapter plan is prepared.</div>`;
        return `
          <section>
            <div class="card welcome-mission-card ${showOrientation ? "orientation-active" : ""}" style="--accent:var(--academy-accent)">
              <div class="ceremony-banner">

              ${showOrientation ? `

                    <div class="level-token"><span>Chapter</span><strong>${country.short}</strong></div>
                  </div>
                  <div class="boost-strip">
                    <span class="pill">${progress.percent}% chapter</span>
                    <span class="pill">${next ? `Next ${countryFlag(next)} ${next.name}` : "Next tour pending"}</span>
                  </div>
                  <button class="ceremony-drill-button" data-action="drill" aria-label="Session Drill">
                    <span>Session Drill</span>
                    <strong>+${fmt(clickReward())} TP</strong>
                  </button>
                  ${activeStep && activeStep.id === "identity" ? renderOnboardingIdentityEditor() : ""}

                    <summary>Orientation path</summary>

                          <div class="ceremony-step-index">${String(index + 1).padStart(2, "0")}</div>
                          <div class="ceremony-step-label">${step.label}</div>

                    </div>
                  </details>
                </div>
              ` : ""}
              <div class="mission-board">
                <div class="mission-brief">
                  <div class="mission-brief-head">
                    <div>
                      <div class="mission-primary">Current Mission: ${currentGoal.label}</div>
                      <div class="mission-meta-line">${country.name} Chapter - ${progress.completed}/${progress.total} goals - ${progress.percent}% complete</div>
                    </div>
                    <div class="level-token"><span>Progress</span><strong>${progress.percent}%</strong></div>
                  </div>
                  <div class="chapter-progress" aria-hidden="true"><div class="chapter-fill" style="width:${progress.percent}%"></div></div>
                  <div class="mission-reward-line"><span>Reward</span><span>${rewardLabel}. Next: ${nextLabel}.</span></div>
                  <div class="mission-toggle-row">
                    <div class="mission-meta-line">${currentGoal.currentLabel} / ${currentGoal.targetLabel}</div>
                    <button class="small-btn mission-toggle" data-action="toggle-mission" aria-expanded="${missionExpanded}" aria-label="${missionExpanded ? "Collapse" : "Expand"} Academy Mission details">${missionExpanded ? "Less" : "Goals"}</button>
                  </div>
                </div>
                ${missionExpanded ? `
                  <div class="mission-details">
                    <div class="boost-strip">
                      <span class="pill">${country.specialization || country.theme}</span>
                      ${countryBonusLabels(country).map(label => `<span class="pill good">${label}</span>`).join("")}
                    </div>
                    <div class="mission-goals">${goals}</div>
                    <div class="result-box">Chapter rewards: ${rewardLabel}. ${next ? `Next unlock: ${countryFlag(next)} ${next.name}.` : "Next destination pending."}</div>
                  </div>
                ` : ""}
                ${progress.readyToClaim ? `<div class="button-row" style="grid-template-columns: 1fr;"><button class="primary-btn" data-action="claim-country-reward" data-id="${country.id}">${playableNext ? `Continue to ${playableNext.name}` : next ? `Unlock ${next.name}` : "Claim Chapter Reward"}</button></div>` : ""}
              </div>
            </div>
          </section>
        `;
      }

      function renderAcademyMissionCard() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const next = nextCountry(country);
        const playableNext = nextPlayableCountry(country);
        const reward = country.chapterReward || {};
        const currentGoal = currentMissionGoal(progress);
        const rewardLabel = reward.label || countryRewardLabel(country);
        const nextLabel = next ? `${countryFlag(next)} ${next.name}` : "Future destination pending";

            <div class="card mission-card ${missionExpanded ? "expanded" : "collapsed"}" style="--accent:var(--academy-accent)">
              <div class="mission-brief">
                <div class="mission-brief-head">
                  <div>
                    <div class="mission-primary">${countryFlag(country)} Current Mission: ${currentGoal.label}</div>
                    <div class="mission-meta-line">${country.name} Chapter - ${progress.completed}/${progress.total} goals - ${progress.percent}% complete</div>
                  </div>
                  <div class="level-token"><span>Progress</span><strong>${progress.percent}%</strong></div>
                </div>
                <div class="chapter-progress" aria-hidden="true"><div class="chapter-fill" style="width:${progress.percent}%"></div></div>

                <div class="mission-details">
                  <div class="boost-strip">

                  </div>
                  <div class="mission-goals">${goals}</div>
                  <div class="result-box">Chapter rewards: ${rewardLabel}. ${next ? `Next unlock: ${countryFlag(next)} ${next.name}.` : "Next destination pending."}</div>

              ${progress.readyToClaim ? `<div class="button-row" style="grid-template-columns: 1fr;"><button class="primary-btn" data-action="claim-country-reward" data-id="${country.id}">${playableNext ? `Continue to ${playableNext.name}` : next ? `Unlock ${next.name}` : "Claim Chapter Reward"}</button></div>` : ""}

          </section>
        `;

      function renderOrientationCard() {
        if (!onboardingVisible()) return "";
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const steps = onboardingStepDefinitions();
        const activeStep = steps.find(step => !step.complete);
        const readyToFinish = !activeStep;
        const next = nextCountry(country);
        return `
          <section>
            <div class="section-title">

              <span class="badge ${readyToFinish ? "good" : ""}">${readyToFinish ? "Ready" : "First Run"}</span>

                <select id="${prefix}AcademyCrestSelect">

                <select id="${prefix}AcademyThemeSelect">

      function renderOnboardingAction(step) {
        const attrs = Object.entries(step.dataset || {})
          .map(([key, value]) => `data-${key}="${value}"`)
          .join(" ");
        return `<button class="primary-btn" data-action="${step.action}" ${attrs}>${step.cta}</button>`;
      }

      function onboardingStepDefinitions() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const facilityGoal = progress.goals.find(goal => !goal.complete && goal.type === "facilityLevel");
        const firstFacility = facilityGoal ? getFacility(facilityGoal.facilityId) : activeFacilities()[0];
        const facilityCostNow = firstFacility ? facilityCost(firstFacility.id, 1) : 0;
        const coachAction = nextAffordableCoach();
        const athleteAction = nextAthleteAction();
        const next = nextCountry(country);

        return [
          {
            id: "identity",
            label: "Confirm identity",
            complete: Boolean(state.onboarding.identityConfirmed),
            title: "This is your academy.",
            note: "Choose a name, motto, crest, and theme so this feels like your academy from the first session.",
            cta: "Save Academy Identity",
            action: "confirm-onboarding-identity"
          },
          {
            id: "drill",
            label: "Tap Session Drill",
            complete: state.stats.totalClicks >= 1,
            title: "Start training with Session Drill.",
            note: "Session Drill is the heartbeat of the academy. Tap it to earn your first Training Points.",
            cta: "Run Session Drill",
            action: "drill"
          },
          {
            id: "facility",
            label: "Upgrade facility",
            complete: state.stats.facilitiesBought >= 1,
            title: firstFacility ? `Build the ${firstFacility.short} program.` : "Build your first facility.",
            note: firstFacility
              ? `${firstFacility.name} starts passive TP/sec and supports the current chapter goal. Open Sports Center and buy the next level there.`
              : "Facilities turn your academy into an automated training center.",
            cta: firstFacility && state.tp >= facilityCostNow ? "Open Sports Center" : "Run Session Drill",
            action: firstFacility && state.tp >= facilityCostNow ? "navigate-guide" : "drill",
            dataset: firstFacility && state.tp >= facilityCostNow ? { tab: "sports", "guide-type": "facility", "guide-id": firstFacility.id } : {}
          },
          {
            id: "coach",
            label: "Recruit coach",
            complete: state.stats.coachesRecruited >= 1,
            title: coachAction ? coachAction.title : "Open your first coach slot.",
            note: coachAction
              ? coachAction.note
              : coachSlotsCap() === 0
                ? "Facilities unlock coach slots. Track level 5 is the quickest path to your first staff hire."
                : "Save TP for your first coach so training output and Session Drill power start scaling.",
            cta: coachAction ? coachAction.cta : "Open Sports Center",
            action: coachAction ? coachAction.action : "navigate-guide",
            dataset: coachAction ? coachAction.dataset : { tab: "sports", "guide-type": "facility", "guide-id": firstFacility ? firstFacility.id : "" }
          },
          {
            id: "athlete",
            label: "Recruit athlete",
            complete: state.stats.athletesRecruited >= 1,
            title: athleteAction ? athleteAction.title : "Bring in your first athlete.",
            note: athleteAction
              ? athleteAction.note
              : athleteCap() === 0
                ? "Buying any facility creates athlete capacity. Athletes make the academy feel alive and improve sport output."
                : "Save TP for your first athlete, then assign them to a matching facility.",
            cta: athleteAction ? athleteAction.cta : athleteCap() === 0 ? "Open Sports Center" : "Open Academy Offices",
            action: athleteAction ? athleteAction.action : "navigate-guide",
            dataset: athleteAction ? athleteAction.dataset : athleteCap() === 0 ? { tab: "sports", "guide-type": "facility", "guide-id": firstFacility ? firstFacility.id : "" } : { tab: "academy", "guide-type": "athlete", "guide-id": "" }
          },
          {
            id: "mission",
            label: "Review mission",
            complete: Boolean(state.onboarding.chapterReviewed),
            title: "Read the chapter goals.",
            note: `${country.name} is your current World Tour chapter. The Mission Card shows every goal, progress bar, reward, and unlock path.`,
            cta: "Review Chapter Goals",
            action: "review-chapter-goals"
          },
          {
            id: "world",
            label: "View World Tour",
            complete: Boolean(state.onboarding.worldTourViewed),
            title: "See where the academy goes next.",
            note: next ? `The World tab shows completed countries, ${country.name}, locked destinations, and the path toward ${next.name}.` : "The World tab shows your medals, reputation, prestige path, and future destinations.",
            cta: "View World Tour Path",
            action: "open-world-tour"
          }
        ];
      }

      function currentMissionGoal(progress) {
        if (progress.rewardClaimed) {
          return {
            label: "Chapter complete",
            currentLabel: `${progress.completed}/${progress.total} goals complete`,
            targetLabel: "Reward claimed"
          };
        }
        if (progress.readyToClaim) {
          return {
            label: "Claim the chapter reward",
            currentLabel: `${progress.completed}/${progress.total} goals complete`,
            targetLabel: "Reward ready"
          };
        }
        const nextGoal = progress.goals.find(goal => !goal.complete) || progress.goals[0];
        if (nextGoal) return nextGoal;
        return {
          label: "Review the World Tour",
          currentLabel: "No active goal",
          targetLabel: "Awaiting next destination"
        };
      }

      function renderMissionGoal(goal) {
        return `
          <div class="mission-goal">
            <div class="mission-goal-head">
              <div class="mission-goal-title">${goal.label}</div>
              <span class="badge ${goal.complete ? "good" : ""}">${goal.percent}%</span>
            </div>
            <div class="mission-progress" aria-hidden="true"><div class="mission-progress-fill" style="width:${goal.percent}%"></div></div>
            <div class="mission-goal-meta">${goal.currentLabel} / ${goal.targetLabel}</div>
          </div>
        `;
      }

      function renderRecommendedActionCard() {
        const recommendation = recommendedNextAction();
        return `
          <section>
            <div class="section-title">
              <h2>Recommended Next Action</h2>
              <span class="badge">Guidance</span>
            </div>
            <div class="card recommendation-card" style="--accent:${recommendation.accent || "var(--teal)"}">
              <div class="card-head">
                <div>
                  <h3>${recommendation.title}</h3>
                  <div class="role">${recommendation.note}</div>
                </div>
                <div class="level-token"><span>Why</span><strong>${recommendation.reason}</strong></div>
              </div>
              <div class="button-row" style="grid-template-columns: 1fr;">
                ${renderRecommendationButton(recommendation)}
              </div>
            </div>
          </section>
        `;
      }

      function renderRecommendationButton(recommendation) {
        const attrs = Object.entries(recommendation.dataset || {})
          .map(([key, value]) => `data-${key}="${value}"`)
          .join(" ");
        return `<button class="primary-btn" data-action="${recommendation.action}" ${attrs}>${recommendation.cta}</button>`;
      }

      function guideClass(type, id = "") {
        if (!activeGuideTarget || activeGuideTarget.type !== type) return "";
        if (activeGuideTarget.id && id && activeGuideTarget.id !== id) return "";
        return "guide-highlight";
      }

      function navigateGuide(tab, type, id = "") {
        state.ui.activeTab = TABS.some(item => item.id === tab) ? tab : "home";
        activeGuideTarget = { type, id, createdAt: now() };
        if (tab === "world") markOnboardingFlag("worldTourViewed");
        if (tab === "events") markOnboardingFlag("firstCompetitionBriefed");
        saveState();
        renderSoon();
        toast("Coach focus set. Look for the highlighted academy area.");
      }

      function renderAcademyHubCards() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const signals = campusActivitySignals();
        const highestFacility = Math.max(0, ...activeFacilities().map(facility => state.facilities[facility.id].level));
        const staffCount = coachSlotsUsed() + athletesUsed();
        const cards = [
          { label: "Sports Center", icon: "sports", note: "Facilities, training output, and academy strength.", signal: signals.sports.label, tone: signals.sports.tone, activity: signals.sports.activity, stage: visualStageFromLevel(highestFacility), level: `Lv ${highestFacility}`, tab: "sports", type: "sports", accent: "#60a5fa" },
          { label: "Academy Offices", icon: "academy", note: "Coaches, athletes, roster capacity, and development.", signal: signals.academy.label, tone: signals.academy.tone, activity: signals.academy.activity, stage: visualStageFromStaff(staffCount), level: `Staff ${staffCount}`, tab: "academy", type: "offices", accent: "#4ade80" },
          { label: "Competition Hall", icon: "events", note: "Events, chapter wins, and today's prizes.", signal: signals.competitions.label, tone: signals.competitions.tone, activity: signals.competitions.activity, stage: visualStageFromWins(state.stats.competitionsWon), level: `Wins ${state.stats.competitionsWon}`, tab: "events", type: "events", accent: "#f7c948" },
          { label: "World Tour Gate", icon: "world", note: "Route progress, countries, rewards, and destination path.", signal: signals.world.label, tone: signals.world.tone, activity: signals.world.activity, stage: visualStageFromPercent(progress.percent), level: `${progress.percent}%`, tab: "world", type: "world", accent: "#2dd4bf" }
        ];
        return `
          <section>
            <div class="section-title">
              <h2>Academy Campus</h2>
              <span class="badge">${countryFlag(country)} ${country.short} HQ</span>
            </div>
            <div class="campus-map" style="--campus-accent:var(--academy-accent)">
              <div class="campus-courtyard" aria-hidden="true"></div>
              <div class="hub-grid">
                ${cards.map(renderCampusBuilding).join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderCampusBuilding(card) {
        return `
          <button class="hub-card campus-${card.type} status-${card.tone} activity-${card.activity} stage-${card.stage}" style="--accent:${card.accent}" data-action="tab" data-tab="${card.tab}" aria-label="${card.label}. ${card.signal}. ${card.level}.">
            <span class="campus-topline">
              <span class="campus-mark" aria-hidden="true">${academyIcon(card.icon)}</span>
              <span></span>
              <span class="campus-level">${card.level}</span>
            </span>
            <span class="campus-building" aria-hidden="true">
              <span class="building-svg-slot" data-building="${card.type}"></span>
              <span class="building-glow"></span>
              <span class="building-wing left"></span>
              <span class="building-wing right"></span>
              <span class="building-roof"></span>
              <span class="building-body">
                <span class="building-window-row row-one"></span>
                <span class="building-window-row row-two"></span>
                <span class="building-window-row row-three"></span>
                <span class="building-door"></span>
              </span>
              <span class="building-banner"></span>
              <span class="building-light"></span>
              <span class="building-flag"></span>
              <span class="building-activity-dot"></span>
            </span>
            <span class="campus-copy">
              <strong>${card.label}</strong>
              <span class="campus-note">${card.note}</span>
              <span class="campus-signal ${card.tone}">${card.signal}</span>
            </span>
          </button>
        `;
      }

      function campusActivitySignals() {
        const progress = countryProgressSummary();
        const upgradeReady = activeFacilities().some(facility => state.tp >= facilityCost(facility.id, 1));
        const athleteReady = Boolean(nextAthleteAction());
        const coachAvailable = coachOpportunityAvailable();
        const trainingActive = calculateIncome({ includeEvent: false, includeMorale: false }) > 0;
        const eventActive = Boolean(state.activeEvent) || state.eventBonusEnd > now() || state.moraleBoostEnd > now();
        const chapterComplete = progress.rewardClaimed || progress.isComplete;
        return {
          sports: upgradeReady
            ? { label: "Upgrade Available", tone: "hot", activity: "upgrade" }
            : trainingActive
              ? { label: "Training Active", tone: "active", activity: "training" }
              : { label: "Idle", tone: "idle", activity: "idle" },
          academy: athleteReady
            ? { label: "Athlete Ready", tone: "hot", activity: "athlete" }
            : coachAvailable
              ? { label: "Coach Available", tone: "hot", activity: "coach" }
              : coachSlotsUsed() || athletesUsed()
                ? { label: "Staff Busy", tone: "active", activity: "staff" }
                : { label: "Idle", tone: "idle", activity: "idle" },
          competitions: state.activeCompetition
            ? { label: "Competition Ready", tone: "hot", activity: "competition" }
            : eventActive
              ? { label: "Event In Progress", tone: "active", activity: "event" }
              : { label: "Waiting", tone: "idle", activity: "waiting" },
          world: progress.readyToClaim
            ? { label: "Ready To Travel", tone: "hot", activity: "travel" }

      function renderClickTrainingPanel() {

        const choiceCost = choice && clickUpgradeUnlocked(choice) ? clickUpgradeCost(choice.id) : 0;

              <h2>Click Training</h2>

                  <div class="role">Choose any unlocked drill program. Each upgrade increases tap power and passive sync.</div>
