<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Elite Sports Academy</title>
  <style>
    :root {
      --bg: #070a12;
      --panel: #101625;
      --panel-2: #151d2f;
      --panel-3: #1b263a;
      --text: #f4f7fb;
      --muted: #9ca9bc;
      --soft: #c8d1df;
      --line: rgba(255, 255, 255, 0.1);
      --gold: #f7c948;
      --green: #4ade80;
      --red: #fb7185;
      --blue: #60a5fa;
      --teal: #2dd4bf;
      --academy-accent: #60a5fa;
      --academy-accent-2: #2dd4bf;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
      --radius: 8px;
      --space: 14px;
      --tap: 46px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: radial-gradient(circle at top, #152032 0, var(--bg) 42%, #04060b 100%);
      color: var(--text);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text);
      background: var(--panel-3);
      transition: transform 140ms ease, filter 140ms ease, background 140ms ease, opacity 140ms ease;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .shell {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 12px 12px 102px;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0 10px;
      background: linear-gradient(180deg, rgba(7, 10, 18, 0.98), rgba(7, 10, 18, 0.86) 76%, rgba(7, 10, 18, 0));
      backdrop-filter: blur(14px);
    }

    .academy-header,
    .resource-bar,
    .stat-grid,
    .tabs,
    .button-row,
    .split-row,
    .metric-row,
    .mini-grid {
      display: grid;
      gap: 8px;
    }

    .academy-header {
      grid-template-columns: auto 1fr;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 28%, var(--line));
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 10% 0, color-mix(in srgb, var(--academy-accent) 22%, transparent), transparent 64px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018)),
        rgba(10, 15, 26, 0.92);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .academy-header-copy {
      min-width: 0;
    }

    .academy-kicker {
      color: color-mix(in srgb, var(--academy-accent) 68%, white);
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.07em;
      line-height: 1;
      text-transform: uppercase;
    }

    .academy-name-line {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      margin-top: 3px;
    }

    .academy-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 950;
      line-height: 1.08;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .academy-motto {
      margin-top: 4px;
      overflow: hidden;
      color: var(--soft);
      font-size: 0.72rem;
      font-weight: 720;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .academy-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .academy-rank-pill {
      color: #071018;
      background: linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 72%, white), color-mix(in srgb, var(--academy-accent-2) 62%, white));
      border-color: transparent;
    }

    .academy-crest {
      position: relative;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 42%, rgba(255, 255, 255, 0.16));
      border-radius: 12px 12px 16px 16px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 34%, transparent), color-mix(in srgb, var(--academy-accent-2) 20%, transparent)),
        rgba(255, 255, 255, 0.06);
      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.055),
        0 0 0 4px color-mix(in srgb, var(--academy-accent) 12%, transparent);
    }

    .academy-crest::before {
      content: "";
      position: absolute;
      inset: 7px 10px 14px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--academy-accent) 54%, white);
      opacity: 0.72;
    }

    .academy-crest::after {
      content: "";
      position: absolute;
      inset: auto 13px 7px;
      height: 11px;
      border-radius: 0 0 12px 12px;
      background: color-mix(in srgb, var(--academy-accent) 58%, white 8%);
      opacity: 0.7;
    }

    .academy-crest span {
      position: relative;
      z-index: 1;
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.38);
    }

    .crest-star {
      clip-path: polygon(50% 0, 62% 28%, 94% 28%, 68% 48%, 79% 82%, 50% 62%, 21% 82%, 32% 48%, 6% 28%, 38% 28%);
      border-radius: 0;
    }

    .crest-laurel {
      border-radius: 999px;
    }

    .crest-torch {
      border-radius: 14px 14px 6px 6px;
    }

    .crest-wave {
      border-radius: 12px 12px 999px 999px;
    }

    .resource-bar {
      position: relative;
      grid-template-columns: minmax(0, 1fr) repeat(2, auto);
      align-items: center;
      gap: 7px;
      overflow: hidden;
      margin-bottom: 8px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(11, 16, 28, 0.94);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    .resource-bar::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 42px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 30%, transparent);
      opacity: 0.25;
      pointer-events: none;
    }

    .resource-bar > * {
      position: relative;
      z-index: 1;
    }

    .resource-country {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 7px;
    }

    .resource-flag {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 1rem;
      line-height: 1;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      transform-origin: 50% 70%;
      animation: flagWave 4200ms ease-in-out infinite;
    }

    .resource-country-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .resource-stat {
      min-width: 56px;
      padding: 4px 6px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .resource-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.54rem;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .resource-stat strong {
      display: block;
      margin-top: 2px;
      color: var(--soft);
      font-size: 0.78rem;
      font-weight: 950;
      line-height: 1;
    }

    .world-hero {
      position: relative;
      grid-column: 1 / -1;
      display: grid;
      gap: 8px;
      overflow: hidden;
      margin-bottom: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(96, 165, 250, 0.18), rgba(45, 212, 191, 0.08)),
        rgba(16, 22, 37, 0.92);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .world-hero::before {
      content: "";
      position: absolute;
      inset: -30px -60px auto auto;
      width: 130px;
      height: 84px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 24%, transparent);
      filter: blur(16px);
      opacity: 0.56;
      pointer-events: none;
    }

    .world-hero > * {
      position: relative;
      z-index: 1;
    }

    .world-summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 46px;
      padding: 0;
      text-align: left;
      background: transparent;
      border: 0;
    }

    .world-summary:active {
      transform: none;
    }

    .world-summary-copy {
      min-width: 0;
    }

    .world-details {
      display: grid;
      gap: 7px;
      padding-top: 2px;
    }

    .world-actions {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 7px;
      align-items: center;
    }

    .world-kicker {
      color: var(--teal);
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .world-title {
      margin-top: 2px;
      font-size: 1.03rem;
      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .world-subtitle {
      margin-top: 3px;
      color: var(--soft);
      font-size: 0.74rem;
      line-height: 1.25;
    }

    .country-token {
      display: grid;
      place-items: center;
      min-width: 44px;
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 950;
    }

    .passport-stamp {
      border-radius: 8px 999px 999px 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 22%, transparent), rgba(255, 255, 255, 0.08));
      transform: rotate(-2deg);
    }

    .chapter-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .chapter-copy {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 750;
    }

    .chapter-progress {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .chapter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--academy-accent), var(--gold), var(--academy-accent-2));
      background-size: 180% 100%;
      transition: width 260ms ease;
      animation: missionProgressFlow 4200ms linear infinite;
    }

    .season-badge,
    .badge,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--soft);
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .season-badge {
      color: var(--gold);
      background: rgba(247, 201, 72, 0.11);
      border-color: rgba(247, 201, 72, 0.28);
    }

    .stat-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .tabs {
      position: fixed;
      left: 50%;
      right: auto;
      bottom: 0;
      z-index: 60;
      width: min(100%, 480px);
      grid-template-columns: repeat(5, 1fr);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(7, 10, 18, 0.94);
      border-top: 1px solid var(--line);
      box-shadow: 0 -12px 32px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
    }

    .tab-btn {
      display: grid;
      gap: 2px;
      place-items: center;
      min-height: 54px;
      padding: 6px 4px;
      font-size: 0.68rem;
      font-weight: 850;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
    }

    .tab-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 1rem;
      line-height: 1;
    }

    .academy-icon {
      width: 100%;
      height: 100%;
      display: block;
      color: currentColor;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-btn.active {
      color: var(--text);
      background: rgba(45, 212, 191, 0.15);
      border-color: rgba(45, 212, 191, 0.28);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }

    .dashboard-card {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .dashboard-card.wide {
      grid-column: 1 / -1;
    }

    .dashboard-label {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .dashboard-value {
      margin-top: 4px;
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .dashboard-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.28;
    }

    .country-progress-card {
      display: grid;
      gap: 10px;
    }

    .campaign-map {
      position: relative;
      display: grid;
      gap: 9px;
    }

    .route-strip {
      position: relative;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(94px, 1fr);
      gap: 10px;
      overflow-x: auto;
      margin: 12px 0 11px;
      padding: 14px 4px 13px;
      scrollbar-width: none;
    }

    .route-strip::before {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      top: 44px;
      height: 3px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(96, 165, 250, 0.62), rgba(247, 201, 72, 0.5), rgba(45, 212, 191, 0.48)),
        rgba(255, 255, 255, 0.08);
      opacity: 0.74;
      pointer-events: none;
    }

    .route-strip::-webkit-scrollbar {
      display: none;
    }

    .route-pill {
      position: relative;
      flex: 0 0 auto;
      display: grid;
      justify-items: center;
      align-content: center;
      align-items: center;
      gap: 3px;
      min-height: 68px;
      padding: 8px 9px;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 32%, var(--line));
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--accent, var(--teal)) 26%, transparent), transparent 38px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        rgba(8, 12, 22, 0.88);
      color: var(--soft);
      font-size: 0.72rem;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.22);
    }

    .route-step {
      position: absolute;
      left: 7px;
      top: 6px;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      font-size: 0.58rem;
      font-weight: 900;
    }

    .route-pill::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 72%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 16%, transparent);
      transform: translateX(-50%);
    }

    .route-pill:first-child::before {
      display: block;
    }

    .route-flag {
      display: block;
      font-size: 1.26rem;
      line-height: 1;
    }

    .route-name {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .route-mark {
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .route-pill.locked {
      opacity: 0.55;
    }

    .route-pill.current {
      color: var(--text);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      animation: campusGlow 3400ms ease-in-out infinite;
    }

    .route-pill.current .route-step {
      color: #071018;
      background: color-mix(in srgb, var(--accent, var(--teal)) 76%, white);
      border-color: transparent;
    }

    .route-pill.complete {
      border-color: rgba(74, 222, 128, 0.35);
      background: rgba(74, 222, 128, 0.12);
      color: #c6f7d8;
    }

    .country-node {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: center;
      overflow: hidden;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 24%, var(--line));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 10%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
    }

    .passport-destination {
      border-radius: 6px 14px 6px 6px;
    }

    .passport-destination::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 10px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px dashed color-mix(in srgb, var(--accent, var(--teal)) 42%, rgba(255, 255, 255, 0.2));
      opacity: 0.36;
      pointer-events: none;
    }

    .country-node::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 68%, transparent);
      opacity: 0.82;
    }

    .country-node.current {
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 42%, transparent);
      background:
        radial-gradient(circle at 32px 20px, color-mix(in srgb, var(--accent, var(--teal)) 24%, transparent), transparent 44px),
        color-mix(in srgb, var(--accent, var(--teal)) 12%, transparent);
      box-shadow: 0 10px 24px color-mix(in srgb, var(--accent, var(--teal)) 11%, transparent);
    }

    .country-node.locked {
      opacity: 0.58;
    }

    .country-node > * {
      position: relative;
      z-index: 1;
    }

    .country-node-title {
      color: var(--soft);
      font-size: 0.86rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .country-node-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.25;
    }

    .goal-list {
      display: grid;
      gap: 8px;
    }

    .goal-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .goal-check {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .goal-row.done .goal-check {
      color: #04110a;
      background: var(--green);
      border-color: transparent;
    }

    .goal-title {
      color: var(--soft);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .goal-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .facility-banner {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: center;
    }

    .sport-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 34%, transparent);
      color: var(--text);
      font-size: 1.16rem;
      font-weight: 900;
    }

    .sport-mark .academy-icon {
      width: 26px;
      height: 26px;
      stroke-width: 1.9;
    }

    .facility-card {
      display: grid;
      gap: 10px;
      border-radius: 6px 10px 6px 6px;
      background:
        radial-gradient(circle at 88% 0, color-mix(in srgb, var(--accent, var(--teal)) 16%, transparent), transparent 88px),
        linear-gradient(180deg, rgba(20, 29, 47, 0.98), rgba(11, 16, 28, 0.98));
    }

    .facility-department {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      overflow: hidden;
      padding: 9px;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 22%, var(--line));
      border-radius: 6px 12px 6px 6px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 12%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.035);
    }

    .facility-department::after {
      content: "";
      position: absolute;
      inset: auto 8px 8px auto;
      width: 76px;
      height: 30px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), transparent 70%);
      opacity: 0.7;
      pointer-events: none;
    }

    .department-building {
      position: relative;
      width: calc(72px * var(--department-scale, 1));
      height: calc(52px * var(--department-scale, 1));
      min-width: 62px;
    }

    .department-building::before,
    .department-building::after {
      content: "";
      position: absolute;
      display: block;
      pointer-events: none;
    }

    .department-svg-slot {
      display: none;
    }

    .department-roof,
    .department-body,
    .department-wing,
    .department-door {
      position: absolute;
      display: block;
    }

    .department-roof {
      inset: 0 12px auto;
      height: 16px;
      border-radius: 999px 999px 2px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 58%, white 8%);
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
    }

    .department-body {
      inset: 15px 12px 4px;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 40%, transparent);
      border-radius: 7px 7px 3px 3px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, var(--department-window-opacity, 0.48)) 0 6px, transparent 6px 11px),
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), rgba(255, 255, 255, 0.04));
    }

    .department-wing {
      bottom: 5px;
      width: 13px;
      height: var(--department-wing-height, 24px);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 30%, transparent);
      background: color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      opacity: var(--department-wing-opacity, 0.58);
    }

    .department-wing.left {
      left: 3px;
      border-radius: 6px 2px 2px 3px;
    }

    .department-wing.right {
      right: 3px;
      border-radius: 2px 6px 3px 2px;
    }

    .department-door {
      left: 50%;
      bottom: 4px;
      width: 10px;
      height: 15px;
      border-radius: 6px 6px 2px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 40%, rgba(255, 255, 255, 0.12));
      transform: translateX(-50%);
    }

    .department-track .department-roof {
      inset: 8px 7px auto;
      height: 10px;
      border-radius: 999px;
      clip-path: none;
    }

    .department-track .department-body {
      inset: 19px 6px 5px;
      border-radius: 999px 999px 6px 6px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.45) 0 2px, transparent 2px 12px),
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), rgba(255, 255, 255, 0.04));
    }

    .department-aquatics .department-roof {
      inset: 5px 6px auto;
      height: 14px;
      clip-path: polygon(0 70%, 16% 35%, 32% 70%, 48% 35%, 64% 70%, 80% 35%, 100% 70%, 100% 100%, 0 100%);
      border-radius: 0;
    }

    .department-aquatics .department-body {
      background:
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0 4px, transparent 4px 10px),
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 22%, transparent), rgba(255, 255, 255, 0.04));
    }

    .department-cycling .department-building::before {
      left: 8px;
      bottom: 7px;
      width: 25px;
      height: 25px;
      border-radius: 999px;
      border: 3px solid color-mix(in srgb, var(--accent, var(--teal)) 62%, white);
      box-shadow: 32px 0 0 -3px transparent, 32px 0 0 0 color-mix(in srgb, var(--accent, var(--teal)) 42%, white);
      opacity: 0.65;
    }

    .department-cycling .department-body {
      inset: 14px 10px 9px;
      border-radius: 999px 999px 4px 4px;
    }

    .department-soccer .department-roof {
      inset: 4px 8px auto;
      height: 13px;
      border-radius: 2px;
      clip-path: polygon(0 100%, 16% 0, 84% 0, 100% 100%);
    }

    .department-soccer .department-building::before,
    .department-soccer .department-building::after {
      top: 6px;
      width: 4px;
      height: 31px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.24);
    }

    .department-soccer .department-building::before {
      left: 5px;
    }

    .department-soccer .department-building::after {
      right: 5px;
    }

    .department-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .facility-stage-0 {
      --department-scale: 0.94;
      --department-window-opacity: 0.36;
      --department-wing-opacity: 0.28;
    }

    .facility-stage-1 {
      --department-scale: 1;
      --department-window-opacity: 0.48;
    }

    .facility-stage-2 {
      --department-scale: 1.07;
      --department-window-opacity: 0.62;
      --department-wing-height: 28px;
      --department-wing-opacity: 0.72;
    }

    .facility-stage-3 {
      --department-scale: 1.14;
      --department-window-opacity: 0.76;
      --department-wing-height: 32px;
      --department-wing-opacity: 0.9;
    }

    .staff-card .card-head {
      align-items: center;
    }

    .staff-heading {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    .profile-orb {
      position: relative;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 36%, transparent);
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.38), transparent 12px),
        color-mix(in srgb, var(--accent, var(--teal)) 20%, rgba(255, 255, 255, 0.04));
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 950;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 10%, transparent);
    }

    .profile-orb .academy-icon {
      position: relative;
      z-index: 2;
      width: 23px;
      height: 23px;
      stroke-width: 2;
    }

    .profile-orb::after {
      content: "";
      position: absolute;
      bottom: 7px;
      width: 18px;
      height: 9px;
      border-radius: 999px 999px 3px 3px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 34%, rgba(255, 255, 255, 0.08));
    }

    .profile-orb span {
      position: relative;
      z-index: 1;
    }

    .competition-card,
    .sponsorship-card {
      background:
        radial-gradient(circle at 90% 0, color-mix(in srgb, var(--accent, var(--gold)) 18%, transparent), transparent 74px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .coach-card {
      border-radius: 6px 12px 6px 6px;
      background:
        radial-gradient(circle at 88% 0, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), transparent 86px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(12, 17, 29, 0.98));
    }

    .coach-card::after {
      content: "";
      position: absolute;
      right: 12px;
      bottom: 10px;
      width: 86px;
      height: 24px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent, var(--teal)) 17%, transparent), transparent 70%);
      pointer-events: none;
    }

    .competition-card {
      border-radius: 6px 14px 6px 14px;
    }

    .event-ticket {
      border-style: solid;
      background:
        radial-gradient(circle at left 50%, rgba(7, 10, 18, 0.96) 0 12px, transparent 13px),
        radial-gradient(circle at right 50%, rgba(7, 10, 18, 0.96) 0 12px, transparent 13px),
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--gold)) 14%, transparent), rgba(255, 255, 255, 0.02)),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .event-board {
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--gold) 24%, var(--line));
      border-radius: 6px 14px 6px 6px;
      background:
        linear-gradient(180deg, rgba(247, 201, 72, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(255, 255, 255, 0.03);
    }

    .passport-card {
      border-radius: 6px 18px 6px 6px;
      background:
        radial-gradient(circle at 90% 6%, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), transparent 90px),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 9px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(10, 15, 26, 0.98));
    }

    .competition-card::after,
    .sponsorship-card::after {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent, var(--gold)) 68%, white), transparent);
      opacity: 0.62;
    }

    .card,
    .drill-card,
    .modal-card,
    .event-pop {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
      box-shadow: var(--shadow);
    }

    .drill-card {
      position: relative;
      overflow: hidden;
      margin: 2px 0 10px;
      padding: 12px;
      border-radius: 6px 16px 6px 6px;
      background:
        linear-gradient(135deg, rgba(96, 165, 250, 0.12), rgba(45, 212, 191, 0.06)),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .drill-card::before {
      content: "";
      position: absolute;
      inset: -40px auto auto -20px;
      width: 160px;
      height: 100px;
      border-radius: 999px;
      background: rgba(45, 212, 191, 0.12);
      filter: blur(18px);
      pointer-events: none;
    }

    .drill-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .drill-button {
      position: relative;
      min-height: 68px;
      padding: 10px;
      overflow: hidden;
      border-radius: 5px 14px 5px 5px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 78%, #1d4ed8), color-mix(in srgb, var(--academy-accent-2) 76%, #13b8a6));
      color: white;
      box-shadow: 0 16px 30px rgba(19, 184, 166, 0.2);
    }

    .drill-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.16) 0 2px, transparent 2px 18px);
      opacity: 0.28;
      pointer-events: none;
    }

    .drill-button::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 14px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .drill-button strong {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .drill-button span {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .home-summary {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .home-focus-card {
      display: grid;
      gap: 10px;
    }

    .mission-card {
      display: grid;
      gap: 8px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), rgba(13, 18, 31, 0.98)),
        var(--panel);
      animation: missionBreath 6400ms ease-in-out infinite;
    }

    .mission-card::after {
      content: "";
      position: absolute;
      inset: auto 10px 8px;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent, var(--teal)) 58%, white), transparent);
      opacity: 0.46;
      pointer-events: none;
    }

    .mission-card > * {
      position: relative;
      z-index: 1;
    }

    .mission-card.collapsed {
      padding-bottom: 10px;
    }

    .mission-brief {
      display: grid;
      gap: 8px;
    }

    .mission-brief-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .mission-primary {
      color: var(--text);
      font-size: 0.96rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .mission-meta-line {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 760;
      line-height: 1.25;
    }

    .mission-reward-line {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px;
      align-items: start;
      padding: 8px;
      border-radius: var(--radius);
      background: rgba(247, 201, 72, 0.09);
      border: 1px solid rgba(247, 201, 72, 0.18);
      color: #fff4bd;
      font-size: 0.76rem;
      line-height: 1.28;
    }

    .mission-toggle-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .mission-toggle {
      min-height: 34px;
      padding: 6px 9px;
      font-size: 0.72rem;
    }

    .mission-details {
      display: grid;
      gap: 8px;
      padding-top: 2px;
    }

    .mission-goals {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .mission-goal {
      display: grid;
      gap: 4px;
      padding: 7px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
    }

    .mission-goal-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .mission-goal-title {
      color: var(--soft);
      font-size: 0.72rem;
      font-weight: 850;
      line-height: 1.15;
    }

    .mission-goal .badge {
      min-height: 22px;
      padding: 3px 6px;
      font-size: 0.67rem;
    }

    .mission-goal-meta {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 760;
    }

    .mission-progress {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .mission-progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--academy-accent), var(--gold), var(--academy-accent-2));
      background-size: 180% 100%;
      transition: width 240ms ease;
      animation: missionProgressFlow 3800ms linear infinite;
    }

    .welcome-mission-card {
      display: grid;
      gap: 10px;
      padding: 0;
      border-radius: 6px 16px 6px 6px;
      background:
        radial-gradient(circle at 92% 6%, color-mix(in srgb, var(--academy-accent) 28%, transparent), transparent 96px),
        linear-gradient(145deg, rgba(25, 35, 56, 0.98), rgba(8, 13, 25, 0.98));
      border-color: color-mix(in srgb, var(--academy-accent) 28%, var(--line));
      animation: missionBreath 6800ms ease-in-out infinite;
    }

    .welcome-mission-card::before {
      width: 6px;
      background: linear-gradient(180deg, var(--academy-accent), var(--gold), var(--academy-accent-2));
    }

    .welcome-mission-card::after {
      content: "";
      position: absolute;
      inset: auto 12px 10px;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--academy-accent) 62%, white), transparent);
      opacity: 0.46;
      pointer-events: none;
    }

    .ceremony-banner,
    .ceremony-action-board,
    .mission-board {
      position: relative;
      z-index: 1;
      margin: 12px;
    }

    .ceremony-banner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 0;
      padding: 12px;
      border-radius: 5px 14px 5px 5px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 18%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.035);
      border: 1px solid color-mix(in srgb, var(--academy-accent) 22%, var(--line));
    }

    .ceremony-kicker {
      color: color-mix(in srgb, var(--academy-accent) 72%, white);
      font-size: 0.62rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
    }

    .ceremony-title {
      margin-top: 4px;
      color: var(--text);
      font-size: 1.24rem;
      font-weight: 950;
      line-height: 1.05;
    }

    .ceremony-copy {
      margin-top: 5px;
      color: var(--soft);
      font-size: 0.78rem;
      font-weight: 740;
      line-height: 1.34;
    }

    .ceremony-seal {
      display: grid;
      place-items: center;
      min-width: 66px;
      min-height: 66px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 36%, rgba(255, 255, 255, 0.18));
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.22), transparent 18px),
        color-mix(in srgb, var(--academy-accent) 16%, rgba(255, 255, 255, 0.04));
      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.04),
        0 0 0 5px color-mix(in srgb, var(--academy-accent) 10%, transparent);
    }

    .ceremony-seal .academy-crest {
      width: 46px;
      height: 46px;
    }

    .ceremony-action-board {
      display: grid;
      gap: 9px;
      padding: 10px;
      border-radius: 5px 12px 5px 5px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--academy-accent) 12%, transparent), transparent),
        rgba(255, 255, 255, 0.035);
    }

    .ceremony-program {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .ceremony-step-title {
      color: var(--text);
      font-size: 0.96rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .ceremony-step-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 740;
      line-height: 1.32;
    }

    .ceremony-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .ceremony-step {
      display: grid;
      gap: 4px;
      min-width: 0;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
    }

    .ceremony-step.done {
      border-color: rgba(74, 222, 128, 0.24);
      background: rgba(74, 222, 128, 0.07);
    }

    .ceremony-step.current {
      border-color: color-mix(in srgb, var(--academy-accent) 38%, var(--line));
      background: color-mix(in srgb, var(--academy-accent) 10%, rgba(255, 255, 255, 0.035));
    }

    .ceremony-step-index {
      color: color-mix(in srgb, var(--academy-accent) 70%, white);
      font-size: 0.62rem;
      font-weight: 950;
    }

    .ceremony-step-label {
      overflow: hidden;
      color: var(--soft);
      font-size: 0.68rem;
      font-weight: 820;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compact-identity .crest-picker-row {
      grid-template-columns: auto 1fr;
    }

    .identity-details {
      border-radius: 6px;
      border: 1px dashed color-mix(in srgb, var(--academy-accent) 34%, var(--line));
      background: rgba(255, 255, 255, 0.025);
    }

    .identity-details summary {
      cursor: pointer;
      min-height: 38px;
      padding: 10px;
      color: color-mix(in srgb, var(--academy-accent) 68%, white);
      font-size: 0.72rem;
      font-weight: 900;
      list-style: none;
      text-transform: uppercase;
    }

    .identity-details summary::-webkit-details-marker {
      display: none;
    }

    .identity-details summary::after {
      content: "Open";
      float: right;
      color: var(--muted);
      font-size: 0.66rem;
    }

    .identity-details[open] summary::after {
      content: "Close";
    }

    .identity-details .identity-form {
      padding: 0 10px 10px;
    }

    .ceremony-path-details {
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);

    .ceremony-path-details summary {

    .ceremony-path-details[open] summary::after {

    .ceremony-path-details .ceremony-steps {

    .ceremony-drill-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 36%, rgba(255, 255, 255, 0.18));
      border-radius: 6px;
      color: var(--text);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 34%, var(--primary)), color-mix(in srgb, var(--academy-accent-2) 42%, var(--teal)));
      box-shadow: 0 10px 28px color-mix(in srgb, var(--academy-accent) 16%, transparent);
    }

    .ceremony-drill-button span {
      overflow: hidden;
      font-weight: 950;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ceremony-drill-button strong {
      font-size: 0.78rem;
    }

    .mission-board {
      display: grid;
      gap: 8px;
      margin-top: 0;
      padding: 10px;
      border-radius: 5px 5px 14px 5px;
      border: 1px solid color-mix(in srgb, var(--gold) 22%, var(--line));
      background:
        linear-gradient(135deg, rgba(247, 201, 72, 0.08), transparent 62%),
        rgba(255, 255, 255, 0.035);
    }

    .orientation-card {
      display: grid;
      gap: 10px;
      background:
        radial-gradient(circle at 90% 0, color-mix(in srgb, var(--academy-accent) 18%, transparent), transparent 78px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .orientation-card.complete {
      border-color: rgba(74, 222, 128, 0.32);
      background:
        radial-gradient(circle at 88% 0, rgba(74, 222, 128, 0.16), transparent 80px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .orientation-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .orientation-title {
      color: var(--text);
      font-size: 1rem;
      font-weight: 950;
      line-height: 1.15;
    }

    .orientation-note {
      color: var(--soft);
      font-size: 0.8rem;
      font-weight: 720;
      line-height: 1.35;
    }

    .orientation-checklist {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .orientation-step {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px;
      align-items: center;
      min-width: 0;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .orientation-step.done {
      border-color: rgba(74, 222, 128, 0.25);
      background: rgba(74, 222, 128, 0.08);
    }

    .orientation-step .goal-check {
      width: 22px;
      height: 22px;
      font-size: 0.66rem;
    }

    .orientation-step.done .goal-check {
      color: #04110a;
      background: var(--green);
      border-color: transparent;
    }

    .orientation-step-title {
      overflow: hidden;
      color: var(--soft);
      font-size: 0.7rem;
      font-weight: 850;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .orientation-identity {
      display: grid;
      gap: 9px;
      padding: 9px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 24%, var(--line));
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
    }

    .orientation-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .orientation-actions .small-btn {
      min-height: 42px;
    }

    .recommendation-card {
      display: grid;
      gap: 10px;
    }

    .campus-map {
      position: relative;
      isolation: isolate;
      min-height: 382px;
      overflow: hidden;
      padding: 14px 12px 18px;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 20%, color-mix(in srgb, var(--campus-accent, var(--teal)) 16%, transparent), transparent 122px),
        linear-gradient(180deg, color-mix(in srgb, var(--campus-accent, var(--teal)) 9%, transparent), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.018));
    }

    .campus-map::before {
      content: "";
      position: absolute;
      inset: 72px 10px 18px;
      border-radius: 50% 50% 16px 16px;
      background:
        linear-gradient(90deg, transparent 0 24%, rgba(255, 255, 255, 0.1) 24% 26%, transparent 26% 48%, rgba(255, 255, 255, 0.09) 48% 52%, transparent 52% 74%, rgba(255, 255, 255, 0.1) 74% 76%, transparent 76%),
        linear-gradient(180deg, color-mix(in srgb, var(--campus-accent, var(--teal)) 17%, transparent), rgba(255, 255, 255, 0.035));
      opacity: 0.64;
      pointer-events: none;
      transform: perspective(150px) rotateX(10deg);
      z-index: 0;
    }

    .campus-map::after {
      content: "";
      position: absolute;
      inset: 16px 16px auto auto;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--campus-accent, var(--teal)) 14%, transparent);
      filter: blur(14px);
      opacity: 0.85;
      pointer-events: none;
      animation: campusGlow 5200ms ease-in-out infinite;
    }

    .campus-courtyard {
      position: absolute;
      left: 50%;
      top: 44%;
      z-index: 1;
      width: 106px;
      height: 106px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--campus-accent, var(--teal)) 24%, rgba(255, 255, 255, 0.12));
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 44%),
        color-mix(in srgb, var(--campus-accent, var(--teal)) 10%, transparent);
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.05);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .campus-courtyard::before,
    .campus-courtyard::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 142px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      transform-origin: center;
    }

    .campus-courtyard::before {
      transform: translate(-50%, -50%) rotate(28deg);
    }

    .campus-courtyard::after {
      transform: translate(-50%, -50%) rotate(-28deg);
    }

    .hub-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px 14px;
    }

    .hub-card {
      position: relative;
      --building-scale: 1;
      --wing-height: 34px;
      --wing-opacity: 0.76;
      --window-opacity: 0.62;
      --window-row-two-opacity: 0;
      --window-row-three-opacity: 0;
      --banner-opacity: 0;
      --flag-opacity: 0.68;
      min-height: 172px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-content: stretch;
      padding: 10px;
      text-align: left;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 24%, rgba(255, 255, 255, 0.12));
      border-radius: 7px;
      background:
        radial-gradient(circle at 50% 64%, color-mix(in srgb, var(--accent, var(--teal)) 17%, transparent), transparent 56px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(12, 17, 29, 0.78);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.3);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .hub-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent, var(--teal)) 70%, white), transparent);
      opacity: 0.78;
    }

    .hub-card::after {
      content: "";
      position: absolute;
      inset: auto 12px 12px;
      height: 22px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, color-mix(in srgb, var(--accent, var(--teal)) 25%, transparent), transparent 72%);
      opacity: 0.76;
    }

    .hub-card:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent, var(--teal)) 74%, white);
      outline-offset: 2px;
    }

    .hub-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 54%, var(--line));
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.34);
    }

    .hub-card.status-hot {
      border-color: color-mix(in srgb, var(--gold) 28%, var(--accent, var(--teal)));
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--gold) 18%, transparent),
        0 18px 34px rgba(0, 0, 0, 0.34);
      animation: livingCardPulse 4200ms ease-in-out infinite;
    }

    .hub-card.status-active {
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 44%, var(--line));
    }

    .hub-card.status-good {
      border-color: rgba(74, 222, 128, 0.32);
      background:
        radial-gradient(circle at 50% 64%, rgba(74, 222, 128, 0.16), transparent 56px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(12, 17, 29, 0.78);
    }

    .hub-card.stage-0 {
      --building-scale: 0.9;
      --wing-opacity: 0.38;
      --window-opacity: 0.44;
      --flag-opacity: 0.36;
    }

    .hub-card.stage-1 {
      --building-scale: 1;
      --window-row-two-opacity: 0.36;
      --flag-opacity: 0.66;
    }

    .hub-card.stage-2 {
      --building-scale: 1.08;
      --wing-height: 40px;
      --window-row-two-opacity: 0.58;
      --banner-opacity: 0.78;
      --flag-opacity: 0.82;
    }

    .hub-card.stage-3 {
      --building-scale: 1.16;
      --wing-height: 44px;
      --wing-opacity: 0.96;
      --window-opacity: 0.78;
      --window-row-two-opacity: 0.74;
      --window-row-three-opacity: 0.56;
      --banner-opacity: 1;
      --flag-opacity: 1;
    }

    .hub-card.activity-idle {
      filter: saturate(0.88);
    }

    .hub-card > * {
      position: relative;
      z-index: 2;
    }

    .campus-topline {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .campus-building {
      position: relative;
      align-self: center;
      justify-self: center;
      z-index: 1;
      display: block;
      width: calc(98px * var(--building-scale));
      height: calc(78px * var(--building-scale));
      margin: 6px 0 7px;
      opacity: 0.86;
      pointer-events: none;
      animation: buildingPulse 5200ms ease-in-out infinite;
    }

    .building-svg-slot {
      display: none;
    }

    .building-glow {
      position: absolute;
      inset: 8px 8px 0;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      filter: blur(16px);
      opacity: 0.88;
    }

    .building-roof {
      position: absolute;
      inset: 0 18px auto;
      display: block;
      height: 26px;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background: color-mix(in srgb, var(--accent, var(--teal)) 54%, #ffffff 8%);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.28));
    }

    .building-body {
      position: absolute;
      inset: 24px 17px 9px;
      display: block;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 42%, transparent);
      border-radius: 8px 8px 3px 3px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 20%, transparent), rgba(255, 255, 255, 0.04));
    }

    .building-window-row {
      position: absolute;
      left: 7px;
      right: 7px;
      height: 4px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, rgba(255, 255, 255, var(--window-opacity)) 0 7px, transparent 7px 12px);
      opacity: 0.62;
    }

    .building-window-row.row-one {
      top: 8px;
    }

    .building-window-row.row-two {
      top: 16px;
      opacity: var(--window-row-two-opacity);
    }

    .building-window-row.row-three {
      top: 24px;
      opacity: var(--window-row-three-opacity);
    }

    .building-wing {
      position: absolute;
      bottom: 9px;
      width: 22px;
      height: var(--wing-height);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 34%, transparent);
      background: color-mix(in srgb, var(--accent, var(--teal)) 15%, rgba(255, 255, 255, 0.04));
      opacity: var(--wing-opacity);
    }

    .building-wing.left {
      left: 6px;
      border-radius: 7px 2px 2px 3px;
    }

    .building-wing.right {
      right: 6px;
      border-radius: 2px 7px 3px 2px;
    }

    .building-door {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 13px;
      height: 18px;
      border-radius: 7px 7px 2px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 40%, rgba(255, 255, 255, 0.12));
      transform: translateX(-50%);
    }

    .building-light {
      position: absolute;
      inset: 32px 21px auto;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      opacity: 0.68;
      animation: lightSweep 3600ms ease-in-out infinite;
    }

    .building-banner {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 27px;
      display: none;
      min-height: 11px;
      border-radius: 2px;
      background: color-mix(in srgb, var(--gold) 76%, var(--accent, var(--teal)));
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.28);
      opacity: var(--banner-opacity);
    }

    .building-flag {
      position: absolute;
      right: 13px;
      top: 8px;
      width: 16px;
      height: 12px;
      border-radius: 2px 7px 7px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 64%, white);
      opacity: var(--flag-opacity);
      transform-origin: 0 50%;
      animation: flagWave 4200ms ease-in-out infinite;
    }

    .building-activity-dot {
      position: absolute;
      left: 14px;
      bottom: 12px;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 72%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      opacity: 0.72;
    }

    .hub-card.status-hot .campus-building::after {
      content: "";
      position: absolute;
      right: 8px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(247, 201, 72, 0.15);
      animation: signalPulse 2400ms ease-in-out infinite;
    }

    .campus-world .building-roof {
      inset-inline: 14px;
      clip-path: polygon(0 38%, 50% 0, 100% 38%, 88% 100%, 12% 100%);
    }

    .campus-events .building-roof {
      clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%);
    }

    .campus-events .building-banner {
      display: block;
      opacity: 1;
      animation: bannerWave 3600ms ease-in-out infinite;
    }

    .campus-offices .building-body {
      border-radius: 4px;
    }

    .campus-sports .building-body {
      border-radius: 12px 12px 2px 2px;
    }

    .campus-sports .building-roof {
      inset-inline: 22px;
      border-radius: 999px 999px 0 0;
      clip-path: ellipse(50% 100% at 50% 100%);
    }

    .campus-sports .building-light {
      animation: runningLight 2600ms ease-in-out infinite;
    }

    .campus-offices .building-window-row {
      animation: officeWindowGlow 4600ms ease-in-out infinite;
    }

    .campus-world .building-flag {
      animation: flagWave 3200ms ease-in-out infinite;
    }

    .campus-offices .building-roof {
      inset-inline: 20px;
      clip-path: polygon(0 100%, 12% 28%, 50% 0, 88% 28%, 100% 100%);
    }

    .campus-offices .building-wing {
      width: 18px;
      border-radius: 4px;
    }

    .campus-events .building-body {
      border-radius: 4px 4px 12px 12px;
    }

    .campus-events .campus-building::before,
    .campus-events .campus-building::after {
      content: "";
      position: absolute;
      top: 31px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(7, 10, 18, 0.72);
      z-index: 2;
    }

    .campus-events .campus-building::before {
      left: 10px;
    }

    .campus-events .campus-building::after {
      right: 10px;
    }

    .campus-world .building-body {
      border-radius: 999px 999px 5px 5px;
    }

    .campus-world .building-door {
      width: 18px;
      border-radius: 999px 999px 2px 2px;
    }

    .stage-2 .building-banner,
    .stage-3 .building-banner {
      display: block;
    }

    .campus-world .campus-building {
      width: calc(92px * var(--building-scale));
    }

    .campus-mark {
      display: grid;

      height: 28px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 22%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 34%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 10%, transparent);
      font-size: 0.98rem;
      line-height: 1;

    .campus-mark .academy-icon {

      height: 17px;

    .campus-level {

      border-radius: 999px;

      font-size: 0.64rem;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .campus-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .hub-card strong {

      color: var(--text);
      font-size: 0.86rem;
      line-height: 1.15;
    }

    .campus-note {

      font-weight: 740;

      border-color: rgba(74, 222, 128, 0.28);
      background: rgba(74, 222, 128, 0.1);
    }

    .pill.hot,
    .badge.hot {
      color: #ffeeb1;
      border-color: rgba(247, 201, 72, 0.34);
      background: rgba(247, 201, 72, 0.12);
    }

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 16px 0 9px;
    }

      margin: 0;

      letter-spacing: 0;
    }

      margin: -4px 0 10px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .card {

      overflow: hidden;
      padding: 12px;
    }

    .card::before {
      content: "";
      position: absolute;

      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 6, 12, 0.72);

      padding: 16px;

      gap: 9px;
      margin-top: 14px;

      }

        width: 58px;
        height: 58px;
      }
    }
  </style>

        s.reputation = Math.max(0, Math.floor(cleanNumber(raw.reputation, 0)));
        s.academy = normalizeAcademyIdentity(raw.academy, base.academy);

        s.lastSave = cleanNumber(raw.lastSave, base.lastSave);

        s.nextEventTime = cleanNumber(raw.nextEventTime, base.nextEventTime);

        s.tutorialSeen = Boolean(raw.tutorialSeen);

        s.unlockedCountryIds = normalizeIdList(raw.unlockedCountryIds, CONTENT.countries, ["usa"]);
        s.completedCountryIds = normalizeIdList(raw.completedCountryIds, CONTENT.countries, []);

          .filter(country => s.countryProgress[country.id] && s.countryProgress[country.id].rewardClaimed)
          .map(country => country.id);
        refreshUnlockedCountriesForState(s);
        if (!s.unlockedCountryIds.includes(s.currentCountryId)) s.currentCountryId = s.unlockedCountryIds[0] || "usa";

        CONTENT.facilities.forEach(f => {
          const saved = raw.facilities && raw.facilities[f.id];
          s.facilities[f.id] = { level: Math.max(0, Math.floor(cleanNumber(saved && saved.level, 0))) };

        CONTENT.coaches.forEach(c => {

          s.coaches[c.id] = { level: clamp(Math.floor(cleanNumber(saved && saved.level, 0)), 0, c.maxLevel) };

        CONTENT.clickUpgrades.forEach(upgrade => {
          const saved = raw.clickUpgrades && raw.clickUpgrades[upgrade.id];
          s.clickUpgrades[upgrade.id] = {

        CONTENT.athletes.forEach(a => {
          const saved = raw.athletes && raw.athletes[a.id];
          const recruited = Boolean(saved && saved.recruited);
          const assigned = recruited && getFacility(saved && saved.assigned) ? saved.assigned : "";
          s.athletes[a.id] = {
            recruited,
            skill: clamp(Math.floor(cleanNumber(saved && saved.skill, 1)), 1, a.potential),

            assigned,
            recruitedAt: cleanNumber(saved && saved.recruitedAt, 0)
