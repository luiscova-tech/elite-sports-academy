          .map(([key, value]) => `data-${key}="${value}"`)
          .join(" ");
        return `<button class="primary-btn" data-action="${step.action}" ${attrs}>${step.cta}</button>`;
      }

      function onboardingStepDefinitions() {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const facilityGoal = progress.goals.find(goal => !goal.complete && goal.type === "facilityLevel");
        const firstFacility = facilityGoal ? getFacility(facilityGoal.facilityId) : activeFacilities()[0];
        const facilityCostNow = firstFacility ? facilityCost(firstFacility.id, 1) : 0;
        const coachAction = nextAffordableCoach();
        const athleteAction = nextAthleteAction();
        const next = nextCountry(country);

        return [
          {
            id: "identity",
            label: "Confirm identity",
            complete: Boolean(state.onboarding.identityConfirmed),
            title: "This is your academy.",
            note: "Choose a name, motto, crest, and theme so this feels like your academy from the first session.",
            cta: "Save Academy Identity",
            action: "confirm-onboarding-identity"
          },
          {
            id: "drill",
            label: "Tap Session Drill",
            complete: state.stats.totalClicks >= 1,
            title: "Start training with Session Drill.",
            note: "Session Drill is the heartbeat of the academy. Tap it to earn your first Training Points.",
            cta: "Run Session Drill",
            action: "drill"
          },
          {
            id: "facility",
            label: "Upgrade facility",
            complete: state.stats.facilitiesBought >= 1,
            title: firstFacility ? `Build the ${firstFacility.short} program.` : "Build your first facility.",
            note: firstFacility
              ? `${firstFacility.name} starts passive TP/sec and supports the current chapter goal. Open Sports Center and buy the next level there.`
              : "Facilities turn your academy into an automated training center.",
            cta: firstFacility && state.tp >= facilityCostNow ? "Open Sports Center" : "Run Session Drill",
            action: firstFacility && state.tp >= facilityCostNow ? "navigate-guide" : "drill",
            dataset: firstFacility && state.tp >= facilityCostNow ? { tab: "sports", "guide-type": "facility", "guide-id": firstFacility.id } : {}
          },
          {
            id: "coach",
            label: "Recruit coach",
            complete: state.stats.coachesRecruited >= 1,
            title: coachAction ? coachAction.title : "Open your first coach slot.",
            note: coachAction
              ? coachAction.note
              : coachSlotsCap() === 0
                ? "Facilities unlock coach slots. Track level 5 is the quickest path to your first staff hire."
                : "Save TP for your first coach so training output and Session Drill power start scaling.",
            cta: coachAction ? coachAction.cta : "Open Sports Center",
            action: coachAction ? coachAction.action : "navigate-guide",
            dataset: coachAction ? coachAction.dataset : { tab: "sports", "guide-type": "facility", "guide-id": firstFacility ? firstFacility.id : "" }
          },
          {
            id: "athlete",
            label: "Recruit athlete",
            complete: state.stats.athletesRecruited >= 1,
            title: athleteAction ? athleteAction.title : "Bring in your first athlete.",
            note: athleteAction
              ? athleteAction.note
              : athleteCap() === 0
                ? "Buying any facility creates athlete capacity. Athletes make the academy feel alive and improve sport output."
                : "Save TP for your first athlete, then assign them to a matching facility.",
            cta: athleteAction ? athleteAction.cta : athleteCap() === 0 ? "Open Sports Center" : "Open Academy Offices",
            action: athleteAction ? athleteAction.action : "navigate-guide",
            dataset: athleteAction ? athleteAction.dataset : athleteCap() === 0 ? { tab: "sports", "guide-type": "facility", "guide-id": firstFacility ? firstFacility.id : "" } : { tab: "academy", "guide-type": "athlete", "guide-id": "" }
          },
          {
            id: "mission",
            label: "Review mission",
            complete: Boolean(state.onboarding.chapterReviewed),
            title: "Read the chapter goals.",
            note: `${country.name} is your current World Tour chapter. The Mission Card shows every goal, progress bar, reward, and unlock path.`,
            cta: "Review Chapter Goals",
            action: "review-chapter-goals"
          },
          {
            id: "world",
            label: "View World Tour",
            complete: Boolean(state.onboarding.worldTourViewed),
            title: "See where the academy goes next.",
            note: next ? `The World tab shows completed countries, ${country.name}, locked destinations, and the path toward ${next.name}.` : "The World tab shows your medals, reputation, prestige path, and future destinations.",
            cta: "View World Tour Path",
            action: "open-world-tour"
          }
        ];
      }

      function currentMissionGoal(progress) {
        if (progress.rewardClaimed) {
          return {
            label: "Chapter complete",
            currentLabel: `${progress.completed}/${progress.total} goals complete`,
            targetLabel: "Reward claimed"
          };
        }
        if (progress.readyToClaim) {
          return {
            label: "Claim the chapter reward",
            currentLabel: `${progress.completed}/${progress.total} goals complete`,
            targetLabel: "Reward ready"
          };
        }
        const nextGoal = progress.goals.find(goal => !goal.complete) || progress.goals[0];
        if (nextGoal) return nextGoal;
        return {
          label: "Review the World Tour",
          currentLabel: "No active goal",
          targetLabel: "Awaiting next destination"
        };
      }

      function renderMissionGoal(goal) {
        return `
          <div class="mission-goal">
            <div class="mission-goal-head">
              <div class="mission-goal-title">${goal.label}</div>
              <span class="badge ${goal.complete ? "good" : ""}">${goal.percent}%</span>
            </div>
            <div class="mission-progress" aria-hidden="true"><div class="mission-progress-fill" style="width:${goal.percent}%"></div></div>
            <div class="mission-goal-meta">${goal.currentLabel} / ${goal.targetLabel}</div>
          </div>
        `;
      }

        const recommendation = recommendedNextAction();
        return `
          <section>
            <div class="section-title">
              <h2>Recommended Next Action</h2>
              <span class="badge">Guidance</span>
            </div>
            <div class="card recommendation-card" style="--accent:${recommendation.accent || "var(--teal)"}">
              <div class="card-head">
                <div>
                  <h3>${recommendation.title}</h3>
                  <div class="role">${recommendation.note}</div>

                <div class="level-token"><span>Why</span><strong>${recommendation.reason}</strong></div>
              </div>
              <div class="button-row" style="grid-template-columns: 1fr;">
                ${renderRecommendationButton(recommendation)}
              </div>
            </div>
          </section>
        `;
      }

      function renderRecommendationButton(recommendation) {
        const attrs = Object.entries(recommendation.dataset || {})
          .map(([key, value]) => `data-${key}="${value}"`)
          .join(" ");
        return `<button class="primary-btn" data-action="${recommendation.action}" ${attrs}>${recommendation.cta}</button>`;
      }

      function guideClass(type, id = "") {
        if (!activeGuideTarget || activeGuideTarget.type !== type) return "";
        if (activeGuideTarget.id && id && activeGuideTarget.id !== id) return "";
        return "guide-highlight";
      }

      function navigateGuide(tab, type, id = "") {
        state.ui.activeTab = TABS.some(item => item.id === tab) ? tab : "home";
        activeGuideTarget = { type, id, createdAt: now() };
        if (tab === "world") markOnboardingFlag("worldTourViewed");
        if (tab === "events") markOnboardingFlag("firstCompetitionBriefed");
        saveState();
        renderSoon();
        toast("Coach focus set. Look for the highlighted academy area.");

        const country = currentCountry();
        const progress = countryProgressSummary(country);

        const highestFacility = Math.max(0, ...activeFacilities().map(facility => state.facilities[facility.id].level));
        const staffCount = coachSlotsUsed() + athletesUsed();
        const cards = [
          { label: "Sports Center", icon: "sports", note: "Facilities, training output, and academy strength.", signal: signals.sports.label, tone: signals.sports.tone, activity: signals.sports.activity, stage: visualStageFromLevel(highestFacility), level: `Lv ${highestFacility}`, tab: "sports", type: "sports", accent: "#60a5fa" },
          { label: "Academy Offices", icon: "academy", note: "Coaches, athletes, roster capacity, and development.", signal: signals.academy.label, tone: signals.academy.tone, activity: signals.academy.activity, stage: visualStageFromStaff(staffCount), level: `Staff ${staffCount}`, tab: "academy", type: "offices", accent: "#4ade80" },
          { label: "Competition Hall", icon: "events", note: "Events, chapter wins, and today's prizes.", signal: signals.competitions.label, tone: signals.competitions.tone, activity: signals.competitions.activity, stage: visualStageFromWins(state.stats.competitionsWon), level: `Wins ${state.stats.competitionsWon}`, tab: "events", type: "events", accent: "#f7c948" },
          { label: "World Tour Gate", icon: "world", note: "Route progress, countries, rewards, and destination path.", signal: signals.world.label, tone: signals.world.tone, activity: signals.world.activity, stage: visualStageFromPercent(progress.percent), level: `${progress.percent}%`, tab: "world", type: "world", accent: "#2dd4bf" }

      function campusActivitySignals() {
        const progress = countryProgressSummary();
        const upgradeReady = activeFacilities().some(facility => state.tp >= facilityCost(facility.id, 1));

      function worldCampusCountries() {
        return WORLD_ROUTE_IDS.map(getCountry).filter(country => country && country.playable !== false);
      }

      function campusFacilities(country) {
        const sportIds = new Set((country.sportIds || []).filter(Boolean));
        return CONTENT.facilities.filter(facility => sportIds.has(facility.sportId));
      }

      function campusAthletes(country) {
        const sportIds = new Set((country.sportIds || []).filter(Boolean));
        return CONTENT.athletes.filter(athlete => sportIds.has(athlete.sportId));
      }

      function campusFacilityRecords(campus) {
        return campusOwnsFacilities(campus) ? campus.facilities.records : state.facilities;
      }

      function campusAthleteRecords(campus) {
        return campusOwnsAthletes(campus) ? campus.athletes.records : state.athletes;
      }

      function campusFacilityProgress(country, campus) {
        const records = campusFacilityRecords(campus);
        const facilities = campusFacilities(country);
        const levels = facilities.map(facility => Math.max(0, Math.floor(cleanNumber(records && records[facility.id] && records[facility.id].level, 0))));
        const total = levels.reduce((sum, level) => sum + level, 0);
        const highest = levels.length ? Math.max(...levels) : 0;
        const built = levels.filter(level => level > 0).length;
        return {
          label: `${built}/${facilities.length} built`,
          detail: `${total} total levels, highest L${highest}`
        };
      }

      function campusAthleteCount(country, campus) {
        const records = campusAthleteRecords(campus);
        return campusAthletes(country).reduce((sum, athlete) => {
          const record = records && records[athlete.id];
          return sum + (record && record.recruited ? 1 : 0);
        }, 0);
      }

      function campusAssignedCoaches(country) {
        const assignments = state.academy && state.academy.coaches && state.academy.coaches.assignments
          ? state.academy.coaches.assignments
          : {};
        return CONTENT.coaches.filter(coach => {
          const level = state.coaches[coach.id] && state.coaches[coach.id].level;
          const assignment = assignments[coach.id];
          return level > 0 && assignment && assignment.assignmentCampusId === country.id;
        });
      }

        const coaches = campusAssignedCoaches(country);
        const athleteCount = campusAthleteCount(country, campus);
        const facilityProgress = campusFacilityProgress(country, campus);
        const status = current ? "Active" : completed ? "Completed" : unlocked ? "Unlocked" : "Locked";
        const actionLabel = current ? "Active Campus" : unlocked ? `Travel to ${country.name}` : unlockRequirementLabel(country);
        return `

                ${statMetric("Competitions Won", state.stats.competitionsWon)}
                ${statMetric("Medals", state.medals)}
                ${statMetric("Reputation", state.reputation)}
                ${statMetric("Championship Trophies", state.trophies)}
                ${statMetric("Academy Funding", fmt(academyFundingValue()))}
                ${statMetric("Current Academy Rank", academyRankByReputation())}
                ${statMetric("Favorite Sport", favoriteSportLabel())}
                ${statMetric("Highest Facility", highest)}
                ${statMetric("Total Athletes Trained", state.stats.athletesRecruited)}
                ${statMetric("Total Coaches Recruited", state.stats.coachesRecruited)}
              </div>
            </div>
          </section>
        `;
      }

      function renderHallOfFame() {
        return `
          <section>
            <div class="section-title">
              <h2>Hall of Fame</h2>
              <span class="badge">Coming Soon</span>
            </div>
            <div class="card" style="--accent: var(--academy-accent)">
              <h3>Coming Soon</h3>
              <p class="section-subtitle">The greatest athletes in academy history will be honored here.</p>
            </div>
          </section>
        `;
      }

      function renderCampaignMap() {
        const unlocked = state.unlockedCountryIds.length;
        const completed = state.completedCountryIds.length;
        const future = CONTENT.countries.length - unlocked + FUTURE_DESTINATIONS.length;
        return `
          <section>
            <div class="section-title">
              <h2>World Campaign</h2>
              <span class="badge">${completed} complete / ${unlocked} unlocked</span>
            </div>
            <div class="card passport-card" style="--accent:${currentCountry().accent || "var(--teal)"}">
              ${renderPassportScene()}
              <div class="metric-row">
                <div class="metric"><b>${countryFlag(currentCountry())} ${currentCountry().name}</b><span>Current country</span></div>
                <div class="metric"><b>${unlocked}</b><span>Unlocked countries</span></div>
                <div class="metric"><b>${completed}</b><span>Completed countries</span></div>
                <div class="metric"><b>${future}</b><span>Future countries</span></div>
                <div class="metric"><b>${state.medals}</b><span>Medals</span></div>
                <div class="metric"><b>${state.reputation}</b><span>Reputation</span></div>
              </div>
              ${renderWorldRouteStrip()}
              <div class="campaign-map">
                ${worldRouteDestinations().map(destination => destination.previewOnly ? renderFutureDestinationNode(destination) : renderCountryNode(destination)).join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderWorldRouteStrip() {
        const destinations = worldRouteDestinations();
        return `
          <div class="route-strip" aria-label="World Tour route">
            ${destinations.map((destination, index) => {
              const completed = state.completedCountryIds.includes(destination.id);
              const current = state.currentCountryId === destination.id;
              const unlocked = state.unlockedCountryIds.includes(destination.id);
              const statusClass = completed ? "complete" : current ? "current" : unlocked ? "unlocked" : "locked";
              const statusMark = completed ? "Complete" : current ? "Current" : unlocked ? "Open" : "Future";
              return `<span class="route-pill ${statusClass}" style="--accent:${destination.accent || "var(--teal)"}"><span class="route-step">${index + 1}</span><span class="route-flag">${countryFlag(destination)}</span><strong class="route-name">${destination.short || destination.name}</strong><span class="route-mark">${statusMark}</span></span>`;
            }).join("")}
          </div>
        `;
      }

      function worldRouteDestinations() {
        return WORLD_ROUTE_IDS
          .map(id => {
            const country = getCountry(id);
            if (country) return { ...country, previewOnly: false };
            const future = FUTURE_DESTINATIONS.find(destination => destination.id === id);
            return future ? { ...future, previewOnly: true } : null;
          })
          .filter(Boolean);
      }

      function renderCountryNode(country) {
        const summary = countryProgressSummary(country);
        const unlocked = state.unlockedCountryIds.includes(country.id);
        const completed = state.completedCountryIds.includes(country.id);
        const current = state.currentCountryId === country.id;
        const status = completed ? "Completed" : current ? "Current" : unlocked ? "Unlocked" : "Locked";
        const next = nextCountry(country);
        const note = unlocked
          ? `${summary.completed}/${summary.total} goals - ${summary.percent}%${next ? ` - Next: ${next.name}` : ""}`
          : unlockRequirementLabel(country);
        return `
          <div class="country-node passport-destination ${current ? "current" : ""} ${unlocked ? "" : "locked"} ${guideClass("country", country.id)} ${guideClass("route", country.id)}" style="--accent:${country.accent || "var(--teal)"}">
            <div class="country-token passport-stamp">${countryFlag(country)}</div>
            <div>
              <div class="country-node-title">${country.name}</div>
              <div class="country-node-note">${country.description || note}</div>
              <div class="country-node-note">${note}</div>
            </div>
            <span class="badge ${completed ? "good" : current ? "hot" : ""}">${status}</span>
          </div>
        `;
      }

      function renderFutureDestinationNode(destination) {
        return `
          <div class="country-node passport-destination locked" style="--accent:${destination.accent}">
            <div class="country-token passport-stamp">${countryFlag(destination)}</div>
            <div>
              <div class="country-node-title">${destination.name}</div>
              <div class="country-node-note">${destination.description}</div>
              <div class="country-node-note">${destination.preview}</div>
            </div>
            <span class="badge">Locked</span>
          </div>
        `;
      }

      function nextRewardPreview() {
        const country = currentCountry();
        const next = nextCountry(country);
        if (next) {
          const sports = next.sportIds && next.sportIds.length
            ? next.sportIds.map(id => sportLabel(id, "short")).join(" / ")
            : "Future sports";
          const coachNames = CONTENT.coaches
            .filter(coach => (coach.sportIds || []).some(id => (next.sportIds || []).includes(id)))
            .map(coach => coach.name);
          const facilityNames = CONTENT.facilities
            .filter(facility => (next.sportIds || []).includes(facility.sportId))
            .map(facility => facility.short);
          return {
            name: next.name,
            flag: countryFlag(next),
            description: next.description || "The next World Tour destination.",
            status: state.unlockedCountryIds.includes(next.id) ? "Unlocked" : "Locked",
            sports,
            coaches: coachNames.length ? coachNames.join(" / ") : "Future coaches",
            facilities: facilityNames.length ? facilityNames.join(" / ") : "Future facilities",
            reward: countryRewardLabel(country),
            accent: next.accent || "var(--teal)"
          };
        }
        const preview = FUTURE_DESTINATIONS[0];
        return {
          name: preview ? preview.name : "Future Tour",
          flag: preview ? countryFlag(preview) : "",
          description: preview ? preview.description : "More destinations will be added in future milestones.",
          status: "Locked",
          sports: "Future sports",
          coaches: "Future coaches",
          facilities: "Future facilities",
          reward: "Future chapter reward",
          accent: preview ? preview.accent : "var(--teal)"
        };
      }

      function renderWorldDashboard() {
        const country = currentCountry();
        const campus = campusForState(state);
        const operations = operationsCapacityRecord(state);
        return `
          <section>
            <div class="section-title">
              <h2>Academy Dashboard</h2>
              <span class="badge">${country.short}</span>
            </div>
            <div class="card" style="--accent:${country.accent || sportAccent(country.sportIds[0])}">
              <div class="mini-grid" style="grid-template-columns: repeat(2, 1fr);">
                ${statMetric("Local Training Points", fmt(state.tp))}
                ${statMetric("Academy Funding", fmt(academyFundingValue()))}
                ${statMetric("TP / sec", fmt(calculateIncome()))}
                ${statMetric("Per drill", `+${fmt(clickReward())}`)}
                ${statMetric("Campus Strategy", campusStrategy(campus).short)}
                ${statMetric("Reputation", `${state.reputation} (${reputationLabel()})`)}
                ${statMetric("Trophies", state.trophies)}
                ${statMetric("Medals", medalsEarned())}
                ${statMetric("Offline Cap", formatDuration(operations.capMs))}
                ${statMetric("Offline Accumulated", formatDuration(offlineAccumulatedMs()))}
                ${statMetric("Coaches", `${coachSlotsUsed()} / ${coachSlotsCap()}`)}
                ${statMetric("Athletes", `${athletesUsed()} / ${athleteCap()}`)}
              </div>
            </div>
          </section>
        `;
      }

      function renderCountryProgressCard(mode = "full") {
        const country = currentCountry();
        const progress = countryProgressSummary(country);
        const next = nextCountry();
        const reward = country.chapterReward || {};
        return `
          <section>
            <div class="section-title">
              <h2>${mode === "compact" ? "Country Progress" : "Current Country"}</h2>
              <span class="badge ${progress.rewardClaimed ? "good" : progress.readyToClaim ? "hot" : ""}">${progress.rewardClaimed ? "Complete" : progress.readyToClaim ? "Claim" : `${progress.percent}%`}</span>
            </div>
            <div class="card country-progress-card" style="--accent: ${country.accent || sportAccent(country.sportIds[0])}">
              <div class="card-head">
                <div>
                  <h3>${country.name} Chapter</h3>
                  <div class="role">${progress.rewardClaimed ? "Chapter reward claimed." : progress.readyToClaim ? "All goals complete. Claim the chapter reward to unlock the next tour." : `${progress.completed} of ${progress.total} country goals complete.`}</div>
                </div>
                <div class="level-token"><span>Goals</span><strong>${progress.completed}/${progress.total}</strong></div>
              </div>
              <div class="chapter-progress" aria-hidden="true"><div class="chapter-fill" style="width:${progress.percent}%"></div></div>
              <div class="goal-list">${progress.goals.map(renderGoalRow).join("")}</div>
              <div class="result-box">${progress.rewardClaimed ? `${country.name} complete. ${next ? nextDestinationCopy(next) : "Final country path pending."}` : `Chapter reward: ${reward.label || countryRewardLabel(country)}. ${next ? nextDestinationCopy(next) : "Final country path pending."}`}</div>
              ${progress.readyToClaim ? `<div class="button-row" style="grid-template-columns: 1fr;"><button class="primary-btn" data-action="claim-country-reward" data-id="${country.id}">${chapterRewardActionLabel(country)}</button></div>` : ""}
              <div class="boost-strip">${country.sportIds.map(id => `<span class="pill">${sportLabel(id)}</span>`).join("")}</div>
            </div>
          </section>
        `;
      }

      function renderGoalRow(goal) {
        return `
          <div class="goal-row ${goal.complete ? "done" : ""}">
            <div class="goal-check">${goal.complete ? "OK" : ""}</div>
            <div>
              <div class="goal-title">${goal.label}</div>
              <div class="goal-meta">${goal.currentLabel} / ${goal.targetLabel}</div>
            </div>
            <span class="badge">${goal.percent}%</span>
          </div>
        `;
      }

      function renderClickUpgradeCard(upgrade) {
        const level = state.clickUpgrades[upgrade.id].level;
        const unlocked = clickUpgradeUnlocked(upgrade);
        const maxed = level >= upgrade.maxLevel;
        const cost = clickUpgradeCost(upgrade.id);
        const canBuy = unlocked && !maxed && state.tp >= cost;
        const progress = clamp(level / upgrade.maxLevel * 100, 0, 100);
        return `
          <article class="card" style="--accent: ${upgrade.accent}">
            <div class="card-head">
              <div>
                <h3>${upgrade.name}</h3>
                <div class="role">${unlocked ? upgrade.cue : `Unlock: ${clickUpgradeRequirementLabel(upgrade)}`}</div>
              </div>
              <div class="level-token"><span>Level</span><strong>${level}/${upgrade.maxLevel}</strong></div>
            </div>
            <div class="metric-row">
              <div class="metric"><b>+${fmt(upgrade.powerPerLevel)} base</b><span>Per level</span></div>
              <div class="metric"><b>+${upgrade.passiveSecondsPerLevel.toFixed(3)}s</b><span>Passive sync</span></div>
              <div class="metric"><b>${maxed ? "Max" : fmt(cost) + " TP"}</b><span>Next cost</span></div>
              <div class="metric"><b>${unlocked ? "Ready" : "Locked"}</b><span>Status</span></div>
            </div>
            <div class="progress" aria-hidden="true"><div class="progress-fill" style="width:${progress}%; animation:none; background:${upgrade.accent}; transform:none;"></div></div>
            <div class="button-row" style="grid-template-columns: 1fr;">
              <button class="primary-btn" data-action="buy-click-upgrade" data-id="${upgrade.id}" ${canBuy ? "" : "disabled"}>${maxed ? "Program Maxed" : unlocked ? "Upgrade Drill" : "Locked"}</button>
            </div>
          </article>
        `;
      }

      function renderFacilityCard(facility) {
        const level = state.facilities[facility.id].level;
        const nextCost = facilityCost(facility.id, 1);
        const income = calculateFacilityIncome(facility.id);
        const barSpeed = Math.max(0.7, Math.min(14, 9 / Math.max(0.16, facility.baseIncome * Math.sqrt(Math.max(1, level)))));
        const slots = facilityCoachSlots(facility.id);
        const cap = facilityAthleteCap(facility.id);
        const nextRank = nextRankCue(level);
        const maxQty = maxAffordableFacility(facility.id);
        const coaches = facilityCoachLinks(facility);
        const athletes = facilityAthleteLinks(facility);
        const stage = visualStageFromLevel(level);
        return `
          <article class="card facility-card facility-stage-${stage} ${guideClass("facility", facility.id)}" style="--accent: ${facility.accent}; --bar-speed: ${barSpeed.toFixed(2)}s">
            <div class="card-head">
              <div class="facility-banner">
                <div class="sport-mark" aria-hidden="true">${academyIcon(facility.sportId)}</div>
                <div>
                  <h3>${facility.name}</h3>
                  <div class="role">${sportLabel(facility.sportId)} - ${rankTitle(level)} ${nextRank ? `<span class="muted">- ${nextRank}</span>` : ""}</div>
                </div>
              </div>
              <div class="level-token"><span>Level</span><strong>${level}</strong></div>
            </div>
            ${renderFacilityDepartmentVisual(facility, level, income, stage)}
            <div class="metric-row">
              <div class="metric"><b>${fmt(nextCost)} TP</b><span>Next cost</span></div>
              <div class="metric"><b>${fmt(income)} / sec</b><span>Output</span></div>
              <div class="metric"><b>${slots}</b><span>Coach slots</span></div>
              <div class="metric"><b>${cap}</b><span>Athlete cap</span></div>
            </div>
            <div class="progress" aria-hidden="true"><div class="progress-fill"></div></div>
            <div class="boost-strip">
              <span class="pill">Coaches ${coaches.active}/${coaches.total}</span>
              <span class="pill">Athletes ${athletes.active}</span>
              <span class="pill">Efficiency +${Math.floor(level / 10) * 5}%</span>
            </div>
            <p class="fine-print">${facility.identity}</p>
            <div class="button-row">
              <button class="buy-btn" data-action="buy-facility" data-id="${facility.id}" data-qty="1" ${state.tp >= nextCost ? "" : "disabled"}>Buy 1</button>
              <button class="buy-btn" data-action="buy-facility" data-id="${facility.id}" data-qty="10" ${state.tp >= facilityCost(facility.id, 10) ? "" : "disabled"}>Buy 10</button>
              <button class="buy-btn" data-action="buy-facility" data-id="${facility.id}" data-qty="max" ${maxQty > 0 ? "" : "disabled"}>Buy Max</button>
            </div>
          </article>
        `;
      }

      function renderFacilityDepartmentVisual(facility, level, income, stage) {
        const status = level <= 0 ? "Idle" : income > 0 ? "Training Active" : "Ready";
        return `
          <div class="facility-department department-${facility.sportId}" aria-label="${facility.short} department visual stage ${stage}">
            <div class="department-building" aria-hidden="true">
              <span class="department-svg-slot" data-facility="${facility.id}">${departmentIllustration(facility)}</span>
              <span class="department-wing left"></span>
              <span class="department-wing right"></span>
              <span class="department-roof"></span>
              <span class="department-body"></span>
              <span class="department-door"></span>
            </div>
            <div>
              <div class="department-status">
                <span class="badge">${sportLabel(facility.sportId, "short")} Dept</span>
                <span class="badge ${level > 0 ? "good" : ""}">${status}</span>
                <span class="badge">Stage ${stage}</span>
              </div>
              <div class="role">${rankTitle(level)} - ${fmt(income)} TP/sec department output.</div>
            </div>
          </div>
        `;
      }

      function renderStaffTab() {
        return `
          ${renderOfficeScene()}
          <section>
            <div class="section-title">
              <h2>Coaches</h2>
              <span class="badge">${coachSlotsUsed()} / ${coachSlotsCap()} slots</span>
            </div>
            <p class="section-subtitle">Facilities unlock coach slots. Recruited coaches can be upgraded without taking more slots.</p>
            ${coachSlotsCap() === 0 ? `<div class="lock-card">Buy and level facilities to unlock your first coach slot. Track level 5 is the quickest route.</div>` : ""}
            <div class="stack">${CONTENT.coaches.map(renderCoachCard).join("")}</div>
          </section>
          <section>
            <div class="section-title">
              <h2>Athletes</h2>
              <span class="badge">${athletesUsed()} / ${athleteCap()} capacity</span>
            </div>
            <p class="section-subtitle">Recruit athletes, assign them to facilities, and let their skill grow through training time.</p>
            ${athleteCap() === 0 ? `<div class="lock-card">Buy any facility to create athlete capacity. Athletes can still be reviewed here before recruiting.</div>` : ""}
            <div class="stack">${activeAthletes().map(renderAthleteCard).join("")}</div>
          </section>
        `;
      }

      function renderCoachCard(coach) {
        const level = state.coaches[coach.id].level;
        const cost = coachCost(coach.id);
        const isNew = level === 0;
        const noSlot = isNew && coachSlotsUsed() >= coachSlotsCap();
        const maxed = level >= coach.maxLevel;
        const canBuy = !maxed && !noSlot && state.tp >= cost;
        const tier = coachTier(level);
        const nextTier = nextCoachTier(level);
        const tierPct = coachTierProgress(level);
        const accent = coach.sportIds && coach.sportIds.length ? sportAccent(coach.sportIds[0]) : "#4ade80";
        const sportPath = coach.sportIds.map(id => sportLabel(id, "short")).join(" / ");
        return `
          <article class="card staff-card coach-card ${guideClass("coach", coach.id)}" style="--accent: ${accent}">
            <div class="card-head">
              <div class="staff-heading">
                <div class="profile-orb coach-portrait" aria-hidden="true">${coachPortraitIllustration()}</div>
                <div>
                  <h3>${coach.name}</h3>
                  <div class="role">${coach.specialty} - ${coach.path}</div>
                </div>
              </div>
              <div class="level-token"><span>Tier</span><strong>${tier.name}</strong></div>
            </div>
            <div class="metric-row">
              <div class="metric"><b>${maxed ? "Max" : fmt(cost) + " TP"}</b><span>${isNew ? "Recruit cost" : "Upgrade cost"}</span></div>
              <div class="metric"><b>${level ? coach.summary(level) : coach.summary(1)}</b><span>${level ? "Current bonus" : "First tier"}</span></div>
              <div class="metric"><b>${nextTier ? `L${nextTier.min}` : "Max"}</b><span>Next tier</span></div>
              <div class="metric"><b>${sportPath}</b><span>Specialty</span></div>
            </div>
            <div class="coach-tier-row">
              <div class="coach-tier-meta">
                <span>${tier.label} - Level ${level}/${coach.maxLevel}</span>
                <span>${nextTier ? `${Math.ceil(tierPct)}% to ${nextTier.name}` : "Tier path complete"}</span>
              </div>
              <div class="progress" aria-hidden="true"><div class="progress-fill" style="width:${tierPct}%; animation:none; background:${accent}; transform:none;"></div></div>
            </div>
            <div class="boost-strip">
              <span class="pill">${coach.path}</span>
              <span class="pill">${level ? coach.summary(level) : "Recruit to activate"}</span>
            </div>
            <div class="button-row" style="grid-template-columns: 1fr;">
              <button class="primary-btn" data-action="recruit-coach" data-id="${coach.id}" ${canBuy ? "" : "disabled"}>${maxed ? "Max Tier" : isNew ? "Recruit Coach" : "Upgrade Coach"}</button>
            </div>
            ${noSlot ? `<p class="fine-print">No open coach slot. Upgrade facilities to expand staff capacity.</p>` : ""}
          </article>
        `;
      }

      function renderAthleteCard(athlete) {
        const rec = state.athletes[athlete.id];
        const xpPct = clamp(rec.xp / xpNeeded(rec.skill) * 100, 0, 100);
        const canRecruit = !rec.recruited && athletesUsed() < athleteCap() && state.tp >= athlete.baseCost;
        const canTrain = rec.recruited && rec.skill < athlete.potential && state.tp >= athleteTrainCost(athlete.id);
        return `
          <article class="card staff-card athlete-card ${guideClass("athlete", athlete.id)}" style="--accent: ${sportAccent(athlete.sportId)}">
            <div class="card-head">
              <div class="staff-heading">
                <div class="profile-orb" aria-hidden="true">${academyIcon(athlete.sportId)}</div>
                <div>
                  <h3>${athlete.name}</h3>
                  <div class="role">${sportLabel(athlete.sportId)} - ${athlete.rarity} - ${athlete.bonus(rec.skill)}</div>
                </div>
              </div>
              <div class="level-token"><span>Skill</span><strong>${rec.recruited ? rec.skill : "-"}</strong></div>
            </div>
            <div class="metric-row">
              <div class="metric"><b>${rec.recruited ? assignmentLabel(rec.assigned) : fmt(athlete.baseCost) + " TP"}</b><span>${rec.recruited ? "Assignment" : "Recruit cost"}</span></div>
              <div class="metric"><b>${rec.recruited ? `${fmt(rec.xp)} / ${fmt(xpNeeded(rec.skill))}` : athlete.potential}</b><span>${rec.recruited ? "Experience" : "Potential"}</span></div>
            </div>
            ${rec.recruited ? `<div class="progress" aria-hidden="true"><div class="progress-fill" style="width:${xpPct}%; animation:none; background:${sportAccent(athlete.sportId)}; transform:none;"></div></div>` : ""}
            <div class="button-row" style="grid-template-columns: ${rec.recruited ? "1fr 1fr" : "1fr"};">
              ${rec.recruited ? `<button class="small-btn" data-action="train-athlete" data-id="${athlete.id}" ${canTrain ? "" : "disabled"}>Train +1 (${fmt(athleteTrainCost(athlete.id))})</button>` : `<button class="primary-btn" data-action="recruit-athlete" data-id="${athlete.id}" ${canRecruit ? "" : "disabled"}>Recruit Athlete</button>`}
              ${rec.recruited ? `<span class="pill ${assignedSportId(rec.assigned) === athlete.sportId ? "good" : ""}">${assignedSportId(rec.assigned) === athlete.sportId ? "Preferred fit" : "Flexible role"}</span>` : ""}
            </div>
            ${rec.recruited ? `<div class="assignment-row">${activeFacilities().map(f => `<button class="small-btn ${rec.assigned === f.id ? "active" : ""}" data-action="assign-athlete" data-id="${athlete.id}" data-facility="${f.id}" ${state.facilities[f.id].level > 0 ? "" : "disabled"}>${sportLabel(f.sportId, "short")}</button>`).join("")}</div>` : ""}
          </article>
        `;
      }

      function renderFirstCompetitionGuide() {
        if (state.stats.competitionsEntered > 0) return "";
        const comp = state.activeCompetition ? getCompetition(state.activeCompetition.id) : null;
        const chance = comp ? clamp(0.35 + (competitionPower() - comp.targetPower) / comp.targetPower * 0.28, 0.18, 0.95) : 0;
        return `
          <section>
            <div class="section-title">
              <h2>First Meet Briefing</h2>
              <span class="badge">Coach note</span>
            </div>
            <div class="card orientation-card event-ticket" style="--accent:var(--gold)">
              <div class="card-head">
                <div>
                  <h3>${comp ? `${comp.name} is open.` : "Competitions are optional chances to test the academy."}</h3>
                  <div class="role">${comp ? `Your current win chance is ${Math.round(chance * 100)}%. Entering still awards TP if you miss the win.` : "Upgrade facilities, recruit staff, and watch for an offer. Early meets teach the team and can still pay out even before you are favored."}</div>
                </div>
                <div class="level-token"><span>Risk</span><strong>Low</strong></div>
              </div>
              <div class="boost-strip">
                <span class="pill">Wins advance chapter goals</span>
                <span class="pill">Entries award TP</span>

      function exportSave() {
        saveState();
        saveBoxDraft = JSON.stringify(state);
        const box = document.getElementById("saveBox");
        if (box) {
          box.value = saveBoxDraft;
          box.select();
        }
        toast("Save exported into the text box.");
      }

      function importSave() {
        const box = document.getElementById("saveBox");
        const draft = box ? box.value : saveBoxDraft;
        if (!draft.trim()) return;
        saveBoxDraft = draft;
        try {
          const imported = normalizeState(JSON.parse(draft.trim()));
          const validation = validateSave(imported);
          if (!validation.ok) {
            toast("That save data is missing required academy fields.");
            return;
          }
          logMigration(imported, "manual-import-validation", "Imported save passed architecture validation.", {
            warnings: validation.warnings.length
          });
          imported.migration.validation = validation;
          state = imported;
          state.lastTick = now();
          saveState();
          saveBoxDraft = JSON.stringify(state);
          if (box) box.value = saveBoxDraft;
          toast("Save imported.");
          renderSoon();
        } catch (err) {
          toast("That save data could not be imported.");
        }
      }

      function handleAction(event) {
        const target = event.target.closest("[data-action]");
        if (!target || target.disabled) return;
        const action = target.dataset.action;
        if (action === "drill") handleDrill(event, target);
        if (action === "tab") {
          state.ui.activeTab = target.dataset.tab;
          activeGuideTarget = null;
          if (state.ui.activeTab === "world") {
            markOnboardingFlag("worldTourViewed");
            saveState();
          }
          if (state.ui.activeTab === "events") {
            markOnboardingFlag("firstCompetitionBriefed");
            saveState();
          }
          renderSoon();
        }
        if (action === "navigate-guide") navigateGuide(target.dataset.tab, target.dataset.guideType || "", target.dataset.guideId || "");
        if (action === "toggle-world-summary") {
          worldHeaderExpanded = !worldHeaderExpanded;
          renderSoon();
        }
        if (action === "toggle-mission") {
          missionExpanded = !missionExpanded;
          if (missionExpanded) markOnboardingFlag("chapterReviewed");
          renderSoon();
        }
        if (action === "buy-facility") buyFacility(target.dataset.id, target.dataset.qty);
        if (action === "buy-click-upgrade") buyClickUpgrade(target.dataset.id);
        if (action === "recruit-coach") recruitCoach(target.dataset.id);
        if (action === "recruit-athlete") recruitAthlete(target.dataset.id);
        if (action === "train-athlete") trainAthlete(target.dataset.id);
        if (action === "assign-athlete") assignAthlete(target.dataset.id, target.dataset.facility);
        if (action === "set-campus-strategy") setCampusStrategy(target.dataset.id);
        if (action === "upgrade-operations-capacity") upgradeOperationsCapacity();
        if (action === "travel-campus") travelToCampus(target.dataset.id);
        if (action === "enter-competition") enterCompetition();
        if (action === "dismiss-competition-result") {
          setLastCompetitionResult(null);
          saveState();
          renderSoon();
        }
        if (action === "claim-country-reward") claimCountryReward(target.dataset.id);
        if (action === "open-prestige") {
          if (state.settings.confirmPrestige) openPrestigeConfirm();
          else prestigeReset();
        }
        if (action === "confirm-prestige") prestigeReset();
        if (action === "claim-event") claimEvent();
        if (action === "show-tutorial") showTutorial();
        if (action === "start-onboarding") startOnboarding();
        if (action === "skip-onboarding") skipOnboarding();
        if (action === "finish-onboarding") finishOnboarding();
        if (action === "confirm-onboarding-identity") confirmOnboardingIdentity();
        if (action === "review-chapter-goals") reviewChapterGoals();
        if (action === "open-world-tour") openWorldTour();
        if (action === "close-modal") closeModal();
        if (action === "toggle-setting") {
          const key = target.dataset.key;
          if (Object.prototype.hasOwnProperty.call(state.settings, key) && typeof state.settings[key] === "boolean") {
            state.settings[key] = !state.settings[key];
            saveState();
          }
          renderSoon();
        }
        if (action === "reset-save") resetSave();
        if (action === "confirm-reset") {
          localStorage.removeItem(STORAGE_KEY);
          saveBoxDraft = "";
          state = createDefaultState();
          closeModal();
          renderSoon();
          showTutorial();
        }
        if (action === "export-save") exportSave();
        if (action === "import-save") importSave();
        if (action === "save-academy-identity") saveAcademyIdentity();
      }

      function handleInput(event) {
        if (event.target && event.target.id === "saveBox") {
          saveBoxDraft = event.target.value;
        }
      }

      function tick() {
        const current = now();
        const elapsedMs = Math.max(0, current - state.lastTick);
        state.lastTick = current;
        if (elapsedMs > 0) {
          simulateTrainingTime(elapsedMs, {
            startTime: current - elapsedMs,
            endTime: current,
            includeEvent: true,
            includeMorale: true,
            progressAthletes: true,
            countPlayTime: true,
            source: "passive"
          });
        }
        clearExpiredEvent();
        expireCompetition();
        if (!state.activeEvent && state.eventBonusEnd <= current && current >= state.nextEventTime) spawnEvent();
        maybeSpawnCompetition();
        if (current - state.lastSave >= SAVE_INTERVAL_MS) saveState();
        checkAchievements();
        const countryChanged = checkCountryProgress();
        if (countryChanged || current - lastRender >= 500) render();
      }

      function renderSoon() {
        lastRender = 0;
        render();
      }

      function toast(message) {
        const root = document.getElementById("toastRoot");
        const item = document.createElement("div");
        item.className = "toast";
        item.textContent = message;
        root.appendChild(item);
        setTimeout(() => item.remove(), 3600);
      }

      function showFloating(text, x, y) {
        if (!state.settings.animations) return;
        const item = document.createElement("div");
        item.className = "float-tp";
        item.textContent = text;
        item.style.left = `${x}px`;
        item.style.top = `${y}px`;
        document.body.appendChild(item);
        setTimeout(() => item.remove(), 900);
      }

      function rankTitle(level) {
        if (level <= 0) return "Prospect Program";
        if (level <= 9) return "Club Athlete";
        if (level <= 24) return "State Qualifier";
        if (level <= 49) return "Olympic Hopeful";
        return "World Champion";
      }

      function nextRankCue(level) {
        if (level <= 0) return "Buy level 1 to open the program";
        if (level < 10) return `${10 - level} levels to State Qualifier`;
        if (level < 25) return `${25 - level} levels to Olympic Hopeful`;
        if (level < 50) return `${50 - level} levels to World Champion`;
        return "World Champion tier active";
      }

      function visualStageFromLevel(level) {
        if (level >= 25) return 3;
        if (level >= 10) return 2;
        if (level >= 1) return 1;
        return 0;
      }

      function visualStageFromStaff(count) {
        if (count >= 6) return 3;
        if (count >= 3) return 2;
        if (count >= 1) return 1;
        return 0;
      }

      function visualStageFromWins(wins) {
        if (wins >= 8) return 3;
        if (wins >= 3) return 2;
        if (wins >= 1) return 1;
        return 0;
      }

      function visualStageFromPercent(percent) {
        if (percent >= 100) return 3;
        if (percent >= 50) return 2;
        if (percent > 0) return 1;
        return 0;
      }

      function highestAthleteSkill() {
        return activeAthletes().reduce((highest, athlete) => {
          const record = state.athletes[athlete.id];
          return record && record.recruited ? Math.max(highest, record.skill) : highest;
        }, 0);
      }

      function facilityRank() {
        const high = Math.max(...activeFacilities().map(f => state.facilities[f.id].level));
        return rankTitle(high);
      }

      function highestFacilitySummary() {
        let best = null;
        CONTENT.facilities.forEach(facility => {
          const level = state.facilities[facility.id].level;
          if (!best || level > best.level) best = { facility, level };
        });
        return best && best.level > 0 ? `${best.facility.short} L${best.level}` : "None yet";
      }

      function favoriteSportLabel() {
        const best = CONTENT.facilities.reduce((winner, facility) => {
          const level = state.facilities[facility.id].level;
          return !winner || level > winner.level ? { sportId: facility.sportId, level } : winner;
        }, null);
        if (best && best.level > 0) return sportLabel(best.sportId, "short");
        return sportLabel(currentCountry().sportIds[0], "short");
      }

      function formatDate(timestamp) {
        const date = new Date(cleanNumber(timestamp, now()));
        if (Number.isNaN(date.getTime())) return "Today";
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
      }

      function coachSlotsCap() {
        return activeFacilities().reduce((sum, f) => sum + facilityCoachSlots(f.id), 0);
      }

      function coachSlotsUsed() {
        return CONTENT.coaches.reduce((sum, c) => sum + (state.coaches[c.id].level > 0 ? 1 : 0), 0);
      }

      function coachOpportunityAvailable() {
        return CONTENT.coaches.some(coach => {
          const level = state.coaches[coach.id].level;
          const isNew = level === 0;
          if (level >= coach.maxLevel) return false;
          if (isNew && coachSlotsUsed() >= coachSlotsCap()) return false;
          return state.tp >= coachCost(coach.id);
        });
      }

      function facilityCoachSlots(id) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        return Math.floor(level / facility.coachEvery);
      }

      function athleteCap() {
        return activeFacilities().reduce((sum, f) => sum + facilityAthleteCap(f.id), 0);
      }

      function athletesUsed() {
        return activeAthletes().reduce((sum, a) => sum + (state.athletes[a.id].recruited ? 1 : 0), 0);
      }

      function facilityAthleteCap(id) {
        const facility = getFacility(id);
        const level = state.facilities[id].level;
        if (level <= 0) return 0;
        return Math.max(1, Math.floor(level * facility.athleteRate));
      }

      function mapById(items) {
        return items.reduce((map, item) => {
          map[item.id] = item;
          return map;
        }, {});
      }

      function currentCountry() {
        return getCountry(state.currentCountryId) || CONTENT.countries[0];
      }

      function countryFlag(country) {
        return country && country.flag ? country.flag : country.short;
      }

      function worldDestinationById(id) {
        return getCountry(id) || FUTURE_DESTINATIONS.find(destination => destination.id === id) || null;
      }

      function countryEffectMultiplier(type, country = currentCountry()) {
        return (country.bonuses || [])
          .filter(effect => effect.type === type)
          .reduce((mult, effect) => mult * (1 + cleanNumber(effect.value, 0)), 1);
      }

      function countryBonusLabels(country = currentCountry()) {
        return (country.bonuses || []).map(effect => effect.label).filter(Boolean);
      }

      function isPlayableCountry(country) {
        return Boolean(country && country.playable !== false && countryChapterGoals(country).length > 0);
      }

      function nextPlayableCountry(country = currentCountry()) {
        const next = nextCountry(country);
        return isPlayableCountry(next) ? next : null;
      }

      function nextCountry(country = currentCountry()) {
        const nextId = (country.futureCountryIds || [])[0];
        if (nextId) return worldDestinationById(nextId);
        const route = worldRouteDestinations();
        const index = route.findIndex(item => item.id === country.id);
        return index >= 0 ? route[index + 1] || null : null;
      }

      function countryProgressSummary(country = currentCountry()) {
        const record = ensureCountryProgress(country.id);
        const goals = countryChapterGoals(country).map(goal => goalProgress(goal, country.id, record));
        const total = goals.length;
        const completed = goals.filter(goal => goal.complete).length;
        const percent = total ? Math.round(completed / total * 100) : 0;
        const isComplete = total > 0 && completed === total;
        return {
          country,
          goals,
          total,
          completed,
          percent,
          isComplete,
          rewardClaimed: Boolean(record.rewardClaimed),
          readyToClaim: isComplete && !record.rewardClaimed,
          completedAt: record.completedAt,
          chapterTPEarned: record.chapterTPEarned,
          competitionsWon: record.competitionsWon
        };
      }

      function countryChapterGoals(country = currentCountry()) {
        return country.chapterGoals || country.completionGoals || [];
      }

      function ensureCountryProgress(countryId) {
        if (!state.countryProgress) state.countryProgress = {};
        if (!state.countryProgress[countryId]) state.countryProgress[countryId] = createCountryProgressRecord();
        return state.countryProgress[countryId];
      }

      function goalProgress(goal, countryId, record = ensureCountryProgress(countryId)) {
        const target = Math.max(1, cleanNumber(goal.target, 1));
        const savedComplete = record.rewardClaimed || record.completedGoalIds.includes(goal.id);
        const current = savedComplete ? target : goalCurrentValue(goal, countryId, record);
        const percent = clamp(Math.round(current / target * 100), 0, 100);
        return {
          ...goal,
          current,
          target,
          percent,
          complete: savedComplete || current >= target,
          currentLabel: fmt(current),
          targetLabel: fmt(target)
        };
      }

      function goalCurrentValue(goal, countryId, record = ensureCountryProgress(countryId)) {
        if (goal.type === "chapterTPEarned") return record.chapterTPEarned;
        if (goal.type === "facilityLevel") return facilityLevelForCountry(goal.facilityId, countryId);
        if (goal.type === "seasonTPEarned") return record.chapterTPEarned;
        if (goal.type === "totalTPEarned") return state.totalTPEarned;
        if (goal.type === "competitionsWon") return record.competitionsWon;
        if (goal.type === "countryCompetitionsWon") return record.competitionsWon;
        if (goal.type === "highestFacilityLevel") return highestFacilityLevelForCountry(countryId);
        if (goal.type === "highestAthleteSkill") return highestAthleteSkillForCountry(countryId);
        return 0;
      }

      function checkCountryProgress(options = {}) {
        let changed = false;
        state.unlockedCountryIds.forEach(countryId => {
          changed = refreshCountryProgress(countryId) || changed;
        });
        refreshUnlockedCountries();
        const summary = countryProgressSummary();
        if (changed) saveState();
        if (options.showModal !== false && summary.readyToClaim) showCountryCompleteModal(currentCountry(), summary);
        return changed;
      }

      function refreshCountryProgress(countryId) {
        const country = getCountry(countryId);
        if (!country) return false;
        const record = ensureCountryProgress(countryId);
        let changed = false;
        countryChapterGoals(country).forEach(goal => {
          if (record.completedGoalIds.includes(goal.id)) return;
          const current = goalCurrentValue(goal, countryId, record);
          const target = Math.max(1, cleanNumber(goal.target, 1));
          if (current >= target) {
            record.completedGoalIds.push(goal.id);
            changed = true;
          }
        });
        const total = countryChapterGoals(country).length;
        if (total > 0 && record.completedGoalIds.length >= total && !record.completedAt) {
          record.completedAt = now();
          changed = true;
        }
        return changed;
      }

      function refreshUnlockedCountries() {
        refreshUnlockedCountriesForState(state);
      }

      function showCountryCompleteModal(country, summary) {
        const root = document.getElementById("modalRoot");
        if (activeChapterModalCountryId === country.id || (root && root.className.includes("active"))) return;
        activeChapterModalCountryId = country.id;
        const reward = country.chapterReward || {};
        const next = nextCountry(country);
        showModal(
          country.completionTitle || `${country.name} Complete`,
          `<div class="result-box">
             <b>${countryFlag(country)} ${country.completionMessage || `${country.name} chapter complete.`}</b><br>
             ${summary.completed} of ${summary.total} goals completed.
           </div>
           <div class="metric-row">
             <div class="metric"><b>+${reward.medals || 0}</b><span>Medal earned</span></div>
             <div class="metric"><b>+${reward.reputation || 0}</b><span>Reputation earned</span></div>
             <div class="metric"><b>+${fmt(reward.academyFunding || 0)}</b><span>Academy Funding</span></div>
             <div class="metric"><b>${next ? `${countryFlag(next)} ${next.name}` : "Final"}</b><span>${next ? "Next destination" : "Tour status"}</span></div>
           </div>`,
          [
            { label: chapterRewardActionLabel(country), action: "claim-country-reward", kind: "primary" }
          ]
        );
      }

      function claimCountryReward(countryId = activeChapterModalCountryId || state.currentCountryId) {
        const country = getCountry(countryId);
        if (!country) return;
        refreshCountryProgress(country.id);
        const summary = countryProgressSummary(country);
        const record = ensureCountryProgress(country.id);
        if (!summary.isComplete || record.rewardClaimed) return;
        const reward = country.chapterReward || {};
        record.rewardClaimed = true;
        record.completedAt = record.completedAt || now();
        record.rewardClaimedAt = now();
        state.medals += Math.max(0, Math.floor(cleanNumber(reward.medals, 0)));
        state.reputation += Math.max(0, Math.floor(cleanNumber(reward.reputation, 0)));
        grantAcademyFunding(reward.academyFunding || 0, "chapter-reward");
        if (!state.completedCountryIds.includes(country.id)) state.completedCountryIds.push(country.id);
        (reward.unlockCountryIds || country.futureCountryIds || []).forEach(nextId => {
          if (getCountry(nextId) && !state.unlockedCountryIds.includes(nextId)) {
            initializeFreshCampusForUnlock(nextId, state);
            state.unlockedCountryIds.push(nextId);
          }
        });
        refreshUnlockedCountries();
        const next = nextPlayableCountry(country);
        if (next && state.unlockedCountryIds.includes(next.id)) {
          switchActiveCampus(next.id);
        }
        state.ui.activeTab = "world";
        activeChapterModalCountryId = "";
        closeModal();
        saveState();
        toast(`${country.name} complete: ${countryRewardLabel(country)}.`);
        renderSoon();
      }

      function medalsEarned() {
        return state.medals;
      }

      function reputationLabel() {
        return academyRankByReputation();
      }

      function countryRewardLabel(country) {
        const reward = country.chapterReward || {};
        const parts = [];
        if (reward.medals) parts.push(`+${reward.medals} ${reward.medals === 1 ? "Medal" : "Medals"}`);
        if (reward.reputation) parts.push(`+${reward.reputation} Reputation`);
        if (reward.academyFunding) parts.push(`+${fmt(reward.academyFunding)} Academy Funding`);
        (reward.unlockCountryIds || []).forEach(id => {
          const unlocked = getCountry(id);
          if (unlocked) parts.push(`Unlock ${unlocked.name}`);
        });
        return parts.length ? parts.join(", ") : "Future chapter reward";
      }

      function chapterRewardActionLabel(country) {
        const playableNext = nextPlayableCountry(country);
        if (playableNext && state.unlockedCountryIds.includes(playableNext.id)) return `Continue to ${playableNext.name}`;
        const reward = country.chapterReward || {};
        const unlockId = (reward.unlockCountryIds || []).find(id => getCountry(id));
        if (unlockId) return `Unlock ${getCountry(unlockId).name}`;
        return "Claim Chapter Reward";
      }

      function nextDestinationCopy(destination) {
        if (!destination) return "Next destination pending.";
        const playableCountry = getCountry(destination.id);
        if (playableCountry && state.unlockedCountryIds.includes(playableCountry.id)) {
          return `${countryFlag(playableCountry)} ${playableCountry.name} is unlocked.`;
        }
        return `Next route destination: ${countryFlag(destination)} ${destination.name}.`;
      }

      function unlockRequirementLabel(country) {
        const requirements = country.unlockRequirements || [];
        if (!requirements.length) return "Available";
        return requirements.map(requirement => {
          if (requirement.type === "countryCompleted") {
            const required = getCountry(requirement.countryId);
            return required ? `Complete ${required.name}` : "Complete prior country";
          }
          if (requirement.type === "countryUnlocked") {
            const required = getCountry(requirement.countryId);
            return required ? `Unlock ${required.name}` : "Unlock prior country";
          }
          return "Future unlock path";
        }).join(", ");
      }

      function activeSports() {
        return currentCountry().sportIds.map(getSport).filter(Boolean);
      }

      function activeFacilities() {
        const sportIds = new Set(activeSports().map(sport => sport.id));
        return CONTENT.facilities.filter(facility => sportIds.has(facility.sportId));
      }

      function activeAthletes() {
        const sportIds = new Set(activeSports().map(sport => sport.id));
        return CONTENT.athletes.filter(athlete => sportIds.has(athlete.sportId));
      }

      function competitionAvailableForCountry(comp, countryId = state.currentCountryId) {
        if (!comp) return false;
        if (Array.isArray(comp.countryIds) && comp.countryIds.length) return comp.countryIds.includes(countryId);
        const country = getCountry(countryId);
        if (!country || !Array.isArray(country.sportIds)) return true;
        return (comp.sportIds || []).some(id => country.sportIds.includes(id));
      }

      function activeCompetitions() {
        return CONTENT.competitions.filter(comp => competitionAvailableForCountry(comp));
      }

      function facilitiesForSport(sportId) {
        return CONTENT.facilities.filter(facility => facility.sportId === sportId);
      }

      function assignedSportId(facilityId) {
        const facility = getFacility(facilityId);
        return facility ? facility.sportId : "";
      }

      function sportLabel(id, key = "name") {
        const sport = getSport(id);
        return sport ? sport[key] : "Unassigned";
      }

      function sportAccent(id) {
        const sport = getSport(id);
        return sport ? sport.accent : "var(--teal)";
      }

      function sportMark(id) {
        const sport = getSport(id);
        return sport ? sport.mark : "SPT";
      }

      function facilityCoachLinks(facility) {
        const linked = CONTENT.coaches.filter(coach => coach.sportIds.includes(facility.sportId));
        const active = linked.filter(coach => state.coaches[coach.id].level > 0);
        return { total: linked.length, active: active.length };
      }

      function facilityAthleteLinks(facility) {
        const active = CONTENT.athletes.filter(athlete => {
          const record = state.athletes[athlete.id];
          return record.recruited && assignedSportId(record.assigned) === facility.sportId;
        });
        return { active: active.length };
      }

      function facilityMilestoneCount(facility, effect) {
        const level = state.facilities[facility.id].level;
        return Math.floor(level / (effect.every || 10));
      }

      function facilityMilestoneMultiplier(type) {
        let mult = 1;
        activeFacilities().forEach(facility => {
          (facility.milestoneEffects || [])
            .filter(effect => effect.type === type)
            .forEach(effect => {
              mult *= 1 + facilityMilestoneCount(facility, effect) * effect.perMilestone;
            });
        });
        return mult;
      }

      function athleteEffectMultiplier(type) {
        let mult = 1;
        CONTENT.athletes.forEach(athlete => {
          const record = state.athletes[athlete.id];
          if (!record.recruited) return;
          athlete.effects
            .filter(effect => effect.type === type)
            .forEach(effect => {
              if (!athleteEffectApplies(athlete, record, effect)) return;
              mult *= 1 + record.skill * effect.perSkill;
            });
        });
        return mult;
      }

      function athleteEffectApplies(athlete, record, effect) {
        if (effect.sportId && effect.sportId !== athlete.sportId) return false;
        if (effect.requiresAssignedSport && assignedSportId(record.assigned) !== athlete.sportId) return false;
        return true;
      }

      function athletePowerForSport(sportId) {
        return CONTENT.athletes.reduce((sum, athlete) => {
          const record = state.athletes[athlete.id];
          if (!record.recruited) return sum;
          const assignedSport = assignedSportId(record.assigned);
          if (assignedSport === sportId) return sum + record.skill * 5;
          if (athlete.sportId === sportId) return sum + record.skill * 2.5;
          return sum;
        }, 0);
      }

      function getFacility(id) {
        return BY_ID.facility[id];
      }

      function getBuilding(id) {
        return BY_ID.building[id];
      }

      function getClickUpgrade(id) {
        return BY_ID.clickUpgrade[id];
      }

      function getCountry(id) {
        return BY_ID.country[id];
      }

      function getSport(id) {
        return BY_ID.sport[id];
      }

      function getCoach(id) {
        return BY_ID.coach[id];
      }

      function getAthlete(id) {
        return BY_ID.athlete[id];
      }

      function getCompetition(id) {
        return BY_ID.competition[id];
      }

      function getCampusStrategy(id) {
        return BY_ID.campusStrategy[id];
      }

      function getCompetitionCircuit(id) {
        return BY_ID.competitionCircuit[id];
      }

      function getHeadquartersDepartment(id) {
        return BY_ID.headquarters[id];
      }

      function competitionTypeLabel(comp) {
        const sportIds = comp && Array.isArray(comp.sportIds) ? comp.sportIds : [];
        if (sportIds.length === 0) return "Open Meet";
        if (sportIds.length === 1) return `${sportLabel(sportIds[0], "short")} Meet`;
        if (sportIds.length === 2) return `${sportIds.map(id => sportLabel(id, "short")).join(" / ")} Dual Meet`;
        return "Multi-Sport Meet";
      }

      function assignmentLabel(id) {
        const facility = getFacility(id);
        return facility ? sportLabel(facility.sportId, "short") : "Unassigned";
      }

      function randomBetween(min, max) {
        return Math.floor(min + Math.random() * (max - min + 1));
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function fmt(value) {
        const n = cleanNumber(value, 0);
        const abs = Math.abs(n);
        if (abs < 1000) return n % 1 === 0 ? String(Math.floor(n)) : n.toFixed(abs < 100 ? 1 : 0);
        const units = [
          [1e12, "T"],
          [1e9, "B"],
          [1e6, "M"],
          [1e3, "K"]
        ];
        for (const [size, suffix] of units) {
          if (abs >= size) return `${(n / size).toFixed(abs >= size * 100 ? 0 : 1)}${suffix}`;
        }
        return String(Math.floor(n));
      }

      function fmtMult(value) {
        return `${cleanNumber(value, 1).toFixed(2)}x`;
      }

      function formatDuration(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        if (h > 0) return `${h}h ${m}m`;
        if (m > 0) return `${m}m ${s}s`;
        return `${s}s`;
      }

      await initializeContentDataRegistry();
      loadState();
      applyOfflineProgress();
      checkCountryProgress({ showModal: false });
      render();
      document.addEventListener("click", handleAction);
      document.addEventListener("input", handleInput);
      window.addEventListener("beforeunload", saveState);
      if (offlineReport) {
        showOfflineModal();
      } else if (!state.tutorialSeen) {
        showTutorial();
      }
      saveState();
      setInterval(tick, 250);
    })();
  </script>
</body>
</html>
