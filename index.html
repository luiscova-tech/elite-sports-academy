<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Elite Sports Academy</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #070a12;
      --panel: #101625;
      --panel-2: #151d2f;
      --panel-3: #1b263a;
      --text: #f4f7fb;
      --muted: #9ca9bc;
      --soft: #c8d1df;
      --line: rgba(255, 255, 255, 0.1);
      --gold: #f7c948;
      --green: #4ade80;
      --red: #fb7185;
      --blue: #60a5fa;
      --teal: #2dd4bf;
      --academy-accent: #60a5fa;
      --academy-accent-2: #2dd4bf;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
      --radius: 8px;
      --space: 14px;
      --tap: 46px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: radial-gradient(circle at top, #152032 0, var(--bg) 42%, #04060b 100%);
      color: var(--text);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text);
      background: var(--panel-3);
      transition: transform 140ms ease, filter 140ms ease, background 140ms ease, opacity 140ms ease;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .shell {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 12px 12px 102px;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0 10px;
      background: linear-gradient(180deg, rgba(7, 10, 18, 0.98), rgba(7, 10, 18, 0.86) 76%, rgba(7, 10, 18, 0));
      backdrop-filter: blur(14px);
    }

    .academy-header,
    .resource-bar,
    .stat-grid,
    .tabs,
    .button-row,
    .split-row,
    .metric-row,
    .mini-grid {
      display: grid;
      gap: 8px;
    }

    .academy-header {
      grid-template-columns: auto 1fr;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 28%, var(--line));
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 10% 0, color-mix(in srgb, var(--academy-accent) 22%, transparent), transparent 64px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018)),
        rgba(10, 15, 26, 0.92);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .academy-header-copy {
      min-width: 0;
    }

    .academy-kicker {
      color: color-mix(in srgb, var(--academy-accent) 68%, white);
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.07em;
      line-height: 1;
      text-transform: uppercase;
    }

    .academy-name-line {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      margin-top: 3px;
    }

    .academy-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 950;
      line-height: 1.08;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .academy-motto {
      margin-top: 4px;
      overflow: hidden;
      color: var(--soft);
      font-size: 0.72rem;
      font-weight: 720;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .academy-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .academy-rank-pill {
      color: #071018;
      background: linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 72%, white), color-mix(in srgb, var(--academy-accent-2) 62%, white));
      border-color: transparent;
    }

    .academy-crest {
      position: relative;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 42%, rgba(255, 255, 255, 0.16));
      border-radius: 12px 12px 16px 16px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 34%, transparent), color-mix(in srgb, var(--academy-accent-2) 20%, transparent)),
        rgba(255, 255, 255, 0.06);
      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.055),
        0 0 0 4px color-mix(in srgb, var(--academy-accent) 12%, transparent);
    }

    .academy-crest::before {
      content: "";
      position: absolute;
      inset: 7px 10px 14px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--academy-accent) 54%, white);
      opacity: 0.72;
    }

    .academy-crest::after {
      content: "";
      position: absolute;
      inset: auto 13px 7px;
      height: 11px;
      border-radius: 0 0 12px 12px;
      background: color-mix(in srgb, var(--academy-accent) 58%, white 8%);
      opacity: 0.7;
    }

    .academy-crest span {
      position: relative;
      z-index: 1;
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.38);
    }

    .crest-star {
      clip-path: polygon(50% 0, 62% 28%, 94% 28%, 68% 48%, 79% 82%, 50% 62%, 21% 82%, 32% 48%, 6% 28%, 38% 28%);
      border-radius: 0;
    }

    .crest-laurel {
      border-radius: 999px;
    }

    .crest-torch {
      border-radius: 14px 14px 6px 6px;
    }

    .crest-wave {
      border-radius: 12px 12px 999px 999px;
    }

    .resource-bar {
      position: relative;
      grid-template-columns: minmax(0, 1fr) repeat(2, auto);
      align-items: center;
      gap: 7px;
      overflow: hidden;
      margin-bottom: 8px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(11, 16, 28, 0.94);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    .resource-bar::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 42px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 30%, transparent);
      opacity: 0.25;
      pointer-events: none;
    }

    .resource-bar > * {
      position: relative;
      z-index: 1;
    }

    .resource-country {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 7px;
    }

    .resource-flag {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 1rem;
      line-height: 1;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      transform-origin: 50% 70%;
      animation: flagWave 4200ms ease-in-out infinite;
    }

    .resource-country-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .resource-stat {
      min-width: 56px;
      padding: 4px 6px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .resource-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.54rem;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .resource-stat strong {
      display: block;
      margin-top: 2px;
      color: var(--soft);
      font-size: 0.78rem;
      font-weight: 950;
      line-height: 1;
    }

    .world-hero {
      position: relative;
      grid-column: 1 / -1;
      display: grid;
      gap: 8px;
      overflow: hidden;
      margin-bottom: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(96, 165, 250, 0.18), rgba(45, 212, 191, 0.08)),
        rgba(16, 22, 37, 0.92);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .world-hero::before {
      content: "";
      position: absolute;
      inset: -30px -60px auto auto;
      width: 130px;
      height: 84px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 24%, transparent);
      filter: blur(16px);
      opacity: 0.56;
      pointer-events: none;
    }

    .world-hero > * {
      position: relative;
      z-index: 1;
    }

    .world-summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 46px;
      padding: 0;
      text-align: left;
      background: transparent;
      border: 0;
    }

    .world-summary:active {
      transform: none;
    }

    .world-summary-copy {
      min-width: 0;
    }

    .world-details {
      display: grid;
      gap: 7px;
      padding-top: 2px;
    }

    .world-actions {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 7px;
      align-items: center;
    }

    .world-kicker {
      color: var(--teal);
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .world-title {
      margin-top: 2px;
      font-size: 1.03rem;
      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .world-subtitle {
      margin-top: 3px;
      color: var(--soft);
      font-size: 0.74rem;
      line-height: 1.25;
    }

    .country-token {
      display: grid;
      place-items: center;
      min-width: 44px;
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 950;
    }

    .passport-stamp {
      border-radius: 8px 999px 999px 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 22%, transparent), rgba(255, 255, 255, 0.08));
      transform: rotate(-2deg);
    }

    .chapter-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .chapter-copy {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 750;
    }

    .chapter-progress {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .chapter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--academy-accent), var(--gold), var(--academy-accent-2));
      background-size: 180% 100%;
      transition: width 260ms ease;
      animation: missionProgressFlow 4200ms linear infinite;
    }

    .season-badge,
    .badge,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--soft);
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .season-badge {
      color: var(--gold);
      background: rgba(247, 201, 72, 0.11);
      border-color: rgba(247, 201, 72, 0.28);
    }

    .stat-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .tabs {
      position: fixed;
      left: 50%;
      right: auto;
      bottom: 0;
      z-index: 60;
      width: min(100%, 480px);
      grid-template-columns: repeat(5, 1fr);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(7, 10, 18, 0.94);
      border-top: 1px solid var(--line);
      box-shadow: 0 -12px 32px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
    }

    .tab-btn {
      display: grid;
      gap: 2px;
      place-items: center;
      min-height: 54px;
      padding: 6px 4px;
      font-size: 0.68rem;
      font-weight: 850;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
    }

    .tab-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 1rem;
      line-height: 1;
    }

    .academy-icon {
      width: 100%;
      height: 100%;
      display: block;
      color: currentColor;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-btn.active {
      color: var(--text);
      background: rgba(45, 212, 191, 0.15);
      border-color: rgba(45, 212, 191, 0.28);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }

    .dashboard-card {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .dashboard-card.wide {
      grid-column: 1 / -1;
    }

    .dashboard-label {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .dashboard-value {
      margin-top: 4px;
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .dashboard-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.28;
    }

    .country-progress-card {
      display: grid;
      gap: 10px;
    }

    .campaign-map {
      position: relative;
      display: grid;
      gap: 9px;
    }

    .route-strip {
      position: relative;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(94px, 1fr);
      gap: 10px;
      overflow-x: auto;
      margin: 12px 0 11px;
      padding: 14px 4px 13px;
      scrollbar-width: none;
    }

    .route-strip::before {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      top: 44px;
      height: 3px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(96, 165, 250, 0.62), rgba(247, 201, 72, 0.5), rgba(45, 212, 191, 0.48)),
        rgba(255, 255, 255, 0.08);
      opacity: 0.74;
      pointer-events: none;
    }

    .route-strip::-webkit-scrollbar {
      display: none;
    }

    .route-pill {
      position: relative;
      flex: 0 0 auto;
      display: grid;
      justify-items: center;
      align-content: center;
      align-items: center;
      gap: 3px;
      min-height: 68px;
      padding: 8px 9px;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 32%, var(--line));
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--accent, var(--teal)) 26%, transparent), transparent 38px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        rgba(8, 12, 22, 0.88);
      color: var(--soft);
      font-size: 0.72rem;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.22);
    }

    .route-step {
      position: absolute;
      left: 7px;
      top: 6px;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      font-size: 0.58rem;
      font-weight: 900;
    }

    .route-pill::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 72%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 16%, transparent);
      transform: translateX(-50%);
    }

    .route-pill:first-child::before {
      display: block;
    }

    .route-flag {
      display: block;
      font-size: 1.26rem;
      line-height: 1;
    }

    .route-name {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .route-mark {
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .route-pill.locked {
      opacity: 0.55;
    }

    .route-pill.current {
      color: var(--text);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      animation: campusGlow 3400ms ease-in-out infinite;
    }

    .route-pill.current .route-step {
      color: #071018;
      background: color-mix(in srgb, var(--accent, var(--teal)) 76%, white);
      border-color: transparent;
    }

    .route-pill.complete {
      border-color: rgba(74, 222, 128, 0.35);
      background: rgba(74, 222, 128, 0.12);
      color: #c6f7d8;
    }

    .country-node {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: center;
      overflow: hidden;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 24%, var(--line));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--teal)) 10%, transparent), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
    }

    .passport-destination {
      border-radius: 6px 14px 6px 6px;
    }

    .passport-destination::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 10px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px dashed color-mix(in srgb, var(--accent, var(--teal)) 42%, rgba(255, 255, 255, 0.2));
      opacity: 0.36;
      pointer-events: none;
    }

    .country-node::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 68%, transparent);
      opacity: 0.82;
    }

    .country-node.current {
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 42%, transparent);
      background:
        radial-gradient(circle at 32px 20px, color-mix(in srgb, var(--accent, var(--teal)) 24%, transparent), transparent 44px),
        color-mix(in srgb, var(--accent, var(--teal)) 12%, transparent);
      box-shadow: 0 10px 24px color-mix(in srgb, var(--accent, var(--teal)) 11%, transparent);
    }

    .country-node.locked {
      opacity: 0.58;
    }

    .country-node > * {
      position: relative;
      z-index: 1;
    }

    .country-node-title {
      color: var(--soft);
      font-size: 0.86rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .country-node-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.25;
    }

    .goal-list {
      display: grid;
      gap: 8px;
    }

    .goal-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .goal-check {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .goal-row.done .goal-check {
      color: #04110a;
      background: var(--green);
      border-color: transparent;
    }

    .goal-title {
      color: var(--soft);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .goal-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .facility-banner {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: center;
    }

    .sport-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--accent, var(--teal)) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 34%, transparent);
      color: var(--text);
      font-size: 1.16rem;
      font-weight: 900;
    }

    .department-aquatics .department-body {

        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0 4px, transparent 4px 10px),

    .department-football .department-building::before,

    .department-soccer .department-building::after,

    .identity-details {

    .ceremony-path-details {

      border: 1px solid rgba(255, 255, 255, 0.08);

    .ceremony-path-details summary {

      min-height: 34px;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 900;
      list-style: none;
      text-transform: uppercase;

    .ceremony-path-details summary::after {
      content: "Show";

      color: color-mix(in srgb, var(--academy-accent) 64%, white);
      font-size: 0.64rem;

    .ceremony-path-details[open] summary::after {

    .ceremony-path-details .ceremony-steps {

    .ceremony-drill-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 44px;

      color: var(--text);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--academy-accent) 34%, var(--primary)), color-mix(in srgb, var(--academy-accent-2) 42%, var(--teal)));
      box-shadow: 0 10px 28px color-mix(in srgb, var(--academy-accent) 16%, transparent);
    }

    .ceremony-drill-button span {
      overflow: hidden;
      font-weight: 950;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ceremony-drill-button strong {
      font-size: 0.78rem;
    }

    .mission-board {
      display: grid;
      gap: 8px;
      margin-top: 0;
      padding: 10px;
      border-radius: 5px 5px 14px 5px;
      border: 1px solid color-mix(in srgb, var(--gold) 22%, var(--line));
      background:
        linear-gradient(135deg, rgba(247, 201, 72, 0.08), transparent 62%),
        rgba(255, 255, 255, 0.035);
    }

    .orientation-card {
      display: grid;
      gap: 10px;
      background:
        radial-gradient(circle at 90% 0, color-mix(in srgb, var(--academy-accent) 18%, transparent), transparent 78px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .orientation-card.complete {
      border-color: rgba(74, 222, 128, 0.32);
      background:
        radial-gradient(circle at 88% 0, rgba(74, 222, 128, 0.16), transparent 80px),
        linear-gradient(180deg, rgba(21, 29, 47, 0.98), rgba(13, 18, 31, 0.98));
    }

    .orientation-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .orientation-title {
      color: var(--text);
      font-size: 1rem;
      font-weight: 950;
      line-height: 1.15;
    }

    .orientation-note {
      color: var(--soft);
      font-size: 0.8rem;
      font-weight: 720;
      line-height: 1.35;
    }

    .orientation-checklist {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .orientation-step {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px;
      align-items: center;
      min-width: 0;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .orientation-step.done {
      border-color: rgba(74, 222, 128, 0.25);
      background: rgba(74, 222, 128, 0.08);
    }

    .orientation-step .goal-check {
      width: 22px;
      height: 22px;
      font-size: 0.66rem;
    }

    .orientation-step.done .goal-check {
      color: #04110a;
      background: var(--green);
      border-color: transparent;
    }

    .orientation-step-title {
      overflow: hidden;
      color: var(--soft);
      font-size: 0.7rem;
      font-weight: 850;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .orientation-identity {
      display: grid;
      gap: 9px;
      padding: 9px;
      border: 1px solid color-mix(in srgb, var(--academy-accent) 24%, var(--line));
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
    }

    .orientation-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .orientation-actions .small-btn {
      min-height: 42px;
    }

    .recommendation-card {
      display: grid;
      gap: 10px;
    }

    .campus-map {
      position: relative;
      isolation: isolate;
      min-height: 382px;
      overflow: hidden;
      padding: 14px 12px 18px;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 20%, color-mix(in srgb, var(--campus-accent, var(--teal)) 16%, transparent), transparent 122px),
        linear-gradient(180deg, color-mix(in srgb, var(--campus-accent, var(--teal)) 9%, transparent), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.018));
    }

    .campus-map::before {
      content: "";
      position: absolute;
      inset: 72px 10px 18px;
      border-radius: 50% 50% 16px 16px;
      background:
        linear-gradient(90deg, transparent 0 24%, rgba(255, 255, 255, 0.1) 24% 26%, transparent 26% 48%, rgba(255, 255, 255, 0.09) 48% 52%, transparent 52% 74%, rgba(255, 255, 255, 0.1) 74% 76%, transparent 76%),
        linear-gradient(180deg, color-mix(in srgb, var(--campus-accent, var(--teal)) 17%, transparent), rgba(255, 255, 255, 0.035));
      opacity: 0.64;
      pointer-events: none;
      transform: perspective(150px) rotateX(10deg);
      z-index: 0;
    }

    .campus-map::after {
      content: "";
      position: absolute;
      inset: 16px 16px auto auto;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--campus-accent, var(--teal)) 14%, transparent);
      filter: blur(14px);
      opacity: 0.85;
      pointer-events: none;
      animation: campusGlow 5200ms ease-in-out infinite;
    }

    .campus-courtyard {
      position: absolute;
      left: 50%;
      top: 44%;
      z-index: 1;
      width: 106px;
      height: 106px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--campus-accent, var(--teal)) 24%, rgba(255, 255, 255, 0.12));
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 44%),
        color-mix(in srgb, var(--campus-accent, var(--teal)) 10%, transparent);
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.05);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .campus-courtyard::before,
    .campus-courtyard::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 142px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      transform-origin: center;
    }

    .campus-courtyard::before {
      transform: translate(-50%, -50%) rotate(28deg);
    }

    .campus-courtyard::after {
      transform: translate(-50%, -50%) rotate(-28deg);
    }

    .hub-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px 14px;
    }

    .hub-card {
      position: relative;
      --building-scale: 1;
      --wing-height: 34px;
      --wing-opacity: 0.76;
      --window-opacity: 0.62;
      --window-row-two-opacity: 0;
      --window-row-three-opacity: 0;
      --banner-opacity: 0;
      --flag-opacity: 0.68;
      min-height: 172px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-content: stretch;
      padding: 10px;
      text-align: left;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 24%, rgba(255, 255, 255, 0.12));
      border-radius: 7px;
      background:
        radial-gradient(circle at 50% 64%, color-mix(in srgb, var(--accent, var(--teal)) 17%, transparent), transparent 56px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(12, 17, 29, 0.78);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.3);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .hub-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent, var(--teal)) 70%, white), transparent);
      opacity: 0.78;
    }

    .hub-card::after {
      content: "";
      position: absolute;
      inset: auto 12px 12px;
      height: 22px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, color-mix(in srgb, var(--accent, var(--teal)) 25%, transparent), transparent 72%);
      opacity: 0.76;
    }

    .hub-card:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent, var(--teal)) 74%, white);
      outline-offset: 2px;
    }

    .hub-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 54%, var(--line));
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.34);
    }

    .hub-card.status-hot {
      border-color: color-mix(in srgb, var(--gold) 28%, var(--accent, var(--teal)));
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--gold) 18%, transparent),
        0 18px 34px rgba(0, 0, 0, 0.34);
      animation: livingCardPulse 4200ms ease-in-out infinite;
    }

    .hub-card.status-active {
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 44%, var(--line));
    }

    .hub-card.status-good {
      border-color: rgba(74, 222, 128, 0.32);
      background:
        radial-gradient(circle at 50% 64%, rgba(74, 222, 128, 0.16), transparent 56px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
        rgba(12, 17, 29, 0.78);
    }

    .hub-card.stage-0 {
      --building-scale: 0.9;
      --wing-opacity: 0.38;
      --window-opacity: 0.44;
      --flag-opacity: 0.36;
    }

    .hub-card.stage-1 {
      --building-scale: 1;
      --window-row-two-opacity: 0.36;
      --flag-opacity: 0.66;
    }

    .hub-card.stage-2 {
      --building-scale: 1.08;
      --wing-height: 40px;
      --window-row-two-opacity: 0.58;
      --banner-opacity: 0.78;
      --flag-opacity: 0.82;
    }

    .hub-card.stage-3 {
      --building-scale: 1.16;
      --wing-height: 44px;
      --wing-opacity: 0.96;
      --window-opacity: 0.78;
      --window-row-two-opacity: 0.74;
      --window-row-three-opacity: 0.56;
      --banner-opacity: 1;
      --flag-opacity: 1;
    }

    .hub-card.activity-idle {
      filter: saturate(0.88);
    }

    .hub-card > * {
      position: relative;
      z-index: 2;
    }

    .campus-topline {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .campus-building {
      position: relative;
      align-self: center;
      justify-self: center;
      z-index: 1;
      display: block;
      width: calc(98px * var(--building-scale));
      height: calc(78px * var(--building-scale));
      margin: 6px 0 7px;
      opacity: 0.86;
      pointer-events: none;
      animation: buildingPulse 5200ms ease-in-out infinite;
    }

    .building-svg-slot {
      position: absolute;
      inset: -9px -10px -5px;
      z-index: 0;
      display: block;
      opacity: 0.72;
      pointer-events: none;
    }

    .building-svg-slot svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .building-glow {
      position: absolute;
      inset: 8px 8px 0;
      z-index: 0;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      filter: blur(16px);
      opacity: 0.88;
    }

    .building-roof {
      position: absolute;
      inset: 0 18px auto;
      z-index: 1;
      display: block;
      height: 26px;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background: color-mix(in srgb, var(--accent, var(--teal)) 54%, #ffffff 8%);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.28));
    }

    .building-body {
      position: absolute;
      inset: 24px 17px 9px;
      z-index: 1;
      display: block;
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 42%, transparent);
      border-radius: 8px 8px 3px 3px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 20%, transparent), rgba(255, 255, 255, 0.04));
    }

    .building-window-row {
      position: absolute;
      left: 7px;
      right: 7px;
      height: 4px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, rgba(255, 255, 255, var(--window-opacity)) 0 7px, transparent 7px 12px);
      opacity: 0.62;
    }

    .building-window-row.row-one {
      top: 8px;
    }

    .building-window-row.row-two {
      top: 16px;
      opacity: var(--window-row-two-opacity);
    }

    .building-window-row.row-three {
      top: 24px;
      opacity: var(--window-row-three-opacity);
    }

    .building-wing {
      position: absolute;
      bottom: 9px;
      z-index: 1;
      width: 22px;
      height: var(--wing-height);
      border: 1px solid color-mix(in srgb, var(--accent, var(--teal)) 34%, transparent);
      background: color-mix(in srgb, var(--accent, var(--teal)) 15%, rgba(255, 255, 255, 0.04));
      opacity: var(--wing-opacity);
    }

    .building-wing.left {
      left: 6px;
      border-radius: 7px 2px 2px 3px;
    }

    .building-wing.right {
      right: 6px;
      border-radius: 2px 7px 3px 2px;
    }

    .building-door {
      position: absolute;
      left: 50%;
      bottom: 0;
      z-index: 2;
      width: 13px;
      height: 18px;
      border-radius: 7px 7px 2px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 40%, rgba(255, 255, 255, 0.12));
      transform: translateX(-50%);
    }

    .building-light {
      position: absolute;
      inset: 32px 21px auto;
      z-index: 3;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      opacity: 0.68;
      animation: lightSweep 3600ms ease-in-out infinite;
    }

    .building-banner {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 27px;
      z-index: 4;
      display: none;
      min-height: 11px;
      border-radius: 2px;
      background: color-mix(in srgb, var(--gold) 76%, var(--accent, var(--teal)));
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.28);
      opacity: var(--banner-opacity);
    }

    .building-flag {
      position: absolute;
      right: 13px;
      top: 8px;
      z-index: 4;
      width: 16px;
      height: 12px;
      border-radius: 2px 7px 7px 2px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 64%, white);
      opacity: var(--flag-opacity);
      transform-origin: 0 50%;
      animation: flagWave 4200ms ease-in-out infinite;
    }

    .building-activity-dot {
      position: absolute;
      left: 14px;
      bottom: 12px;
      z-index: 4;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--teal)) 72%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent, var(--teal)) 14%, transparent);
      opacity: 0.72;
    }

    .hub-card.status-hot .campus-building::after {
      content: "";
      position: absolute;
      right: 8px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(247, 201, 72, 0.15);
      animation: signalPulse 2400ms ease-in-out infinite;
    }

    .campus-offices .building-body {

    .campus-sports .building-body {

    .campus-sports .building-roof {

    .campus-offices .building-wing {

      font-weight: 900;

      text-transform: uppercase;

      }

        height: 58px;

      async function initializeContentDataRegistry() {
        const loader = window.EliteSportsAcademyDataLoader;
        if (!loader || typeof loader.loadContentDatabases !== "function") {
          contentDataRegistry = createContentDataRegistry("fallback");
          contentDataRegistry.errors.push("YAML content loader was not available.");
          return;
        }
        try {
          const result = await loader.loadContentDatabases({ baseUrl: ".", timeoutMs: 3000 });
          applyContentDataRegistry(result);
        } catch (error) {
          contentDataRegistry = createContentDataRegistry("fallback");
          contentDataRegistry.errors.push(error && error.message ? error.message : String(error));
        }

      function applyContentDataRegistry(result) {
        contentDataRegistry = {
          ...createContentDataRegistry("fallback"),
          ...(result && typeof result === "object" ? result : {})
        };
        mergeYamlCountries(contentDataRegistry.data.countries || []);
        mergeYamlSports(contentDataRegistry.data.sports || []);
        CONTENT.buildings = (contentDataRegistry.data.buildings || []).map(normalizeYamlBuildingForGame);
        CONTENT.headquarters = Array.isArray(contentDataRegistry.data.headquarters) ? contentDataRegistry.data.headquarters : [];
        BY_ID.building = mapById(CONTENT.buildings);
        BY_ID.headquarters = mapById(CONTENT.headquarters);

      function mergeYamlCountries(countries) {
        const byId = mapById(countries);
        CONTENT.countries.forEach(country => {
          const source = byId[country.id];
          if (!source) return;
          country.dataSource = "data/countries.yaml";
          country.dataProfile = source;
          country.sourceName = source.name;
          country.dataTagline = source.tagline || "";
          country.dataRegion = source.region || "";
          country.dataCampusBonus = source.campus_bonus || null;
          country.dataSignatureSports = Array.isArray(source.signature_sports) ? [...source.signature_sports] : [];
          country.dataSharedSports = Array.isArray(source.shared_sports) ? [...source.shared_sports] : [];
          country.dataCompetitionCircuits = Array.isArray(source.competition_circuits) ? [...source.competition_circuits] : [];
          if (source.name && !YAML_COUNTRY_NAME_OVERRIDES[country.id]) country.name = source.name;
        });
      }

      function campusOwnsAthletes(campus) {
        return Boolean(campus && campus.athletes && campus.athletes.status === "campus-owned" && campus.athletes.records);
      }

      function campusOwnsCompetitions(campus) {
        return Boolean(campus && campus.competitions && campus.competitions.status === "campus-owned");
      }

      function campusOwnsChapterProgress(campus) {
        return Boolean(campus && campus.chapterProgress && campus.chapterProgress.status === "campus-owned" && campus.chapterProgress.record);
      }

      function campusOwnsSessionDrill(campus) {
        return Boolean(campus && campus.sessionDrill && campus.sessionDrill.status === "campus-owned" && campus.sessionDrill.upgrades);
      }

      function normalizeCampusCompetitionState(raw = {}, rawSave = {}) {
        const saved = raw && typeof raw === "object" ? raw : {};
        const rawActive = saved.active && typeof saved.active === "object" ? saved.active : rawSave.activeCompetition;
        let active = null;
        if (rawActive && typeof rawActive === "object") {
          const comp = getCompetition(rawActive.id);
          const expiresAt = cleanNumber(rawActive.expiresAt, 0);
          if (comp && expiresAt > now()) active = { id: comp.id, expiresAt };
        }
        return {
          status: "campus-owned",
          active,
          lastResult: normalizeCompetitionResult(saved.lastResult || saved.result || rawSave.lastCompetitionResult),
          nextCompetitionTime: cleanNumber(saved.nextCompetitionTime, rawSave.nextCompetitionTime || now() + 45000)
        };
      }

      function normalizeCampusChapterProgress(raw = {}, rawSave = {}, countryId = USA_CAMPUS_ID) {
        const savedWrapper = raw && typeof raw === "object" ? raw : {};
        const saved = savedWrapper.record && typeof savedWrapper.record === "object"
          ? savedWrapper.record
          : rawSave.countryProgress && rawSave.countryProgress[countryId] && typeof rawSave.countryProgress[countryId] === "object"
            ? rawSave.countryProgress[countryId]
            : {};
        return {
          ...createCountryProgressRecord(),
          ...saved,
          completedGoalIds: Array.isArray(saved.completedGoalIds) ? [...new Set(saved.completedGoalIds)] : [],
          chapterTPEarned: Math.max(0, cleanNumber(saved.chapterTPEarned, 0)),
          competitionsWon: Math.max(0, Math.floor(cleanNumber(saved.competitionsWon, 0))),
          completedAt: cleanNumber(saved.completedAt, 0),
          rewardClaimed: Boolean(saved.rewardClaimed),
          rewardClaimedAt: cleanNumber(saved.rewardClaimedAt, 0)
        };
      }

      function campusRegionId(countryId) {
        const country = getCountry(countryId);
        if (country && country.regionId) return country.regionId;
        const future = FUTURE_DESTINATIONS.find(destination => destination.id === countryId);
        return future && future.regionId ? future.regionId : "unassigned";
      }

      function campusCompetitionCircuitIds(countryId) {
        const country = getCountry(countryId);
        const configured = country && Array.isArray(country.competitionCircuitIds) ? country.competitionCircuitIds : ["campusCircuit"];
        const valid = configured.filter(id => getCompetitionCircuit(id));
        return valid.length ? [...new Set(valid)] : ["campusCircuit"];
      }

      function normalizeCampusEconomy(raw = {}, countryId = USA_CAMPUS_ID) {
        const saved = raw && typeof raw === "object" ? raw : {};
        const contribution = saved.contribution && typeof saved.contribution === "object" ? saved.contribution : {};
        const strategyId = getCampusStrategy(saved.strategyId) ? saved.strategyId : DEFAULT_CAMPUS_STRATEGY_ID;
        return {
          version: LOCAL_ECONOMY_VERSION,
          status: "campus-owned",
          strategyId,
          strategyChangedAt: cleanNumber(saved.strategyChangedAt, 0),
          localTrainingPointsRef: `state.campuses.${countryId}.localTrainingPoints.value`,
          academyFundingRef: ACADEMY_FUNDING_REF,
          contribution: {
            status: "framework-active",
            model: "sidecar-accrual-no-local-tp-reduction",
            lifetimeFundingGenerated: Math.max(0, cleanNumber(contribution.lifetimeFundingGenerated, 0)),
            pendingFunding: Math.max(0, cleanNumber(contribution.pendingFunding, 0)),
            lastFundingGenerated: Math.max(0, cleanNumber(contribution.lastFundingGenerated, 0)),
            lastSource: String(contribution.lastSource || ""),
            lastContributionAt: cleanNumber(contribution.lastContributionAt, 0)
          },
          headquartersSupport: {
            status: "prepared",
            headquartersRef: "state.academy.headquarters",
            operationsCapacityLimited: true,
            operationsCapacityRef: "state.academy.headquarters.support.operationsCapacity"
          },
          modifiers: {
            localGrowth: getCampusStrategy(strategyId).localGrowth,
            headquartersContribution: getCampusStrategy(strategyId).headquartersContribution,
            athleteFocus: getCampusStrategy(strategyId).athleteFocus,
            competitionFocus: getCampusStrategy(strategyId).competitionFocus
          }
        };
      }

      function normalizeCampusCompetitionCircuits(raw = {}, countryId = USA_CAMPUS_ID) {
        const saved = raw && typeof raw === "object" ? raw : {};
        const eligibleCircuitIds = campusCompetitionCircuitIds(countryId);
        const currentCircuitId = getCompetitionCircuit(saved.currentCircuitId) && eligibleCircuitIds.includes(saved.currentCircuitId)
          ? saved.currentCircuitId
          : eligibleCircuitIds[0] || "campusCircuit";
        return {
          status: "framework",
          currentCircuitId,
          eligibleCircuitIds,
          activeCompetitionRef: `state.campuses.${countryId}.competitions.active`,
          futureExpansionReady: true
        };
      }

      function activeCampusIdForState(targetState = state) {
        return normalizeCampusId(targetState && targetState.currentCountryId, USA_CAMPUS_ID);
      }

      function createCampusRecord(countryId, raw = {}, rawSave = {}) {
        const country = getCountry(countryId) || { id: countryId, name: countryId, flag: "", accent: "var(--teal)", playable: false };
        const opened = countryId === USA_CAMPUS_ID || Boolean(raw.opened);
        const activeCampusId = activeCampusIdForState(rawSave);
        const isMigratedCampus = isMigratedCampusId(country.id);
        const isActiveCampus = country.id === activeCampusId;
        const savedTP = raw.localTrainingPoints && typeof raw.localTrainingPoints === "object" ? raw.localTrainingPoints.value : undefined;
        const legacyTP = cleanNumber(rawSave.tp, 0);
        const localTrainingPointValue = cleanNumber(savedTP, isActiveCampus ? legacyTP : 0);
        const savedFacilities = extractFacilityRecordSource(raw.facilities);
        const savedAthletes = extractAthleteRecordSource(raw.athletes);
        const shouldBridgeLegacyProgress = isActiveCampus || country.id === USA_CAMPUS_ID;
        const facilitySource = Object.keys(savedFacilities).length ? savedFacilities : shouldBridgeLegacyProgress ? rawSave.facilities : {};
        const athleteSource = Object.keys(savedAthletes).length ? savedAthletes : shouldBridgeLegacyProgress ? rawSave.athletes : {};
        const savedCompetitions = raw.competitions && raw.competitions.status === "campus-owned" ? raw.competitions : {};
        const competitionFallback = shouldBridgeLegacyProgress ? rawSave : {};
        const savedChapter = raw.chapterProgress && typeof raw.chapterProgress === "object" ? raw.chapterProgress : {};
        const savedSessionDrill = raw.sessionDrill && typeof raw.sessionDrill === "object" ? raw.sessionDrill : {};
        const sessionDrillFallback = isActiveCampus ? rawSave.clickUpgrades : {};
        return {
          id: country.id,
          countryId: country.id,
          name: country.name,
          status: raw.status || (opened ? "prepared" : "placeholder"),
          opened,
          playable: Boolean(country.playable),
          architectureVersion: ARCHITECTURE_VERSION,
          metadata: {
            migrationPhase: campusMigrationPhase(country.id),
            migrationStatus: isMigratedCampus ? "migrated" : "placeholder",
            localEconomyVersion: LOCAL_ECONOMY_VERSION,
            regionId: campusRegionId(country.id),
            competitionCircuitIds: campusCompetitionCircuitIds(country.id),
            activeCampusOnMigration: activeCampusId,
            legacyAdapter: !isMigratedCampus,
            legacyBridgeApplied: Boolean(raw.metadata && raw.metadata.legacyBridgeApplied),
            legacyBridgeSource: raw.metadata && raw.metadata.legacyBridgeSource ? String(raw.metadata.legacyBridgeSource) : "",
            headquartersPlayable: false
          },
          localTrainingPoints: {
            status: isActiveCampus || isMigratedCampus ? "campus-owned" : "prepared",
            value: Math.max(0, localTrainingPointValue),
            migratedFrom: "state.tp",
            adapter: isActiveCampus ? "active-campus-legacy-mirror" : "stored-campus-value",
            scope: "local-campus",
            ownership: "campus"
          },
          economy: normalizeCampusEconomy(raw.economy, country.id),
          sessionDrill: normalizeSessionDrillRecord(savedSessionDrill, country.id, sessionDrillFallback),
          buildings: {
            status: "campus-owned",
            records: normalizeBuildingRecords(raw.buildings)
          },
          facilities: isMigratedCampus
            ? {
              status: "campus-owned",
              records: normalizeFacilityRecords(facilitySource)
            }
            : {
              status: "legacy-adapter",
              valueRef: "state.facilities"
            },
          athletes: isMigratedCampus
            ? {
              status: "campus-owned",
              records: normalizeAthleteRecords(athleteSource)
            }
            : {
              status: "legacy-adapter",
              valueRef: "state.athletes"
            },
          competitions: isMigratedCampus
            ? normalizeCampusCompetitionState(savedCompetitions, competitionFallback)
            : {
              status: "legacy-adapter",
              activeRef: "state.activeCompetition",
              resultRef: "state.lastCompetitionResult",
              nextCompetitionTimeRef: "state.nextCompetitionTime"
            },
          chapterProgress: isMigratedCampus
            ? {
              status: "campus-owned",
              record: normalizeCampusChapterProgress(savedChapter, rawSave, country.id)
            }
            : {
              status: "legacy-adapter",
              valueRef: `state.countryProgress.${country.id}`
            },
          localBonuses: {
            status: "content-registry",
            valueRef: `CONTENT.countries.${country.id}.bonuses`
          },
          competitionCircuits: normalizeCampusCompetitionCircuits(raw.competitionCircuits, country.id)
        };
      }

      function createCampusContainer(raw = {}, rawSave = {}) {
        const campuses = {};
        PHASE_ONE_CAMPUS_IDS.forEach(id => {
          const saved = raw && typeof raw === "object" ? raw[id] : null;
          campuses[id] = createCampusRecord(id, saved && typeof saved === "object" ? saved : {}, rawSave);
        });
        return campuses;
      }

      function createFreshCampusRecord(countryId) {
        const campus = createCampusRecord(countryId, {
          opened: true,
          status: "prepared"
        }, {
          currentCountryId: USA_CAMPUS_ID,
          unlockedCountryIds: [USA_CAMPUS_ID],
          completedCountryIds: []
        });
        campus.opened = true;
        campus.status = "prepared";
        campus.localTrainingPoints.value = 0;
        campus.localTrainingPoints.adapter = "stored-campus-value";
        campus.localTrainingPoints.migratedFrom = "fresh-country-unlock";
        campus.sessionDrill = normalizeSessionDrillRecord({}, countryId, {});
        campus.buildings.records = normalizeBuildingRecords({});
        if (campusOwnsFacilities(campus)) campus.facilities.records = normalizeFacilityRecords({});
        if (campusOwnsAthletes(campus)) campus.athletes.records = normalizeAthleteRecords({});
        if (campusOwnsCompetitions(campus)) campus.competitions = normalizeCampusCompetitionState({}, {});
        if (campusOwnsChapterProgress(campus)) campus.chapterProgress.record = createCountryProgressRecord();
        campus.economy = normalizeCampusEconomy({}, countryId);
        campus.competitionCircuits = normalizeCampusCompetitionCircuits({}, countryId);
        campus.metadata.freshCampusInitialized = true;
        campus.metadata.freshCampusInitializedAt = now();
        campus.metadata.freshCampusSaveVersion = SAVE_VERSION;
        campus.metadata.legacyBridgeApplied = false;
        campus.metadata.legacyBridgeSource = "";
        return campus;
      }

      function attachFreshCampusToActiveMirrors(targetState, campus) {
        if (!targetState || !campus || targetState.currentCountryId !== campus.countryId) return;
        targetState.tp = cleanNumber(campus.localTrainingPoints && campus.localTrainingPoints.value, 0);
        if (campusOwnsFacilities(campus)) targetState.facilities = campus.facilities.records;
        if (campusOwnsAthletes(campus)) targetState.athletes = campus.athletes.records;
        if (campusOwnsCompetitions(campus)) {
          targetState.activeCompetition = campus.competitions.active || null;
          targetState.lastCompetitionResult = campus.competitions.lastResult || null;
          targetState.nextCompetitionTime = cleanNumber(campus.competitions.nextCompetitionTime, now() + 45000);
        }
        if (!targetState.countryProgress || typeof targetState.countryProgress !== "object") targetState.countryProgress = {};
        if (campusOwnsChapterProgress(campus)) targetState.countryProgress[campus.countryId] = campus.chapterProgress.record;
      }

      function initializeFreshCampusForUnlock(countryId, targetState = state) {
        const country = getCountry(countryId);
        if (!country || country.id === USA_CAMPUS_ID || !isMigratedCampusId(country.id)) return false;
        if (!targetState.campuses || typeof targetState.campuses !== "object") targetState.campuses = {};
        const freshCampus = createFreshCampusRecord(country.id);
        targetState.campuses[country.id] = freshCampus;
        if (!targetState.countryProgress || typeof targetState.countryProgress !== "object") targetState.countryProgress = {};
        targetState.countryProgress[country.id] = freshCampus.chapterProgress.record;
        attachFreshCampusToActiveMirrors(targetState, freshCampus);
        return true;
      }

      function shouldResetUnlockedCampusProgress(targetState, countryId) {
        if (!targetState || countryId === USA_CAMPUS_ID || !isMigratedCampusId(countryId)) return false;
        const unlocked = Array.isArray(targetState.unlockedCountryIds) && targetState.unlockedCountryIds.includes(countryId);
        if (!unlocked) return false;
        const record = targetState.countryProgress && targetState.countryProgress[countryId];
        const completed = Array.isArray(targetState.completedCountryIds) && targetState.completedCountryIds.includes(countryId);
        return !completed && !(record && record.rewardClaimed);
      }

      function campusHasLocalPlayActivity(campus) {
        if (!campus || typeof campus !== "object") return false;
        const localTP = cleanNumber(campus.localTrainingPoints && campus.localTrainingPoints.value, 0);
        const progress = campus.chapterProgress && campus.chapterProgress.record ? campus.chapterProgress.record : {};
        return localTP > 0
          || cleanNumber(progress.chapterTPEarned, 0) > 0
          || cleanNumber(progress.competitionsWon, 0) > 0
          || (campusOwnsFacilities(campus) && hasFacilityProgress(campus.facilities.records))
          || (campusOwnsAthletes(campus) && hasAthleteProgress(campus.athletes.records));
      }

      function shouldResetUnlockedCampusSessionDrill(targetState, countryId) {
        if (!shouldResetUnlockedCampusProgress(targetState, countryId)) return false;
        const campus = targetState.campuses && targetState.campuses[countryId];
        return !campusHasLocalPlayActivity(campus);
      }

      function resetCampusSessionDrill(countryId, targetState = state) {
        const campus = targetState && targetState.campuses && targetState.campuses[countryId];
        if (!campus) return false;
        campus.sessionDrill = normalizeSessionDrillRecord({}, countryId, {});
        if (activeCampusIdForState(targetState) === countryId) {
          targetState.clickUpgrades = campus.sessionDrill.upgrades;
        }
        return true;
      }

      function createMigrationRecord(originalSaveVersion = SAVE_VERSION) {
        return {
          schemaVersion: ARCHITECTURE_VERSION,
          originalSaveVersion: Math.max(1, Math.floor(cleanNumber(originalSaveVersion, SAVE_VERSION))),
          currentSaveVersion: SAVE_VERSION,
          lastMigratedAt: 0,
          logs: [],
          validation: null
        };
      }

      function defaultOnboardingState() {
        return {
          completed: false,
          dismissed: false,
          introSeen: false,
          identityConfirmed: false,
          chapterReviewed: false,
          worldTourViewed: false,
          firstCompetitionBriefed: false,
          sessionDrillExplained: false
        };
      }

      function createDefaultState() {
        const current = now();
        const facilities = {};
        const coaches = {};
        const athletes = {};
        const clickUpgrades = {};
        const achievements = {};
        const countryProgress = {};
        CONTENT.facilities.forEach(f => facilities[f.id] = { level: 0 });
        CONTENT.coaches.forEach(c => coaches[c.id] = { level: 0 });
        CONTENT.clickUpgrades.forEach(upgrade => clickUpgrades[upgrade.id] = { level: 0 });
        CONTENT.athletes.forEach(a => athletes[a.id] = {
          recruited: false,
          skill: 1,
          xp: 0,
          assigned: "",
          recruitedAt: 0
        });
        CONTENT.achievements.forEach(a => achievements[a.id] = false);
        CONTENT.countries.forEach(country => countryProgress[country.id] = createCountryProgressRecord());
        return {
          saveVersion: SAVE_VERSION,
          tp: 0,
          totalTPEarned: 0,
          seasonTPEarned: 0,
          trophies: 0,
          medals: 0,
          reputation: 0,
          academy: defaultAcademyContainer(current),
          campuses: createCampusContainer(),
          migration: createMigrationRecord(SAVE_VERSION),
          onboarding: defaultOnboardingState(),
          currentCountryId: "usa",
          unlockedCountryIds: ["usa"],
          completedCountryIds: [],
          countryProgress,
          clickUpgrades,
          facilities,
          coaches,
          athletes,
          achievements,
          lastSave: current,
          lastTick: current,
          activeEvent: null,
          eventBonusEnd: 0,
          nextEventTime: current + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS),
          activeCompetition: null,
          lastCompetitionResult: null,
          nextCompetitionTime: current + 45000,
          moraleBoostEnd: 0,
          tutorialSeen: false,
          runStart: current,
          seasonNumber: 1,
          settings: {
            animations: true,
            floatingNumbers: true,
            pinSessionDrill: false,
            confirmPrestige: true
          },
          ui: {
            activeTab: "home"
          },
          stats: {
            totalClicks: 0,
            totalPassiveIncome: 0,
            totalOfflineIncome: 0,
            totalCompetitionIncome: 0,
            prestiges: 0,
            sponsorshipEventsTriggered: 0,
            sponsorshipEventsClaimed: 0,
            competitionsEntered: 0,
            competitionsWon: 0,
            totalClickIncome: 0,
            clickUpgradesBought: 0,
            facilitiesBought: 0,
            coachesRecruited: 0,
            athletesRecruited: 0,
            highestFacilityLevel: 0,
            totalPlaySeconds: 0
          }
        };
      }

      function normalizeState(raw) {
        const base = createDefaultState();
        if (!raw || typeof raw !== "object") return base;
        raw = migrateSave(raw);

        const s = { ...base };
        s.saveVersion = SAVE_VERSION;
        s.tp = cleanNumber(raw.tp, 0);
        s.totalTPEarned = cleanNumber(raw.totalTPEarned, 0);
        s.seasonTPEarned = cleanNumber(raw.seasonTPEarned, 0);
        s.trophies = Math.max(0, Math.floor(cleanNumber(raw.trophies, 0)));
        s.medals = Math.max(0, Math.floor(cleanNumber(raw.medals, 0)));
        s.reputation = Math.max(0, Math.floor(cleanNumber(raw.reputation, 0)));
        s.academy = normalizeAcademyContainer(raw.academy, base.academy);
        s.campuses = normalizeCampusContainer(raw.campuses, raw);
        s.migration = normalizeMigrationRecord(raw.migration, raw.saveVersion);
        s.onboarding = normalizeOnboarding(raw.onboarding, raw);
        s.lastSave = cleanNumber(raw.lastSave, base.lastSave);
        s.lastTick = now();
        s.eventBonusEnd = cleanNumber(raw.eventBonusEnd, 0);
        s.nextEventTime = cleanNumber(raw.nextEventTime, base.nextEventTime);
        s.nextCompetitionTime = cleanNumber(raw.nextCompetitionTime, base.nextCompetitionTime);
        s.moraleBoostEnd = cleanNumber(raw.moraleBoostEnd, 0);
        s.tutorialSeen = Boolean(raw.tutorialSeen);
        s.runStart = cleanNumber(raw.runStart, base.runStart);
        s.seasonNumber = Math.max(1, Math.floor(cleanNumber(raw.seasonNumber, 1)));

        s.currentCountryId = getCountry(raw.currentCountryId) ? raw.currentCountryId : "usa";
        s.unlockedCountryIds = normalizeIdList(raw.unlockedCountryIds, CONTENT.countries, ["usa"]);
        s.completedCountryIds = normalizeIdList(raw.completedCountryIds, CONTENT.countries, []);
        if (!s.unlockedCountryIds.includes(s.currentCountryId)) s.unlockedCountryIds.push(s.currentCountryId);
        s.countryProgress = normalizeCountryProgress(raw.countryProgress, raw);
        s.completedCountryIds = CONTENT.countries
          .filter(country => s.countryProgress[country.id] && s.countryProgress[country.id].rewardClaimed)
          .map(country => country.id);
        refreshUnlockedCountriesForState(s);
        if (!s.unlockedCountryIds.includes(s.currentCountryId)) s.currentCountryId = s.unlockedCountryIds[0] || "usa";

        CONTENT.facilities.forEach(f => {
          const saved = raw.facilities && raw.facilities[f.id];
          s.facilities[f.id] = { level: Math.max(0, Math.floor(cleanNumber(saved && saved.level, 0))) };
        });
        CONTENT.coaches.forEach(c => {
          const saved = raw.coaches && raw.coaches[c.id];
          s.coaches[c.id] = { level: clamp(Math.floor(cleanNumber(saved && saved.level, 0)), 0, c.maxLevel) };
        });
        CONTENT.clickUpgrades.forEach(upgrade => {
          const saved = raw.clickUpgrades && raw.clickUpgrades[upgrade.id];
          s.clickUpgrades[upgrade.id] = {
            level: clamp(Math.floor(cleanNumber(saved && saved.level, 0)), 0, upgrade.maxLevel)
          };
        });
        CONTENT.athletes.forEach(a => {
          const saved = raw.athletes && raw.athletes[a.id];
          const recruited = Boolean(saved && saved.recruited);
          const assigned = recruited && getFacility(saved && saved.assigned) ? saved.assigned : "";
          s.athletes[a.id] = {
            recruited,
            skill: clamp(Math.floor(cleanNumber(saved && saved.skill, 1)), 1, a.potential),
            xp: Math.max(0, cleanNumber(saved && saved.xp, 0)),
            assigned,
            recruitedAt: cleanNumber(saved && saved.recruitedAt, 0)
          };
        });
        CONTENT.achievements.forEach(a => s.achievements[a.id] = Boolean(raw.achievements && raw.achievements[a.id]));

        s.settings = {
          ...base.settings,
          ...(raw.settings && typeof raw.settings === "object" ? raw.settings : {})
        };
        Object.keys(base.settings).forEach(key => {
          s.settings[key] = typeof s.settings[key] === "boolean" ? s.settings[key] : base.settings[key];
        });
        s.ui = {
          ...base.ui,
          ...(raw.ui && typeof raw.ui === "object" ? raw.ui : {})
        };
        if (s.ui.activeTab === "progress") s.ui.activeTab = "world";
        if (s.ui.activeTab === "staff") s.ui.activeTab = "academy";
        if (!TABS.some(tab => tab.id === s.ui.activeTab)) s.ui.activeTab = "home";
        s.stats = {
          ...base.stats,
          ...(raw.stats && typeof raw.stats === "object" ? raw.stats : {})
        };
        Object.keys(s.stats).forEach(key => {
          s.stats[key] = Math.max(0, cleanNumber(s.stats[key], 0));
        });

        if (raw.activeEvent && typeof raw.activeEvent === "object") {
          const expiresAt = cleanNumber(raw.activeEvent.expiresAt, 0);
          if (expiresAt > now()) {
            s.activeEvent = {
              name: String(raw.activeEvent.name || SPONSOR_EVENTS[0]),
              expiresAt
            };
          }
        }

        if (raw.activeCompetition && typeof raw.activeCompetition === "object") {
          const comp = getCompetition(raw.activeCompetition.id);
          const expiresAt = cleanNumber(raw.activeCompetition.expiresAt, 0);
          if (comp && expiresAt > now()) s.activeCompetition = { id: comp.id, expiresAt };
        }
        s.lastCompetitionResult = normalizeCompetitionResult(raw.lastCompetitionResult);

        if (s.nextEventTime < now() - 1000) {
          s.nextEventTime = now() + randomBetween(EVENT_MIN_MS, EVENT_MAX_MS);
        }
        if (s.nextCompetitionTime < now() - 1000 && !s.activeCompetition) {
          s.nextCompetitionTime = now() + randomBetween(60000, 100000);
        }
        syncArchitectureContainers(s);
        s.migration.validation = validateSave(s);
        return s;
      }

      function migrateSave(raw) {
        const migrated = { ...raw };
        const version = Math.max(1, Math.floor(cleanNumber(migrated.saveVersion, 1)));
        migrated.migration = normalizeMigrationRecord(migrated.migration, version);
        if (version < 2) {
          migrated.clickUpgrades = migrated.clickUpgrades || {};
          CONTENT.clickUpgrades.forEach(upgrade => {
            if (!migrated.clickUpgrades[upgrade.id]) migrated.clickUpgrades[upgrade.id] = { level: 0 };
          });
          logMigration(migrated, "v2-click-upgrades", "Prepared click upgrade save records.");
        }
        if (version < 3) {
          migrated.currentCountryId = migrated.currentCountryId || "usa";
          migrated.unlockedCountryIds = Array.isArray(migrated.unlockedCountryIds) ? migrated.unlockedCountryIds : ["usa"];
          migrated.completedCountryIds = Array.isArray(migrated.completedCountryIds) ? migrated.completedCountryIds : [];
          logMigration(migrated, "v3-country-foundation", "Prepared country foundation fields.");
        }
        if (version < 4) {
          migrated.settings = migrated.settings && typeof migrated.settings === "object" ? migrated.settings : {};
          if (typeof migrated.settings.pinSessionDrill !== "boolean") migrated.settings.pinSessionDrill = false;
          if (typeof migrated.settings.confirmPrestige !== "boolean") migrated.settings.confirmPrestige = true;
          if (migrated.ui && typeof migrated.ui === "object") {
